front:
  text: 沈下賢文集卷苐二
  hash: sha256:b7020239471623985fb6c1e677c92123fab2524103280dbe0038e6f5606dc311
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0065_SBCK_002-1a}
body:
  text: 雜著湘中怨解文祝延為人撰乞巧文祝樠木神文雜記湘中怨解湘中怨者事本怪媚為學者未嘗有𫐠然而淫溺之人往往不寤今欲概其論以著誠而已從生韋敖善撰樂府故牽而廣之以應其詠垂拱年中駕上陽宫太學進士鄭生晨發銅駝里乘曉月渡洛橋聞橋下有哭甚哀生下馬循聲索之見其艷女翳然蒙袖曰我孤養於兄嫂惡常苦我今欲赴水故留哀須臾生曰能遂我歸之乎應曰婢御無悔遂與居號曰汜人能誦椘人九歌招魂九辨之書亦常擬其調賦為怨句其詞麗絶世莫有屬者因撰光風詞曰隆佳秀兮昭盛時播薰緑兮淑華歸顧室荑與處蕚兮潛重房以飾姿見稚態之韶羞兮蒙長靄以為幃醉融光兮渺瀰迷千里兮􅉼洇湄晨陶陶兮暮熙熙舞婑娜之穠條兮騁盈盈以披遲酡遊顔兮倡蔓卉縠流舊電兮石髮髓旎生居貧汜人嘗解篋出輕繒一端與賣胡人酬之千金居數歲生遊長安是夕謂生曰我湘中蛟宫之娣也謫而從君今歲滿無以久留君所欲為訣耳即相持啼泣生留之不能竟去後十餘年生之兄為嶽州剌史會上已日與家徒登嶽陽樓望鄂渚張宴樂酣生愁吟曰情無垠兮蕩洋洋懷佳期兮屬三湘聲未終有畫艫浮漾而來中為綵樓髙百餘尺其上施緯帳欄籠畫飾帷褰有彈弦鼓吹者皆神仙娥眉被服煙霓裙袖皆廣長其中一人起舞含嚬凄怨形髏汜人舞之歌曰泝青山兮江之隅拖湘波兮裊緑𥚑荷拳拳兮未舒匪同歸兮將焉如舞畢斂袖翔然凝望樓中縱觀方怡須臾風濤崩怒遂迷所往元和十三年余聞之於朋中因悉輔其詞題之曰湘中怨蓋欲使南昭嗣煙中之志為偶倡也文祝延有引文祝延之指其本禱祠閩人歌其質也閩侯居政民蔭而安他日侯恙在體巷野之祈祠于神者皆以請侯益憂焉後淂問而詞乃舒其俗以為言俚不足自道或謂軍副者能變風從律善闡物志因耆耋為請於是與文以通其意且以古之淂人者皆祝延之今復用言命為篇目其詞二闋山之杭杭兮水堋吞荒抱大兮香疊層騰氣清渾兮朝昏神生其中兮宅幽凝居如山惠如水處端卓兮赴下而忘鄙集人之祈兮從人之所市攀清明兮叩髣佛我民清兮期吉日願聽誠兮陳所當侯我兮恩如光照導兮天覆惠流吾兮樂且康恭聞侯兮飲食失常民縈憂兮心苦瘡飲之飢兮侯由有穀神有澤兮冝蔭沃脫侯之恙兮歸侯之多福群卑勤之恭潔兮鑒貞盟乎山竹右一闋為祈兕載吹兮音咿咿銅鐃呶兮呼視睢樟之蓋兮麓下雲垂幄兮為帷合吾民兮將安維吾侯之康兮樂欣肴盤列兮答神神擺漁篁兮降拂窣右持妓兮左夫人態修邃兮佻眇調丹含瓊兮瑳上聲佳笑馨炮羶燔兮溢按豆爵盎無虗兮果托雜佑秋雲清醉兮流融光巫𥚑旋兮覡袖翔瞪虛凝兮覽回楊語神歡兮酒去夾望吾侯兮遵賞事朝馬駕兮搦寶轡千弭亟絃兮森道騎吾何樂兮神軒維侯之康兮居遊自遂右一闋為酬為人撰乞巧文和史館陳學士作邯鄲人妓婦李容子七夕祀織女作穿針戲取苕篁芙蓉雜致席上以望巧所降其夫以為沈下賢工文又能創窈窕之思善感物態因請撰為情語以導所欲歌曰惟雲渚之晨秋兮天矌碧以凝暮懸韶挂於姹月泫明淚之清露即何房之將期儼龍輪以􅈬馭恭聞司巧之多方修馨香以奉具竊獨溺於自私希靈娥之所付㻁碧凝其異質兮韻虹隆於霾霽假文羽於孔雀兮而使擅夫佳麗戴雲蟬之重縷兮塗蠻金於綺篲細綃縷於藕腹兮差蓮跗以㨾齒命纎瓜以蟲絲兮裊簷機之夕綴是物之巧善飾願賜妾於針紐也葩蕚鬱於濃妍包多冝以善喜引纎吹於輕颷若將翔而復倚醉光春之流景播情香於萬里霓煙出乎無間縹窈眇以斐亹若披若曵兮扯平林兮橫曉水襲霽旦之繁芳兮因隱映而增綺淡冉冉其夥容世無容以偕此是物之巧容善態願委妾於態媚也短蒲狹涘兮曲溜溢鵁鶄宛兮引乳娣戲音清諧兮蕩演曵牽遊𥚑之低凝兮蔓春心於淇枯寒徑餘兮憶棄葉擺風呌夜兮留燥雪流韻凄澀兮泱􅑜咽吟夢語之漣漣感霜鍾之流越是物之巧音善感願付妾於管絃也祝樠木神文并序謪掾秋病偃于漢之陽恍而夢鬼其形甚穢長股短胸薄頂無凥秃眉鑏吻嗜痔而叨誦視睒睒饞氣􅧍臊指人生寒粟肌揵毛及窹怪歎以告筆吏扄曰斯癘鬼也亞之曰癘鬼何端而侵我乎扄曰癘之為情惡儻儻而狎睢同丘為仇同惡扶依依邪傳影倒步側趍託舌附語以調淫巫今掾之為人體曠情虛樂態惡汙惡內曠外踈翺翔自儀舉止無虞不機不扄為所啁也無乃異乎亞之曰何以去斯患也吏曰扄聞之樠木之神其司郢土之隂可以酬而訴也願召巫用酒肴以寄詞為祝使其有愧必榜且戮掾無鬱也于是乃與撰為祝言一闋以道所惡其詞曰傾江漢之長瀾兮淘晨雲於宿靄惟附巘之橫峯兮寫甘灣之清泚聞樠木之留古神兮宅同麓之荒郖茹清明之靈英含端光而為體與午節及皎峭兮惡情明之暗靄粵客子之何羈兮啁吾血於癘鬼癘鬼之狀草創朴梀蹴折兮蜍背棚橫兮蠆腹板聱反語虬兮薄頂而蛇顙颭掞兮赤臉而鼠目伺差池於隟情兮投怪言以禍福拒良藥於煩痰兮謗嘉肴而謂之毒衣去戻氣以為介兮避神丹之利鏃彼怪魅之杇險兮非神君兮孰能以族洗苦身而為詞兮望皇靈於樠木雜記沂水北一百里有峴曰將軍甚靈民置祠于路左享之不已將軍曽為五郡牧常姓名玄通因築城失主將意而斬之其尸數日不仆今有臺曰立尸臺西南有山為鞍山山北有閞謂之穆陵李師古不臣作鎮于此防遇不意元和初罷之西有沂山山有廟則東安公也沂州刺史每春自禱恩是山山有谷九十九所河分八曰沂曰汶汶東注沂南流入清道沂州山東南有山曰太平山頂平可八九十里頃歲有寇曽居之山北十餘里有樹五檀也秦夢記大和初沈亞之將之邠出長安城客槖泉邸舍春時晝夢入秦主內史廖舉亞之秦公召至殿膝前席曰寡人欲強國願知其方先生何以教寡人亞之以昆彭齊桓對公悅遂試輔中涓秦官也使佐西乞伐河西晉秦郊也亞之帥將卒前攻下五城還報公大悅起勞曰大夫良苦休矣居久之公幼女弄玉聓簫史先死公謂亞之曰微大夫晉五城非寡人有甚德大夫寡人有愛女而欲與大夫備灑掃可乎亞之少自立雅不欲遇幸臣蓄之固辭不得請拜左庶長尚公主賜金二百斤民間猶謂簫家公主其日有黃衣中貴騎疾馬來迎亞之入宫闕甚嚴呼公主出鬒髮著偏細衣裝不多飾其芳姝明媚筆不可模樣侍女祗承分立左右者數百人召見亞之便館居之亞之於宫題其門曰翠微宫宫人呼沈郎院雖備位下大夫繇公主故出入禁衛公主喜鳳簫每吹簫必下翆微宫髙樓上聲調逺逸能悲人聞者莫不自廢公主七月七日生亞之嘗無貺夀內史廖曽為秦以女樂遺西戎戎主與廖水犀兩合亞之從廖得以獻公主公主悅受嘗結裙帶之上穆公遇亞之禮兼同列恩賜相望於道復一年春秦公之始平公主忽無疾卒公追傷不巳將葬咸陽原公命亞之作挽歌應教而作曰泣葬一枝紅生同死不同金鈿墜芳草香繡滿春風舊日聞簫處髙樓當月中梨花寒食夜深閉翆微宫進公公讀詞善之時宫中有出聲若不忍者公隨泣下又使亞之作墓志銘獨憶其銘曰日揚風哭兮石甃髯莎雜英滿地兮春色煙和珠愁粉瘦兮不生綺羅深深埋玉兮其恨如何亞之亦送葬咸陽原宫中十四人殉之亞之以悼悵過戚𬒳病卧在翠微宫然處殿外特室不入宫中矣居月余病良巳公謂亞之曰本以小女將託久要不謂不淂周奉君子而先物故敝秦區區小國不足辱大夫然寡人每見子即不能不悲悼大夫盍適大國乎亞之對曰臣無狀肺腑公室待罪右庶長不能從死公主君免罪戾使得歸骨父母國臣不忘君恩如今日將去公追酒髙會聲秦聲舞秦舞舞者擊髆附髀嗚嗚而音有不快聲甚怨公執酒亞之前曰夀顧此聲少善願沈郎𢋫揚歌以塞别公命趣進筆硯亞之受命去為歌辭曰擊體舞恨滿煙光無處所淚如雨欲擬著辭不成語金鳯銜紅舊繡衣幾度宫中同看舞人間春日正歡樂日暮東歸何處去歌卒授舞者雜其聲而道之四座皆泣既再拜辭去公復命至翠微宫與公主侍人别重入殿內時見珠翠遺碎青階下窗紗檀點依然宫人泣對亞之亞之感咽良久因題宫門詩曰君王多感放東歸從此秦官不復期春景自傷秦喪主落花如雨淚燕脂竟别去公命車駕送出函谷關巳送吏曰公􅒛盡此且去亞之與别語未卒忽驚覺卧邸舍明日亞之與友人崔九萬具道九萬博陵人諳古謂余曰皇覽云秦穆公葬雍槖泉祈年宫下非其神靈憑乎亞之更求得秦時地志説如九萬云鳴呼弄玉既仙矣惡又死乎沈下賢文集卷苐二
