front:
  text: 沈下賢文集卷苐五
  hash: sha256:527f5db308d4e44bdc8d0bb9b2101022d1b3c5dde5f0a864d165ba7777e82c37
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0065_SBCK_005-1a}
body:
  text: 記上河中府叅軍廳記歌者葉記閩城開新池記壽州團練副使廳壁記盩厔縣丞廳記都梁山倉記華州新葺設廳記隴州剌史廳記河中府叅軍廳記國朝設官無髙卑皆以職授任不職而居任者獨叅軍焉觀其意蓋欲以清人賢冑之子弟将命試任使以雅地出之耳不然何優然曠飬之如此其差髙下則以五府六雅為之次苐蒲河中界三亰左雍三百里且㕥天子在雍故其地益雄調吏者必以其人授焉噫今之衆官多失職不失其本者亦獨叅軍焉長慶二年余客蒲河中城叅軍某族世皆清胄又與始命之意不失矣乃相與請余記職官之本於其署歌者葉記昔者秦青之子弟韓娥從學乆之以為能盡青之妙也即辭去青送之将訣且歌一歌而林籟簜再歌則行雲不流矣娥心乃衰然則韓娥亦能使逶迤之聲環梁而凝塵奮飛㣲舞上下者三日不止能為人悲亦能為人喜其後漢武時恊律李延年為新聲亦尚感動人至唐貞元元年洛陽金谷里有女子葉學歌於柳恭恭下之初與其曹十余人居獨葉歌成無等後為成都率家妓及率死復来長安中而轂下聲家聞其能咸與㑹唱次至葉當引弄及舉音則弦工吹師皆失執自廢旣罷聲黨相謂約慎語無令人淂聞知是時慱陵大家子崔莒賢而自患其室饒乃曰吾緑組㓜祑寜冝厚畜以自封耶遂大置賔客門下縱楽與遨遊極費無有所恡他日莒宴賔堂上樂屬因言曰有新聲葉者歌無倫請延之即乗小車詣莒莒且酣為一擲目㘴樂乃合韻奏緑腰俱瞩葉曰幸給聲葉起與歌一解一㘴盡眙是日歸莒莒沉浮長安數十年葉之價益露然以莒能善人而優曹亦歸之故卒得不貢聲中禁葉為人潔悄自處雖諧者百態争笑於前未甞換色元和六年莒從事岐公在朔方時余徃謁焉㑹與公賔舎於郵在莒隣夜聞其歌有一人㘴泣甚悲良乆復悅及卒聲而悲悅再三曰孰為之是欲吾不淂自任耳明旦問其狀乃葉為也後莒復從𡵨公来彭城十年余過其居問葉安在曰逝矣自趙璧李元馮世稱為知音之尤皆擅鼓絃及謂余言葉之歌使其妙自備則音屬不知和矣鳴呼豈韓娥之嗣與惜其終莫有能繼其聲者故余著之欲其聞於後世云閩城開新池記閩城吻海而派江輔山以居先時無安沼平池為游舟娛席之地而娉芲媚竹散生擲華故酒笑酣視之晨而佳思莫極矣髙平公牧察之余乃經度隟空之所因卑汙壍而岸之浦嶼環廻之勢所造必勝群山左右冩影浮秀者輳空而入十一月辛卯新池成明日軍副者亞之疾間公延䕶軍及群從事絃工吹師𥚑䄂之曹㳺池而酒既坐謂軍副亞之曰吾踈汙隟以􅈬此而海波朝夕盈來之候逓輪足給以為我状而石之㕥期乎不朽軍副者亞之不敢讓遂執巵俯舡祭酒于流因且詞曰水能濁清首冠五行波流巳大有神為宰環塘縈縈為公藻鏡新流泱泱與地興祥嘉鯉鮐魴于水息昌嚵鮞噓虺即水與死翡翠鵁鶄浴涘眠晴辛蒲翦翦扇荷擎擎時未云來勞思乃馨柘槿紺竹滲縮醖沃延榮接姿以水為禄輔佑堙隍吐孕百福惟我公之明之通之智之忠保夀考兮與池之無窮軍副者亞之詞既再拜跪巵奉夀于公前公大喜還列􅈬㘴以酒以歌日入而起夀州團練副使廳壁記戰國南北書更言故世諸豪争㩀于夀春或兵至百萬有不能淂者豈地勢為要津乎自建中已来淮夷窟叛於蔡天子之詔或討或赦由是夀春備為東塞矣為之守者皆佩將軍印幕府符書之設擬於方鎮而有副使之官焉元和中韋公武㕥殿中侍御史為之九年秋蔡州叛夀春守令孤通引兵屯霍丘副使得孱卒百餘人留郡中冬蔡兵大入馬塘㓂鄧家城殺其将卒五千餘人盡虜民男女焚壊邑室而去郡中驚駭民人多流其家而東副使因言夀春其地壍水四絡南有淠西遮淮潁東有淝下㕥北注激而廻為西流環乳而濬入于淮此天與險於是也假如愚民能弃其業西流即為蓬徙塵走耳安與國是為利耶古反山家奴與民户一丁但為水工决安豊已南陂池㑹其流于城傍野中浸注如澤以故居民流心稍稍復退時馬塘鄧家城既陷霍丘方畏㓂乗其虚復飛語謡㕥感其俗曰狐死首丘井閭多傳言之蓍老曰果守不能堡是矣守聞之益恐遂弃其城亡歸是日霍丘椘行來未及郡㑹日暮使吏馳告副使以歸狀令淂夜開壁吏至壁捍開不得入呼罵其卒副使立城上曰某淂命於詔城晝受即晝復之今守獨入而䘚露無為也如驅與俱來寜不知盜居其間淂夜則禍成矣或幸止於卸平明闢關介士陳兵夾道驗其號以入䘚無敢越伍而趨居有頃守謪去詔㕥李將軍代将軍西出壃兵臨萬勝城復以副使掌留事明年陟其能淂加侍御史是歲亞之東觀戰至夀春得副使之跡題之於署下以記行事之時云盩厔縣丞廳記盩厔道巴漢三蜀南極山不盡三十里北阻渭短長之𥙷與山而近其野半為澤故䑕倚穡而居雖善捕伐不能無傷扵稼說者以為漢孝武帝甞夜出射熊於是而田人輒留執帝從者由此觀之民情阻限古為艱理時猶逼畏指諌即稍罷然佞臣竟㕥帝恥不忘遂籍民人田為五柞長楊矣今又徙甌越卒留戌邑中神䇿亦屯兵角居俱稱護甸而三蜀移民遊于其間市閭雜業者多於縣人十九趍農桑業者十五又有太子家田及竹囿皆募其傭藝之由是冨民豪農頗書名買横緩急以自藪匿民名斯偷浮詐相樛雖賢宰䖏而丞與曹或不䫫莫能盡枉直之情也夫丞之職也賛宰之正以條諸曹其有不便於民者丞能得不可今丞也余從祖居之既滿歲民諍不作如此則宰之所宰丞之所賛可謂知方也已長慶初余思相如進諌之風南歴長掦至于射熊五柞訪其遺跡因退舎是邑遂悉論山川俗里之事題於丞之署淮南都梁山倉記汴水別河而東合于淮淮水東米帛之輸關中者也由此㑹入其所交販徃來大賈豪商故物多遊利塩鐡之臣亦署致其間因檡官分曹㕥㩁庶貨而部貢之吏盡令塩鐡諸官校遣之疾徐用賞罰大梁彭城控両河皆屯兵居卒食出官田而畎畎頗夾河與之俱東仰澤河流言其水温而泥多肥比涇水四月農事作則争為之派决而就所事視其源緜緜不能通槁葉矣天子以為兩地兵食所急不甚阻其欲舟艫曝滯相望其間歲以為常而木文多敗裂自四月至七月舟傭食盡不淂前元和九年隴西李稼為塩鐡官掌淮口院病其涸滯思欲以為救而乃與楊子留使議之曰自閩越已西百郡所貢輳􅞮皆出是以炎天累月之乆滯於咫尺之地篙工諸傭盡其所儲不能賑十半之食只益姧偷耳㡬或有終歲而不得返其家者今誠得十敖之倉列於所便以造出入計無憂也正月河氷始津盡發所蓄而西六月之前虗廪以待東之至者矣如此則役者逸而弊何從生哉議㝎即㕥狀白得遂其便於是稼度泗上卑濕無堪地遂剏庾於淮南都梁山十二年詔以誅蔡之師食窘促令塩鐡所􅞮皆趍郾城下是時下淮南倉發舂吏計舂其工人曰舂材必櫟若榆吏欲令工􅈬山林剪市之稼曰天火方焚曰将燋萬家當頃刻之間雖得弊穢之噐奮濁汚之波百夫汲而楊之立足滅患如曰不然我欲利其噐待我柘桂之杓致滂沲之流操以救之彼言而後謀則然灰尚不可望而况全者今縣軍十萬旦暮不賑其為急也間不客釐今待汝訪山求材然後用何異乎柘杓滂流之語耶其倉材剪之餘大可以為臼小可以為杵長可以為杵之梁薄可以為䏶摳夾峙促命裁之即日而舂成百具其餘来與吏分辯之先㕥家奴􅈬役次及群吏各有差所舂凡二十八萬石不渉旬俱得浮淮而西矣十三年夏泗水大災淮溢壊城邑民人逃水西崗夜多相掠奪更驚恐號呼而塩鐡貨帛十餘萬兩囊之於布緘用吏名載與渡貨帛無遺尺乃内倉中不能盈一敖其餘皆廕仕家之急時余過泗上得其事故與息論善濟之方而著之以明其績華州新葺設廳記今天下邦郡之望莫與太華等然而公堂讌無别位頋几硯與餼樂之具日更廢置於其間寜地勢之要為守者無乆留於任而經慮莫及此乎隴西公為守未滿歲郡中既治因窺其庶屋可攻者乃先問其吏之為困何始也吏曰累更其守耳公曰吏知其病㢤夫几硯者公事之重器也以宴而遷徹宴而復則居不得常之更屢其不由此耶且吏入公門望其居則必莊是几硯之廬處宜其嚴也今朝徹而暮置事之者既勞固㕥慢矣而沉酒行樂作婦女列㘴優者與諸隆詼謾揺笑譏左右侍或衘哂壊容不可罪也夫狎乆則不敬豈吾之獨患其吏亦醜之明日觧冗宇一構於正寢西南隅壍其外數歩土基之飾故材以輳用垢者磨其淄弱者承其輕决流于其所以便塗者𥙷棟續楹不渉旬而功􅈬沼沚之湄隨而比矣嗟乎轉疣為安不費而功吾知其由人長慶元年四月甲子吴興沈亞之仰公之跡因請張文其下紀其功焉隴州刺史廳記昔制戎於安西濣海之時而隴汧去塞萬三千里其處内居安如此朝之命守猶以為重地必拔其良能當時之務其難者不過理寵門大家之田園陂池而已觀昇平之基其湏賢如此今自上邽清水已西六鎮五十郡既失地地為戎田城為戎固人為戎奴婢頋隴涇塩靈皆列為極塞而隴益為國路凡戎使徃来者必出此視其守由主人也而言語威儀豈容易而處近丗者朝之命守殆未能注意耳今清河崔公承寵世仕安西軍司馬公生長於戎然而神性傑異行賢智之路頗通諸書又能慱九州山川之理而國中之士知而仰者無㡬人近歲西戎累犯塞前年今上即位欲以􅊚交北虜以輔中國上書言兩蕃之事天子覧書以為必能同戎夷情故命使之今年拜守隴州拜之日朝之卿士咸謂隴之得賢為賀居郡而戎來者必憚愛而去鳴呼何向之命守未能注意而今之悟淂其人賢何向之知者無而今之稱者盈朝豈一郡之事有時而理耶一郡之人有時而幸耶智者之道有時而用耶長慶初余西視戎至于隴下聞郡人之所羙故歷署而刻記焉沈下賢文集卷苐五
