front:
  text: 沈下賢文集卷苐一
  hash: sha256:dabbb8459cb816669bdbb7978925ec2025578cfcfa101c47e9ab7f3d06ada37f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0065_SBCK_001-1a}
body:
  text: 賦夢遊仙賦柘枝舞賦右山水障賦詩虎丘山真娘墓春詞贈酬元微之題候仙亭答殷堯藩贈罷涇源記室望前船寄侯郎别龎子肅春色滿皇州宿白馬津寄寇立見張秀才送文潁上人遊天台寄王直方題海榴樹呈八叔大夫送龐子肅西蕃請謁廟觀百官獻壽山出雲曲江亭望杏花發夢遊仙賦余昔夜夢寓遊一方樂態甚適覺而作賦題之夢仙其詞曰杳漠漠兮升絶垠雲轡九天兮越崇門星赧曉以淡白瀾咽潾於錦礫石榴笑而織娥喜閽導余而就將止襲烈蕙之芳風送麗音於遼耳目恣邁而多適吾超超其樂此銀墉兮桂廂差瑶踏兮上玉堂卷紅幕兮發繡户中有人兮結清處語嫣延兮情綽扯命余廕於蘭之厦回穠顔以一顧曫嬌眸而融冶煙津兮玉盤火桂兮炮鸞鼎娥司味和苦酸羸吹既調戞湘絃合吾飲食兮樂吾後園乃稱詩曰白日低兮春塘滿紅華芳兮草芽短菱結帶兮荇含絲設遨遊兮遵佳期又詩曰穠光醉兮昏綿綿焉與久樂萬年春留連兮其未央吐芳意於荃言忽發寤以無覩魂迷念兮情既諒人生之皆夢孰云夕非而晝是馳詠想之悠悠兮軸吾情於萬里柘枝舞賦往者某值宴於鄭衛之侯坐與客序樂作堂下行舞男女紛雜交貫率以百品而觀者蓋􅝇然既罷升鼓堂上絃吹大奏􅒛為柘枝舞則皆排目矢座客曰今自有土之樂舞堂上者唯胡部與焉而柘枝益肆于態誠足以賦其容也因顧余緒之以洗客念賦曰昔神祖之克戎賔雜舞以混會柘枝信其多妍兮命佳人以繼態轗隆冠之繁珂兮披文纓於太帶跪閃舉以揮獝兮拖旋襟之襜曵騖遊思之情香兮注光波於穠睇顧巧度之無窮兮將多變而若雲揚厲唱於鼉鼓兮儼蘭露之芳津汨傍俯以裊影兮蕩風渠于橫茵愕兮若驚弛兮若懶欻然逴姹翔然嫣偃婉振修袖以拋拂兮韜纎肱以糅綰差重錦之華衣俟終歌而薄袒既而抑倚昂枅蹈節振臂驅揵蹀以捉碎盡戎儀於弱媚見孫律於武姓入西河之劔氣曲響未遒邊風襲吹門代馬之清嘶發言禽於詠髏客曰若此之狀也以鄭衛而前陳吾固知其將墜古山水障和史館陳學士作挹清臣之嘉思兮信踈子以峭孤回輔籍之睱筆兮賦他山於遺圖擲琨瑶於呐口兮若含氷以咀蘭惟古工之包化兮啓群峯於無間勢蹙巘以特起牙騰排而上干翆參差以玉立俱竦竦以攢攢於是澒以長瀾森以怪木瑟汨栗飀凄煩蕩燠浸平繚於椘澤冶妖韶於陽谷低霾橫暝兮陳半腹夢雨神雲兮淡而不歸怨扯惹乎巖曲縹癬青籬兮事幽澀細澗綿流兮洄噴噎山之人兮夕忘寐而坐忘興帷紺枝兮帶黃葛暖草𬒳崖兮垂緑髮翺鸞翔翆相追征兮振錦舒繡錯以明兮啼羇酸雌裂眥吻兮風呺穴怒寥而辭兮山中之木何凋榮兮虎丘山真娘墓金叉淪劔壑兹地似花臺油壁何人值值一作遇錢塘度曲哀翆餘長染桞香重欲薰梅但道行雲去應隨魂夢來春詞酬元微之黃鶯啼時春日髙紅芳發盡井邊桃美人手暖裁衣易片片輕花落剪刀題候仙亭新創仙亭覆石壇雕梁峻宇入雲端嶺北嘯猿髙枕聽湖南山色卷簾看答殷堯潘贈罷涇原記室勞君輟雅話聽説事壃場提筆從征虜飛書始伏羌河流辭馬嶺節卧聽龍驤孤負平生劔空憐射斗灮五月六日發石頭城步望前船示舍弟兼寄侯郎客子去淮陽逶迤别夢長水關開夜鎖霧棹起雲􅋽煙月期同賞風波忽異行隱山曽撼櫓轉瀨指遙墻蒲􅹋翦刀緑筠筒楚棕香因書報司逺為我憶檀郎别龎子肅自為應仙才丹砂錬幾廽山秋夢桂樹月曉憶瑶臺雨雪依巖避煙雲逐步開今朝龍仗去早晚鶴書來春色滿皇州何處春輝好偏冝在雍州花明夾城道栁暗曲江頭風軟遊絲重光融瑞氣浮鬪雞憐短草乳燕傍髙樓繡轂盈香陌新泉溢御溝回看日欲暮還騎似川流宿白馬津寄寇立客思聽蛩嗟秋懷似亂砂劔頭懸日影蠅鼻落燈花天外歸鴻斷漳南别路賖聞君同旅舍幾得夢還家汴州船行賦岸傍所見古木曉蒼蒼秋林拂岸香露珠蟲網細金縷兔絲長秋浪時廽沫驚鱗乍觸航蓬煙拈緑線棘實綴紅囊亂穗搖鼯尾出根挂鳯腸聊持一濯足誰道比滄浪送文潁上人遊天台露花浮翆瓦鮮思起芳叢此際斷客夢况復别志公既歷天台去言過赤城東莫説人間事﨑嶇塵土中宿後自華陽行次昭應寄王直方重歸能幾日物意早如春暖色鮮驪岫寒聲别鴈群川光如戲劔帆態似翔雲為報東園蝶南枝日巳曛題海榴樹呈八叔大夫曽在蓬壼伴衆仙文章枝葉五雲間幾時奉宴瑶臺下何日移榮玉砌前染日裁霞假雨露凌寒送暖占風煙應笑強言河畔柳逢波隨浪遂張騫送龎子肅三年遊宦也迷津馬困長安九陌塵都作無成不歸去古來妻嫂笑蘇秦西蕃請謁廟肅肅層城裏巍巍祖廟清聖恩覃布濩異域獻精誠冠蓋分行列戎夷辨姓名禮終齊百拜心潔表忠貞瑞氣千重色簫韶九奏聲仗移迎日轉旌動逐風輕休運威儀正年推爼豆盈不才慙聖澤空此望華纓勸政樓下百官獻夀御氣黃花節臨軒𬗋陌頭早陽生彩仗霽色入仙樓獻夀皆鴛鷺瞻天在冕旒菊樽開九日鳯曆啓千秋樂闋祥煙起柸酣瑞影收年年歌舞夕此地慶皇休山出雲片雲朝出岫孤色逈難親蓋小辭山早根輕觸石新飄揚經緑野明麗照青春拂樹疑舒葉臨江似結鱗從龍方有感捧日豈無因看助為霖去恩沾雨露均曲江亭望慈恩杏花發曲臺晴好望近接梵王家十畞開金地千株發杏花帶雲由誤雪映日欲欺霞𬗋陌傳香逺紅泉落影斜園中春尚早亭上路非賖芳景偏堪賞其如積歲華沈下賢文集卷苐一
