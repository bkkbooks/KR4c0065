front:
  text: 沈下賢文集序文章盛衰與世升降唐之文風大振於正元元和之間韓桞唱其端劉白繼其􅞮當時學者洆濡游泳攬其英華洗濯磨淬輝灮日新苟有作者皆足以拔出流俗自成一家之語則吳興之文是已公諱亞之字下賢吳興人元和十年登進士苐厯辟藩府嘗游韓愈門李賀許其工為情語有窈窕之思其後杜牧李啇隱俱有擬沈下賢詩則當時稱聲甚盛而存於今者既不盡見丗之所有復舛錯訛謬脫文漏句十有二三頃淂善本再加校覆皆得其正惜其藏於篋笥不得與好學之士共其玩繹因命工刋􅍢以廣其傳元祐丙寅十月一日題沈下賢文集目録
  hash: sha256:7ea5f11a270d78a7ee705d22ba68d60b521b490b4598ace1005735a8f05a3f08
