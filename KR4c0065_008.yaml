body:
  text: 書與潞鄜州書與潞府盧留後書與同州試官書與亰兆試官書答馮陶書答李生書上九江鄭使君書答馮兄書答學文僧請益書與潞鄜州書六年夏作亞之再拜稽首大夫閣下亞之昨去長安時歷别於所知親友門所知親友謂亞之曰安所適安所為亞之對曰適鄜將假貸於諸侯門所知親友賀亞之曰鄜有長賢大夫也喜文學仁義之道故其所為文學仁義之道欣欣焉走其門者日有之亞之納喜於心充充焉捶馬走僕忘其勞失其怠望閣下之境日近日喜及至之也且觀將謁之禮於其門乃見納客之官奔奔而入促促而出言不及吐道不及陳退居三日不知所為乃復聽閣下採取賓士之道髙下之等則曰某自某方來以某執事書為之輕重書之多者館善宇飽善味書之次者又次之其有有無因而至者雖辨智過人猶以為狂即與偶然之輩徼幸之徒退栖陋室與百姓雜處飰惡味且走來閣下門者亦不獨盡窮餓無依而來求粟帛於閣下亦有抱其智懷其才聞閣下好賢而來求臧否於閣下而望其推引之濟耳今一貫而禮一䫫而惠賢愚顛倒而又以書不書而為之輕重切恐天下之士其來閣下門者皆相爭齎書為糧受閣下之惠者不口閣下之惠而皆曰某官之書禮我也何有愧於閣下不唯不愧而已亦有憤激於衷而終怨怒者切恐閣下勞費以取無益亞之愚獨為閣下惜伏願閣下稍精接士之道使賢愚明白閣下能知此則四方之士聞之皆謂閣下不吝巳之不至而求其方直如此今亞之冒旌㦸之嚴敢言進於閣下亦希知言之士聞之知亞之不苟曲於閣下而存其直如此戰戢無任亞之再拜與潞州盧留後書八年夏作中丞閣下法者古王一其度於天下蓋欲必信於人耳非執事之臣能得專喜怒以自弄今或奉之未如其意何哉乃十四日亞之晨出南府門見一人衣縞不帶乘捷馬北馳健僕呵道衆僕皆左右馬分走甚嚴亞之意謂執事有服者即止馬匿道下既去私曰執事寧不帶耶不則又何呵也問其僕曰是方士李元戢者繫盜他郡焉亞之曰既繫何謂縱而遨乎僕曰彼言能化黃金反童齒今一郡大惑下自豪吏盡欲德之故馳過其家且暮不暇亞之因仰而呼俯而揖曰是能化黃金反童齒焉凡執左道亂正者在殺不以赦今其人且繫尚能惑設冠帶自儀而孰不陷前日信州刺史以夕祀黃老不當理官臣譛之得罪幾夷誠可寒心今閣下獨不省悟亞之雖不肖亦知為閣下畏伏惟亟誡獄吏使固手足之繫與常死罪者等無令出入自便不然法為吏侮而閣下安所任主哉幸留意焉亞之再拜與同州試官書今年秋亞之求貢於郡以文求知已於郡之執事凡三易郡失其知輒去其友相率而笑之亞之為之語曰里人有良金鬻於市而里之豪亦鬻焉俱將售於衡者豪人金雖精里人出其左衡人畏豪奪其價而先豪里人懷而去明日之他市而衡之直復不同又懷去又明日之他又然歸而聚黨與謀曰聞某市有衡人不欺一市之人謂之直遂往與群金角俱歷火升衡市人曰雖然願先豪衡人口是精麁在目輕重在衡衡目可欺乎市人慙而退其直果然今亞之負詞之來于執事其望亦同於直者也伏惟熟察無忽亞之再拜與京兆試官書七年冬作孔子之徒三千而言升堂者十輩然皆不能周其德故各以其所長出人者稱之名曰四科百世之下皆言孔子聖是知無全能者也今亞之雖不肖其著之文亦思有繼於言而得名光裔裔不滅於後由是㫖春秋而法太史雖未得陳其筆於君臣廢興之際如有義烈端節之事輒書之善惡無所回雖日受摧辱然其志不死亦將俟能為孔子之心者拔之是以晝夜增矣時亦有人勉亞之於進士科言得祿位大可以飬上飽下去年始來亰師與群士皆求進而賦以八詠琢雕綺言與聲病亞之習未熟而又以文不合於禮部先黜去今年復來聞執事主選亰兆長安中賢士皆賀亞之曰某執事斯謂明矣其取舍必以目辨耳察亞之曰微亞之以八韻為畏對曰不然夫良工為厦而選材者不以桶廢棟不責能此而否彼又曰無求備於一人此聖人採取之至言也亞之文巳貢矣執事其服孔子之心有素如其取捨之際亦能留意乎亞之再拜答馮陶書馮生足下前辱書時㑹鄙人將有適方事役在焉今則足下又赴省于東故弟書久不遑答有負懇欵無以自露然則書辭所屬寧鄙人冝當託是乎乃敢自酌以揆其意惟智府窹之樂府唱為歌十年聲流邯鄲下而魏歌者往請之曰聞古之韓娥其歌也能易哀樂變林籟則有是也何自而及是乎今子能楊韻激妙感物態矣而人投聲請價者宜以遂之必且語我使聞聽於衆耳以得售進入為王左右之娛對曰若韓娥之歌韻合於氣聲合於情是故草木之於地也氣為之君五腑之居人也情為之長草木之生其根處瘠則其表訥處潤則其表昌瘠之訥潤之昌不過其草木及氣之作也為溫陽則萬族舒為晦寒則衆色雜瘁五腑伏五行設如金困於內則肺亢應於外而嗅猒極則反之木極於內則肝怠應於外而視亂困則反之困而猒極而亂不過一發於內一應於外而已及情之作也為喜適則七竅走而㑹之怡為悲愁則六氣集而赴之慘是皆不得自任也韓娥之得也在此馭二情以攻之故能易哀樂岐二氣以襲物則能變林籟其神至矣亦尚未聞飫寵賞於當時者何也所感者智人也草木仰天性智人不混於纍夫衆庶之目怫於視世俗之耳離其聼故擊弊缶貫鼠革聚觀於市促促之歌巴聲夷辭唱一而和百替之者千萬人南風之絃雲和之瑟曠世莫用烏能自唱其德於聲音雖韓娥之妙欲誰繼者今足下將行者古道也將操者至聲也鄙人方困世之猒斥安足以使之聞聽於衆耳發嘉譽於此日乎畏辱雅向願悉所識幸甚幸甚答李生書亞之白辱書覽所指令僕人持書致安南守使從雅㫖以契所欲意者謂僕人居峻勢能可樞其意一云謂僕職在軍副其力可驅彼之情易如瞬昫夫何妄誤容易而不見知其不能如此哉且安南守其志木佷自齊從事已下咸以公藉督稽歷受訕侮繼章傍凌彼恃門矜耄無所加責前日韋同舍亦然顧亞之孱畏靜常遭尢况又掌刑書纍以法操其吏彼無路而露忿於僕人耳今來書指教欲使有為是執仇而赴於敵也何能致其願乎幸終悉省不宣亞之再拜上九江鄭使君書郢岸謫吏敬對所詰引言為書致于九江守鄭君閣下詰之既深焉得默默已也固折委譴之於章遂用悉陳惟聽之國朝天后之時使四裔達滅德之令皆儒臣自喬知之陳子昻受命通西北兩塞封玉門關戎虜遁避而無酬勞之命斯蓋大時之有體臣之當理也然喬死於讒陳死於枉皆由武三思嫉怒于一時之情致力尅害一則奪其妓妾以加憾一則疑其擯排以為纍陰令桑梓之宰拉辱之皆死於不命嗟乎嗟乎自是之後臨戎觀危酌逸勞之狀為使者而儒臣莫與矣前年天子以兩河逐叛之兵連嵗不解負􅞮之輸而不造廪庫皆從便道為戰士衣食之給於兩河之間嵗尚賑朝輦之下執笏常謁請罷所討者十八九獨諫大夫自以為習知叛臣之情日就窘請得往導愍痛以歸之既可所奏即請以亞之為副又以為古者單車為使有功則為戎臣輕害之遂於行請兵以自柄詔書仍以便冝從事又詔邯鄲巨鹿兵各以百騎與俱蓋欲重擊鑿之柄也及過平原平原郡城而有常山卒分居之諫大夫因令亞之為書檄之書成亞之題帛引弓射書於常山帥得書以期請降滄海之人聞之降者日百有餘輩及滄海冦欵與符印偕至即請以城歸使者是日往受城亞之復引前驅騎為先至滄海同捷與其徒繫頸者服衰不帶伏軍門之左委命於使執事於是諫大夫遣河南將石稅部獻闕下稅夜殺同捷於平昌亞之分道馳還以報事道中不淂乘乃乘騾驅馳至貝魏之門守長皆為艱日昃不得食因中病於廣武之間歷再旬而謪書降即奔上所委今閣下罪諫大夫以為狷急忘體冒危取禍習傳不察其端本附言和唱敢避忌應對哉昔者酈生馮軾下齊城七十韓信劫而烹之在前代且爾况今持兵連營淹嵗經時既費且敗萬無以自塞之際而使臣幸命詔御解羈裂網之恩啓萬死重生之路鰓就鼎之枯彼不思於降復何歸矣今習詩書步規矩而進於是者固未嘗習武事况親於戰鬪之間耶必多武臣之言以為信何者重巳之不李祐避能而誠邁越之談也或亦有詰亞之曰李祐避壁攻平原城城危且急尚不聞有效且使臣居間曾不逾月而云城降者何端亞之應之曰獨不見童子之情乎夫童子師與終身之益何惡而不附乳母蠕二之常恩而扶戀肆喜何者氣微意迫則毅容之難洽而告訴之言在前也是則向使之卒披堅甲持鋭鋒以相攻差剛决於敵者不瞬而殞形喪魄矣有如使臣之煦諭明白寧有忘生超死之渝乎此解拆之事誠不當為閣下說說亦不能降聼以委書之丁寧者蓋欲流之於世以俟通方之士次苐於所誤耳梗溉之録不文於詞亞之敬再拜答馮兄書降書誨慰滓滯之情稍以揚矣昨日奉策應對之日操意張謀唯恐不逺刻文勵語唯恐不工思欲不肩於俗以為世之大寵及遭不録退舍自念夫若是也非窮心於此安能堅然而顧之雖窮心極思而風水之力所排者又安能固之於此固之於彼非吾兄韓兵部安能無所惑者知與既寡攀援將誰近世復以知人為耻既知而譽乃為之私反不若譽􅊚黨耳以此自悲不能無憤亦欲極老日之力不忘於文以思雪於後代之人耳吾兄豈嘗失味于是耶乃教之空門之說小人狹薄尚為激然之氣戰燎於胸中故九引達者之波而澆之而熱腹九褻未知其救也果兄之教復至是將有可開也自廣之詞紙不能盡不宣亞之再拜答學文僧請益書聘顔上人上人足下辱書指問將問於僕人謂有解達可以梯進之給猶畏過意請聽畢說幸甚昔之有善煆者火五金而别器一日化百狀而智用不極然常薄産自急弟子相率而笑之曰夫子之於業工矣然而市售之富不能當陶之饒何也對曰夫陶者淺勞而薄利與俗相用彼朝市而夕墮失其用復從而市之而無虛日故能饒且吾之業搜其度而運其為及其成功與世終始彼匹居之人又安能罄其室而市吾之工哉故常飢亞之誤學為黃金之鍛且已困矣上人無乃襲饑於此哉非敢自重誠恐以陷其所從耳幸熟慮亞之再拜沈下賢文集卷苐八
