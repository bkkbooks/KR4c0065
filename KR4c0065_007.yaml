front:
  text: 沈下賢文集卷苐七
  hash: sha256:511356e0d28515813c2b607dcd422e66e8a49536fff26b8777fa5125bd9b3179
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0065_SBCK_007-1a}
body:
  text: 書上上家官書上李諌議書與薛浙東書上壽州李大夫書與福州使主徐中丞書三首與李給事薦士書上家官書亞之伏念傑木之生大長越倫足谷肩山而大谷不足以業其根長霓不足以惟其華天之所借其體若此豈不使皆獲其所安而輳乎用及其未偶也徒見摧風枯霜蒙煙老雲而已夫尋常之材也幹不丈而枝不尺葉縱其根不饒􅏳土之虜生不十年各獲斤之製以􅈬用何者受乎庶氣故易長於極成為衆用故易售扵工其在松栢扶榮意自得仰視傑木不見其木相與笑其瓦捹而無用及一且遭運得外賢工之所思採而舘之跨于礎而百棟負若是脩材巨幹非易自致也賢士良匠非易容也今閣下抱多能之德動與智諧可謂遭時負難戴重横扵所安可謂得任也如能察出䫫之材異日䖏之然後次衆材備於百當去聲如此則賢之名可㕥自有右者賢士之居位也沐垢不終湯充饑不竟飯軗而起畏日不足是皆採訪於衆能思致其爵飬良士之道也今則不然為公卿大臣者必嚴居深視以自重飬其所進者唯柔氣緩言瞽視而巧䛕然後謂之厚德故以多識為誣慱知為狂遷善為流㫁節為詐是皆斥而莫得稱也及一日操尺墨樞物機茫乎不知其從使左右庸胥因淂侮而役之彼非不欲自勝也蓋事業之所執固然今西戎邀嫁移兵㓂邉仍歲不巳山東盜䘚殺辱首吏未聞其歸誠可嗟也即如主上求其徃而爲理閣下度之公卿大臣而誰擇乎亜之誠不肖七歲再官不逾九品之列陶心研慮謨古臣知輔之所㕥爲化至於樂能慕哲亡其思而不回此則得之於性矣酌巖賢旅聖之所以立言至於書得失備理亂叙徃紀来此則得之於文矣學名将覇帥之所以整暴亂至於奮旅陣師㑹百變之狀離如驚鳥合如凝雲此則得之師師矣是三者皆業於根然後緒其末非無所望也亦思願為一從才戴宏傑之梁立巨礎之上顧世之持斧之士安足㕥摹哉亞之聞戎鏡包陽當日而矚之則能延燧興火䖏興而視之何異一規之幽銅耶而誰寤者夫氣應則生亞之亦蒙矌於光下㕥發所抱書辭多鄙又不盡志杵觸清嚴罪無所逭謹再拜上李諌議書月日将仕郎守秘書省正字沈亞之再拜貢書諌議閤下亞之常有混䫫之悲不能自置其拙也甚矣故祥禽之䫫凡羽而混之神芝之䫫腐菌而混之嘉蕙之䫫棼芻而混之非獨混之而巳亦且掩其芳而奪其羙何則善寡而凡多故也沉世俗之耳㡬能於此而由之者寒暑易轉是皆非金石能自求於時哉一失其頋以為䫫混則終從風雨而老矣何不痛之輒假所喻願賜終說幸甚椘王之鼎食十有餘年而王體不肥左右者懼王曰膳者不能味吾鼎也國人亦曰膳者不能味吾鼎也更逐膳者凡十軰益不味王恥乃令國中曰有能使吾鼎之味調和㕥安體者寡人爵之三公椘里之䖏士賢聞之應令而起者其老屬䄂而送之曰徃矣即鼎也曰然王曰仰味於君何以塞之對曰王必㕥鼎授我我力甚優夫治鼎之職約水燥薪㸑火㕥觀文武之用而巳其輳味則有椒桂梅䤈塩醢之品在吾惣衆力而調於心此其功也王之體不肥何待椘老曰斯固也夫真偽雜鬻循户而啼祈其售者偽得十九焉是椒桂之質類而馨辛不為也梅醯之質䫫而苦酸不為也塩醢之質䫫而醴醎不為也皆具而不為滋一旦集而㑹之鼎則必虗空矣君焉能揔是之力以成於王耶前膳之所以淂逐者由庶品之任非其任歟然則君之明足以察偽惑君之智足以區物情誠能儲其真畜其當以給其用則從之辛馨之才醯醢之具必越海逾陸而趣君之㫖矣斯百代之凖也豈但肥椘王之體然今閤下既以游泳道德蓄儲助味之具有素也然紛紛之真偽而清悟能不勞乎小子誠不足奉應對不得謁見乆矣幸因從左右者召稍延於前獲進所語幸甚伏惟降察不忽謹再拜與薛浙東書再拜後還㘴賔舎中有小吏持吏書來其語曰帛十疋吏置帛書於亞之前曰閤下所以貺客也其敬之誠則厚矣然有所未滿者敢為閤下道之夫虬能興水濟物故佐天如臣草木仰其澤苗方秀而望其誠有乏一日之兩而不及其實者則仰告斯臣以求之得一日足矣若纔潤於枯槁則已且猶将困之今亞之徃復道路三千餘里顒顒之誠於苗之旱甚矣而千鍾之祿於水之用又大焉亦何惜一日之澤而不給其涸哉亞之狂愚當其困涸不知所為乃復枯苗仰澤之說再敢煩告且閤下寜能不憐之亞之再拜上夀李大夫書十一年秌作昔者燕昭以千金市駿骨而百代稱之非直朽骨之可貴也意必在将来之良而已矣今亞之仰閤下之風而進於前恭聞閤下又不以朽鈍而頋之寜鄙人之宜頋也其名得無將来乎是鄙人之價冐千金也幸甚幸甚今有傍偟之誠敢露肝膽伏惟聽察之亞之前應貢在亰師而長㓜骨肉萍居於吴無咫尺地之居以自託其食給旦營其晝晝營其暮如是凡三黜禮部得黜輙歸自二月至十一月晨馳暮走使㒒馬不㕥恙即且碌碌如有一日霜露得欺氣體失理則一室向門之心無望矣今忘辛勤之榮扶挈長㓜丐食而西雖已及埇口然猶困其所儲不能自給但涕泣語空無有所仰又度天下王公希可以此言告者乃閤下耳伏惟分一日之澤以濡之無使亞之復爲朽骨所笑謹再拜與福州使主徐中丞苐一書九月十日都團練副使沈亞之謹再拜狀所願陳于閤下某伏念從古已來懐其所爲抱其所用者非知巳之進無能自揚也自咎繇之蒙舉顔回七十子之蒙范叔之蒙鮑叔之推至于今知已之功相嗣而不絶非有文字之記其功雖如前數士而後代無聞也可以惜諸徃者某始得以文謁閤於下吴之嘉興明日權㓜公謂某閤下言吾見古史者亞之也其後涉于仕路困則遭恩其知如此且以閤下居為世之端表故衆影依之言為世之典謨故衆聽傾之其重如此使一遊其門則天付㕥幸也而况知而推之哉提而用之㢤然亦懼不申於文字而後代莫覩是以前者敢㕥先人所業之書上干清鍳求其筆為之光以揚于幽故而為後代寵奉獻之日惕怳咽然不能周露誠以黷矣伏願憐其繼志之心使輝華裔裔著于百代雖大寵何㕥加於此焉伏惟俯賜終筆書辭再陳無任惕汗謹再拜上使主苐二書二月二十八日都團練副使沈亞之拜書後獻大使中丞閤下亞之昨與二三子同途晨問起居指教所謂薄疾未除将欲有請草奏具示始則䘚然愕窒不知詞對及退舎伏念閤下之所苦者惟中年之士十九而有之未甞聞以此而有去告閤下惟不為出入宴遊耳其餘决教益理膳息無减况方在強茂之時徒㕥小恙蹔留虜中乃欲為告以自遂豈當冝也且今時仕俗守榮路者雖已朽老支扶昏怳矣然則固其所居惟恐有損如此者亦十八九而閤下瞭然自悟所向若此得無獨清之累猜疾扵彼人之胸中㢤閤下骨肉交姻如有逺萬里者即聞是請寜知其退讓也必且疑驚隱慮莫能自浣設使憂能侵人閤下何以觧也亞之見識孱淺無足以奉請事今極慮深陳於前誠願得扵中庸使人無加口語也非敢憑縁取領厚祿而終斯說伏惟稍緩髙明之鋭㕥周慮之冐陳端白何任恐懼伏惟憐之上使主苐三書二月十一日都團練副使沈亞之拜書遣獻中丞閤下昨日候吏自外来急告以赦至亞之誡前後左右不得常歩及下馬􅈬次揖謁先聖獨張侍御不領祗言哮呼詬此捽拽導将移罵侵怒俚言攻凌不容湏臾之間㕥黨畀證攘掉呀騰如欲見食自群官衆将至扵聚立者咸聞見其麁聲奮態圜来驚視誠以亞之樗鈆之材䖏不當任可逃遭此衆辱冝矣然誠恐積暴不除異日酒塲恃醉率肆所為又為侵作誣言飛入清聽以是寒心自悲不能無患亞之幸蒙過意提在賔階雖無分銖之能以事萬一然誓将鞭勵孱謹以効終身伏願哀其端拙察以無辜稍借光明使各得分限免見侵迫過此之虞餘何敢請伏惟加察幸甚幸甚謹再拜與李給事薦士書十年春作日月新及苐進士沈亞之再拜稽首給事閤下亞之㓜學見其徃記說曾參閔子騫之孝至扵跬歩不忘雖騃㓜亦能蹴然内慕自是常思其人有能跋扵曽參閔子騫之行者即徃傳其名扵親戚朋友卿大夫間使其聲不㓕昔者五年亞之以進士入貢至亰師與其等清河張宗顔比居甞與徃來言始愛其人無遊詞至春宗顔去還家乆聞其親䘮又明年亞之東歸至洛聞洛人稱宗顔之孝曰宗顔貧無以事䘮乃與其兄東下至汴出操契書奴裝自賣聞者皆慟感流涕然盈月不得售汴師聞之持百縑使弔勞歸之盡彂其先故羇柩歸葬於所是歲亞之至彭城日話其事彭城人曰此吾里之客子也八九歲時喪私親貧不能奉飯嗿迺繫木為車與其兄自輓而送吾里謡之曰拖車郎是今宗閔之行難而里閭盡熟亞之切痛賢公卿未得稱其如此伏閤下扵異行尤能銳樂故亞之敢㕥宗顔之事為請伏惟訪察之幸不黙黙巳也沈下贒文集卷苐七
