front:
  text: 沈下賢文集卷苐六
  hash: sha256:e8730ea6ed084fef912f3052a1f95212dc180126d6dfa3ee89553be308ce9aad
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0065_SBCK_006-1a}
body:
  text: 記下櫟陽縣丞小廳記解縣令廳記櫟陽兵法尉廳記移佛記謪椽江齋記杭州場壁記復戒業寺記東渭橋給納使新廳記櫟陽縣丞小廳記便署所以接賔也櫟陽歧諸陵走左輔蒲太原燕趙魏山東至于凶奴雜盧之道而諸侯使者及戎王聘遺之臣交馳出是無虗日而邑頗瘠於優費然而遊官客子出入往來者則公賔為寡也夕館而晝饌自宰丞尉簿或不能支於給饋而賔去嘗悒悒不快長慶初燕趙魏侯者失理卒亂辱殺之更自立新帥大臣皆進意請討國其境之諸侯咸會兵襲戰飛蹄走轡之奏傳呼相追而又降嫁胸奴中故使者益至若是冝謂私賔不能加也然又遣使陳蔡許􅉸大梁彭城皆彂卒戌河北督責米帛於兩江之間使百郡所挽無西入由是天子之使入潼關者日數十輩大者乘馬至百小者不下十餘郵馬盡死於道凡往來乘馬畜者無問其誰皆奪之故遊宦客子俱湊道櫟陽中計其衆寡復與公賔之數相髙矣是時櫟陽丞當公主降胸奴使及迎者之部千人天子使後宫貴御行餞於道事嫁大臣從官衛士亦數千人夕頓田氏遣承奉供具以能不優民一縣之吏稱善辦及歸乃計曰夫遊賔四時之來獨夏其為稱耳且與理一署禮以待之然後以為家之給與賔僕相等是寧有忿賔哉既巳賔之來視其館之窮罄雖勇寒猛餒必抱愧自饜于所饗嗟乎隆否之迹由夫履也其構在公堂之左正寢西南隅其形髏廂二間覆厦于南陲其就在長慶元年八月甲子也解縣令廳記國家自誅叛巳來於今十年征徭息繁不勝於籍租榷之法居間為民起橫縣令不淂専以子飬之化理之蒲鹽田居解邑下歲出利流給雍洛二都三十郡其所會貿皆天子豪商􅠕估而姦吏踵起則解之為縣益不能等於他縣矣鹽田主官用郎吏其佐賦下不出御史操法繩縻十九開於縣令而不得専但奉府曺侯長之教而已鹽田田皆縣民其田園雖業籍于縣而令不得以縣民之衆馭之而已若是為令與尤悔日爭焉苟非智良不能日脫于橫今令者余之從祖也且滿歲而尤不及豈其厚於智乎而又招士民還業者數百至於公堂便館葺飾者凡十餘搆工不勞民又何多方也長慶二年余客其地因受命而著記云擽陽兵法尉廳記尉之曹兵法居末兵法之任在天下郡首長之臣且難其理而况畿之在尉乎擽陽其瘠沃相半豪户寒農之居三分以計而豪有二焉其父子昆弟皆卒名南比東西軍圜衛雜幸之恃或籍書從事星臺樂局織館雕坊禽兒膳者之附而又勝女拿處及為之臺絡是多髏者非獨不得為縣民之衆馭之而已亦且馮緣蔓橫以業吞漁獄之所操動繫於此而禁局強曹垂攀於前援者持符以解之固能移情以二法使終決不必理從髙級下相承而邪而不能竟者尤還於尉其受役唯單産孱民月徴之一人輸徑宫門至于內廡遞漏嚴夜給事諸生家及池園大廄皆校尉遣之豈尉之無慮也永貞前諸畿自進士而得尉而升班者十六七他入之尉而升者百一二是尉皆摩心清視以事察決用以此自價朝之未以此市若是今雖統曺不能強尉於無當近世恩臣負幸惡其踵進自致即白上約下以為尉未足拜且塞譽排能使升班之恩必有自令視尉之風益賤而今益輕矣由觀為尉者俯俯自度民之吞者肆其懲弱者甘其困姦者隟其欺邑是者畏其為尤屬而決之其兵法之源使無撓濁其易乎哉其易乎哉古者盤孟有書蓋誠其當器受量不陷也鍾磬必銘朂其全聲有待也鑄鼎記刑子産之為也尉也兵法之曹髏此不復矣敢不有記故附署而屬誠焉移佛記元和四年三月五日杭州報恩寺長老與其鄊閭父子將徙故佛像歸復于其寺佛至乃饗長老使白其由於亞之而求詳録焉沈子曰西域之有神教流于東域之中者其教像法其法者名曰佛自稱曰天人師又曰世尊出其言亦曰經驗其經之説佛去丗而後模其形焉像其真與衆瞻仰之故法之言像由斯也其或範金鐡以為之合土木以為之堅之以脂膠飾之丹漆五色然後形神儼然成其像舉其數體有為尊而坐者為卑而拱立者有跪者如受教諭者有具其形怪荷戈而勉強者有瞋目吒叱者摸鬼神焉此為像之外者也其性之旨為戒慎正邪去惡為濟渡力道肓聾警沈溺使民無不善我仁誼慈惠然此為像之內者也又説有已來之生來生之後為福則福應為禍則禍應因緣化而設其旨或由是舉域大敬自天子逹於庶人一信佛之來於今八百餘年矣亦時神怪焉先天中其寺之佛事具足如向之稱者無何水火災生民流沉溺于是邦其寺之佛事卑而拱立者跪如受教諭者執樂而絃者吹者衛而荷戈叱者皆毀也散其宇皆落唯尊而坐者獨巋焉而存由是納去又重其莊敬焉數歲其鄊人後生敵惡者十誡其三四故此鄊之人思其功力復求而歸之與其敵惡誡而敬順之道而嗟咨乎忠信仁誼不舒信於人久矣而皆以已生來生之後因緣禍福之説化行焉今余因長老請余記移佛之由遂得道教之所以意者欲使群生隨其機以悟之其機髙者性惠見其內像而內覺發其心而能至其正其機下者其性回見其外變反其心而後賔其正是故精鹿其內外之像以陳之謪椽江齋記謪椽沈亞之廨居負江方葦為墻止于隄防之下堂序四鬪巽隅道門雖江風奔怒鷗漾鷺澡顧簷廡之間而拏緒不彂方暑即盡提枕簟假庥於弗域之中雖緇衣煩猒乃陽為不省也一日謀解其西廂將面水以敞之而筆吏王局前語之曰椽俸簞而食或不能給尚能及堂屋之為乎且廨宇非久託即更之得不為尤矣况葦茅之葺輕弱易腐人人動歷歲時寧任再滿所用直使罄裝併食以為之無所顧則郢壞阜磔而澤遊木生多不能材漢流聳急束筏寡上縱有必修巨重價又不當是用曷若無易其故歟亞之曰誠爾也然則吾以為肝者膽附庸其中為棲魂之館故能専視而佐意隨姿而啓情今漢流右吾之居不過數步壅擁之患不得日覩由鄰顔冉而不親其德也吾何能薄其實而厚其浮哉遂召工人庸人茅塗之者與計之磨淄洗故得充用者十五太守聞之與其薪十四其餘則搜剪輔輔然後配材􅈬搆雖細短不委各輻湊以任一棟七柱助枑楣二桶覆厦狹廡重左而單右若翅之將朔然蕉旗竹篲分植叢列為帚風篩月之餌方檻短折面江虛波炳嶂委霞影對綵紅碧幟捨奔給於所曯逺邇髙卑龍苦交黨為宵清曉爽之借暴隂色蒸雷扇蹈震神冶鼓熖如金縆騰摎趠䋴䎀切于聿為颭燭揮鋩之駭蓊然頽雲若然漏曜倐閃熊狀若笑若怒相為端緒馮坐之中足以自廣時大和五年五月十九日也杭州場壁記國家始以輸邉事塞不足於用遂鹽鐡榷沽為助使吏分曹計其入於郡縣近利之地得為院鹽埸之署以差髙下之等顧杭州雖埸耳然則南派巨流走閩禺甌越之賔貨而鹽魚大估所來交會每歲官入三十六萬千計近歲淮河之間頗聞費自是汲利之官益重矣前年亰兆韋子諒官始縣主簿有能名及秩謝當歸是時尚書職方郎崔稜為揚子留後使聞其行遂邀署之既到滿歲利榷大登吏無敢怠與其縣主簿加勤也或謂亞之學史詞無苟用是記焉復戒業寺記皇都左輔其屬縣朝邑縣令王鄆言能攺作便民當有緇衣遷寺戒業民不便鄆復之初蒲寇李壞光既虜其屬將收其散卒聚之長春宫城圜朝邑室廬皆殘燼寺宇益毁其後緇衣以為居近郭苦遊賔乃聚黨與謀遷之西缸縈垣侵社地又治殿廡諸墓墳隴當其下者輒平去是時鄆為尉固止之緇衣之魁得他吏與交通為助故尉終不能制日縱其徒於民間為禍福語以動惑之民無老幼男女爭相率以奉所欲顧畏已後耳及鄆為令乃元和七年也明年召緇衣宿老師弟子與語曰緇衣之道非能逾仁誼以無害故天子許留國中前者緇衣無狀徙其居西缸之上侵社地壞丘塜夫社國之尊祭也丘冢人之本也今而曹自為其居侵壞之是寧無害耶某昔爭之本淂身常栗栗抱痛願得自劾以快意今能亟復之幸善不能亦且論繫矣民聞之皆大喜故以其年十一月悉還其故九年余東適邯鄲走蒲關朝邑令為具既酣前奉於余因請以其事次于文東渭橋給納使新廳記渭水東附河輸流逶迤于帝垣之後倚垣而跨為梁者三名分中東西天廪居最東內淮江之粟而群曹百衛於是仰給唯平輕重之準為難即主官不職其咎何如哉長慶中得儒臣杜生以行御史主之能謹法整吏絶輕出重入之尤明量信敘無先貴後賤朝官曹士衛之所仰給者如取之家食焉居再歲加為外郎因指其署曰夫滑津傍控甸邑諸陵道左輔出入河東藩而公賓遊士過必臨我我儒世家也宜飭宇俟賢以誠其敬今公齋陋冘無足為禮於是盡去之募市其傑棟巨楹文梁徑桷既巳具構其中可敘百榻而儒良至者必與講談其道隨其能否而梯級之得久留其下者雖孱車弊衣則名日彰矣今觀渭津之創開署宇為嚴虛敞意者得無欲天下之士見其胸中之曠大乎沈下賢文集卷弟六
