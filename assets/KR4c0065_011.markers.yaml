  - {type: variant, offset: 0, length: 3160, content: 沈下賢文集卷苐十一碑文臨涇城碑墓誌僧靈祐塔銘涇原節度李常侍墓誌唐郭公墓誌故太平令李寰墓誌李氏墓誌韋婦墓誌盧金蘭墓誌表表劉薰蘭題劉薰蘭表碑文臨涇城碑臨涇之築跡於郝泚貞元年泚為涇將徳於軍軍中皆推其公嘗從壯數百騎出捕野還白於帥曰臨涇地扼洛口有洛川在泾州西北書扵臨涇其川絶饒利息蓄其西大野走戎道曠數百里其土乃流沙無能出水草當渉者盡疲即屯臨涇為休飬便地願以城控之可艱其來泚出其傍一人謂帥曰誠而泚言有是也雖然公自念之公所以䝉殊恩大幸子姪昆弟俱淂不業而官者盖以邊防未有可制上心日夜懸於此故厚公之事無所難今用泚言則邊已固公安倚耶雖戎不得越所趍而捕者復何以稱獲使上聞之亦且輕所憂矣遂不從泚計及帥死其校段祐代為帥嵗餘泚又白曰昔天寳時天下有兵為防者獨西戎矣而邊至王畿尚萬有餘里其烽呌之驚東不過燉煌張掖之間又有嚴關重阻盤錯之固綿屬於其中廼者燕人反安禄山史思憲明其邊兵强壯悉㑹難咸陽東而西陲復為所攻盡亡美地今王畿之傍列為邊郡飛烽傳候昏曉之際必奏于帝垣况未有可固今每秌戎入塞冦涇驅其井閭父子與馬牛雜畜焚積聚殘廬室邊人耗盡而又以一方便冝委决於將軍何以自塞夫臨涇之築於涇甚便前年泚白於故將軍不聼今日幸願將軍省計遂築城於臨涇以泚部鎮之自是戎無敢犯涇者元和初祐入覲因留宿衛後為帥者惡泚能强泾以年朽不任兵罷之八年余西道塞歴歧隴而邊人無㓜老盡能誦郝泚之功故余悉著所論勒其事於臨涇城墓誌靈灮寺僧靈祐塔銘十一年夏作釋家之法以弟子嗣師由子其事死送葬禮如父母由是籍書賛記之常名而不姓今通氏言釋者必祖自佛派分諸系于七祖各承其師之傳以為重望而律師光範者始為童子時事師曰靈祐且滿嵗師與其曹為狀喻之語而律師侍側輙達其至既學五年而通經記年及冠遂去髮被褐言語應引則老緇不能對矣大曆中詔度始成僧儀初居吴之嘉興空王寺其後緇衣男女相與誦其能於是俱使授學更居靈光寺遂與其徒講賛㣲言百流㑹歸之説自吴南北郡邑緇衣咸果受人人自得若濡露然又著㑹釋章句十五巻貞元十六年十月某日㓕于其寺之居僧年四十五夀年七十四遺言令其子弟曰當殯我寺之居西園中其後四年門弟子相與成塔於其所元和中途遊吴弟子明辯來求銘焉律師字楷其家本吴人其鄉里存吴之崑山縣曽祖師利開府儀同三司食邑三百户祖亢亮於潜令父君卿彭澤丞母河東裴氏其子與明辯之列凡六人皆童子受學是哀事之儀由子也作銘其詞曰惟寂之門嗚呼已矣匪媾匪肓孰後尔已能傳其心即繼乃嗣以圖我銘以紀萬祀涇原節度李常侍墓誌府君諱某太尉武穆公光弼之少子也為人儉毅意氣祖楷落自匈奴提其屬來入始為唐臣累遷至將軍贈司徒武穆既壯當天寳末以平燕冦有功故公於提襁之間得賜校書郎武穆薨公少無所倚薛兼訓憐之奏試殿中丞後從朔方軍事汾陽王於邠又從東平軍事李正已於淄青正已悖公説之以善語雖不從然得重賜與馳歸即從宣武軍司徒勉公使於亰而賊希烈攻勉城拔公不得赴乃從淮汝軍事哥舒曜扵東都興元中行營為先軍得試將作少監兼侍御史後從義成軍再事賈耽於滑得兼御史中丞貞元九年入為左神筞左將加都將元和初加御史大夫二年出鎮同官四年加右散騎常侍遷宿州刺史七年改安州刺史九年入為右羽林將軍十年春加左散騎常侍拜節帥涇原既至聞士䘚前以食不賑而鬻子者皆與贖歸之夏六月公疾發視政不能勤七月十二日薨行年五十九贈工部尚書彂御府粟帛命官即其家吊勞生子男三人女七人長女適焦氏娶竇氏夫人生嗣子罕夫人䘚娶潭氏潭氏亦早䘚公將葬使上兆兆言合葬不冝罕從卜竟祔先將軍太尉之墓於華原其原乃用亞之為誌以銘其所詞曰惟漢都尉肇自其源居彼北方繼世不還乃公之祖始為唐臣武穆嗣毅即我家勲帝念不忘公亦為藩乃葬王畿北指華原嗚呼哀㢤惟功與魂千古不泯唐故銀青光禄大夫檢校左散騎常侍兼宫苑閑厩使駙馬都尉郭公墓誌府君諱某其先関西鄭人也大父汾陽王始以戎勲著績為朔方軍副使天寳末玄宗南廵巴蜀肅宗劳兵于靈武乃率其義虜順夷合兵逐叛得為朔方軍節度既而二駕還都拜為中書令統兵於外代宗初家享年三十七太后聞之驚悼悲哀使者自中宫者出按問彂疾之狀月餘乃解以其年十二月十九日葬于亰兆某原之上初西河主前降呉興沈氏生子男一人及郭氏之喪無後而以沈氏之嗣為之主辦卜葬有期主喪者使其家吏牽馬操弊至于擽陽即尉家曰尉之文記事有聞矣願得為之銘以誌其壙於是與叙勲興之事表于墟中云詞曰河族崑崙命源惟長跋于神華其來泱泱影響邁㑹披華吐章靈􅊚氣交鼓而興祥陶以精神􅉼為濃光保我國步乃生汾陽在户作扄横天為梁息災破難以藥疾瘡帝子入室固知維綱孫為國母沙麓以昌少為姻臣謙寛汪汪祿而不夀哀彼中霜惟其流慶與唐無彊故太平令李寰墓誌長慶元年故太平令李寰之䘮其妻沈氏挈其稚嗣哭丐於􅊚黨之門以事其殯事將具命其族亞之為銘以誌其壙府君唐之裔也其先奉髙祖入関定隋封定州刺史曾祖承昕為鴻臚丞丞生少連為溵水令令生牟為梁縣尉尉生府君世以宗廕調官䘚無達顯貞元中沈氏始以外戚隆貴而胄得為列卿掌太府乃以子女歸之府君府君貧附其屈而家仰給為生元和中調為太平令䘚於官舍親黨語為善人多痛之銘曰廓乎圓穹覆乎萬古之中賢者或塞而夸者或隆唯達識不窮善人有終哀㢤沈叅軍故室李氏墓銘漢孝武時匈奴累犯塞夫人之先為都尉出居延力戰且陷遂與其部居胡中為貴落其後入唐為功臣世世以武績顯至大父臨淮王光弼父尚書彚皆為帥長及父没門下客沈亞之請其屬以夫人歸于從祖之子曰稱師從祖諱房當代宗時取良家配帝其姑以妃受選入宫生雍王沈氏之先繼烈組冕顯於籍牒者皆由文學及徳宗即位追尊皇太后太后昆弟父祖既追封矣其子姪皆䝉寵廕遂以房為將軍執金吾冕為卿掌太府羽為駙馬都尉尚長林主夫人既嫁三年而䘚生子男未能視在元和十四年正月六日具葬城南次于沈氏之隴作銘其詞曰冗葉雖荣逯霜霰兮勞飈罹災延而眉兮韶妖之葩笄刻晷兮觸烟寤露條委衰兮玄金蒼礫安静鎔兮紅瓊海碧包脆危兮嗚呼夫人曷而得支姑啼夫哀叢咽伊兮姉弟酸屑垂涎洟兮悽風送魄罇生漪兮黄壙圓隆緘若惟兮明能之魄來而安兮無越違兮韋婦墓誌四年春作夫人姓王祖曰楚天寳中為吴王府司馬父曰新貞元中為杭州文學䘚母河南姚氏永貞初歸夫人于京兆韋氏夫人之歸年始十四已能成婦道年十八暴疾亡亞之姉乃夫人諸父之兄嫂也或謂􅊚家之䘮必有􅉠亞之貧無貨請以文易之故韋氏妻之䘮沈氏得為銘誌夫人之邦曰琅邪夫人質多於容行多於和豈天不命於夀不多耶實既命短可柰何已矣蓮湖之西靈山東趾南極于江近十五里元和三年四月庚子而琅邪氏之骨歸于是盧金蘭墓誌九年冬作盧金蘭字昭華本亦良家子家長安中無昆弟有姉四人其母以昭華父殁而生私憐之獨淂縱所欲欲學伎即令從師舍嵗餘為綠腰玉樹之舞衣故製大𬒮長裾作新眉愁嚬頂鬢為娥叢小鬟自是而歸諸姉不為列矣因恚泣謂其母曰今我不等我不若從所當耳年自十五歸干沈居二年從沈東南浮水行吴越之間從七年乃還都又二年沈復東南而昭華晋止亰師不得随病且逝從沈凡十一年年二十六生男一人女一人葬于城南尹村原之下作銘其詞曰野遼㓨兮衆草羅生颼欝蓊兮孰先殞零綺顔奄忽兮辭金楹去何止兮歸無程芳霍紅荃兮昔所遲今銷亡兮不可再馨魂魄歸未兮復此園瑩表表劉薫蘭劉薰蘭者洛陽中女子也字嫣蓀故居家時名鄭兒元和九年年十六房叔豹来求彈絃者其母以鄭兒入焉後以善笑得大悦曰更名薰蘭叔豹為人喜酒多廢薰蘭勉之曰某以孫稚䝉君曲悞之愛使得奉巾饌誠不足以正非是然而君之齒方壯且又足給幸痾恙無有乃終日碌碌自堕如即至力旦暮將何以㧞之若終不更則親戚友朋視君若某皆貊之乎於是房叔豹蹶然自晷遂取古籍詩書併學之是嵗余罷隴西軍來舍房氏始聞其語囙嘉之遂為著篇以繼勸且古語有云女為悦已者容亦見其志也如薫蘭之能引媚其志歸於至理豈不知賢女之為容題劉薰蘭表後南卓昭嗣余所善房叔豹豹好色得劉薫蘭最為嬖後即不復頋他色始余與房宴言薫必預故余得周視薫所舉凡為言雖尚才功柔戲以樂左右而徃徃甚正余獨恨對蘭薰凝視之移晷刻將有嘲𫐠䘚不能云云顧余才不足當語薫耳十年冬余友沈下賢抵豹居下賢誠才尤精為太史公言一見其書果能備薫善時余貢於亰師豹與張孝摽羙喜言文并挑笑事因録沈述來余知薫之色而待沈之才才色両相冝耶故復叙之以繫于沈左沈下賢文集卷苐十一, WYG: ''}
