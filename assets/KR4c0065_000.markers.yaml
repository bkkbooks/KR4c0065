  - {type: variant, offset: 0, length: 0, content: '', WYG: 欽定四庫全書集部二}
  - {type: page-break, offset: 0, content: '', id: KR4c0065_WYG_000-1a, image: WYG1079/WYG1079-0001a.png}
  - {type: variant, offset: 3, length: 0, content: '', WYG: 集别集類一唐提要臣等謹案沈下賢集十二巻唐沈亞之撰下賢亞之字也本長安人而原序稱曰吴興人以從其郡望然李賀集有送亞之詩亦曰吴興才人怨春風又曰家在錢塘東復東則似真吴興人矣唐人里貫多錯互不得其真未之詳也亞之登元和十年進士第太和三年柏耆宣慰徳州辟為判官耆罷亞之亦坐貶南康尉是集凡詩賦一巻雜文雜記一巻雜著二巻記二巻書二巻序一巻策文併對一巻碑文墓誌表一巻行狀祭文一巻杜牧李商隠集均有擬沈下賢詩則亞之固以詩名世而此集所載乃止十有八篇其文則務為險崛在孫樵劉蜕之間觀其答學文僧請益書謂陶器速售而易敗鍜金難售而經乆送韓静畧序亟述韓愈之言盖亦戛然自異者也其中如秦夢記異夢録湘中怨觧大抵諱其本事託之寓言如唐人后土夫人傳之類劉克莊後村詩話詆其名檢掃地王士禎池北偶談亦謂㺯玉邢鳯等事大抵近小説家言考秦夢記異夢録二篇見太平廣記二百八十二巻湘中怨觧一篇見太平廣記二百九十八巻均注曰出異聞集不云出亞之本集然則或亞之偶然戯筆為小説家所採後來編亞之集者又從小説摭入之非原本所舊有歟此本前有元祐丙寅重刻序不著姓名錢曽讀書敏求記乃稱為元祐丙申刻考元祐元年嵗在丙寅至甲戌已改元紹聖中間不應有丙申盖即此本而曽誤記寅為申又是集本十二巻曽記為二十巻亦誤倒其文也池北偶談又記末有萬厯丙午徐􅎾跋此本無之而别有跋曰吴興}
