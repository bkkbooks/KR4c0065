  - {type: variant, offset: 10, length: 634, content: 夢遊仙賦柘枝舞賦古山水障賦詩虎丘山真娘墓春詞贈元微之題候仙亭荅殷尭藩贈罷涇原記室望前舡寄侯郎别龐子肅春色滿皇州宿白馬津寄㓂立舡行見張秀才送文潁上人遊天台寄王直方題海榴樹呈八叔大人送龐子肅西蕃請謁廟觀百官獻夀山出雲曲江亭望杏芲彂苐二卷雜文湘中怨觧文祝延有引為人撰乞巧文祝樠木神文雜記秦夢記苐三卷雜著夏平旌故平盧軍節士萬勝崗新城録魏滑分河録學解嘲對第四卷雜著異夢録誼烏錄李紳傳馮燕傳郭常傳嘉子傳苐五卷記上河中府歌者葉記閩中開新池記壽州團練副使廳璧記盩厔縣丞廳記都梁山倉記新葺設􅈦記隴州刺史􅈦記第六卷記下擽陽縣丞小廳記解縣令廳記兵法尉廳記移佛記謫椽紅齋記穆州塲壁記復戒業寺記東渭橋給納使新廳記苐七卷書上上家宫書上李諌議書與薛浙東書上壽州李大夫書與王中丞書三首與李給事薦士書苐八卷書下與潞鄜州書與潞府盧留後書與同州試官書與亰兆試官書荅馮陶書荅李生書上鄭使君書荅馮兄書荅學文僧請益書苐九卷序送張從事序送叔父歸覲序送田令二子序送韓北渚赴江西序送韓靜略序别前歧山縣别權武序叙詩送李膠秀才送杜憓序送同年任畹歸蜀序送受䧏城使序叙草書送山人王傳乂送洪遜歸序行勉贈尅躬先生第十卷䇿問并對試進士䇿問省試䇿三道西邉患對賢良方正能直言極諌䇿苐十一卷碑文臨涇城碑墓誌僧靈祐塔銘涇原節度李常侍墓誌郭公墓誌故太平令李寰墓誌李氏墓誌韋婦墓誌盧金蘭墓誌表表劉薫蘭題劉薫蘭表後苐十二卷行狀祭文為宿賔譔行狀為韓尹祭韓令公文祭李少尹文祭胡同年文祭故室姚氏文為人祭媵者文劉巖夫哀文祈雨文郢州脩明真齋詞沈下賢文集目錄, WYG: ''}
