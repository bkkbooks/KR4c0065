  - {type: variant, offset: 7, length: 1, content: 譔, WYG: 忠臣義士有以憤激今詔既下王師鼓行視彼兇殘坐見殱蕩誠太山洪河壓卵注螢不足以喻然衆君子備詳前志多綜流略必有善師善戰之術七縱七擒之方一為指陳悉徵備要將求其可上達宸聰如或出乎竒祕亦當明密以聞獻對亞之提筆之士也區區討論之間迷失聖意究未能得安足與論功伐之事歟雖然前嵗亞之覽古於濠梁從容觀魚之地而濠人有習知蔡兵舉止者嘗謂亞之曰自吳少誠叛已來王師曾㑹徳宗尊仁宥罪詔天下悉罷襲蔡之人雖䝉恩然日夜益訓甲卒堅城深壍芻食盈廩積至今十五年餘未嘗一日忘戰非有他居反側之間唯恐為所襲耳而四境之郡備禦已罷雖數更其守未嘗聞一守留心下人牧愛百姓皆能名虚軍畜肥私狗馬田園陂池之利用以自入務行金繒卜射幸臣祈遷乎善地而蔡益知其境之虚果因喪而横前日夀州失利則固然也今又欲兵徵四方使來㑹用於小凡蔡即北取趙魏燕齊西取寧隴邠岐西南巴漢南取甌閩東取吳越皆是提逺趣而萍合相容於其山川險易曾不影響又未聞其將軍稱者使其士卒一有父母妻子之念是寧能死志一方安所為聊且勞給非所為也争鋒則失利坐守則厚費今議者或以為不足於給皆非也而屯集師旅亦非也今必欲不計時而誅之獨有使才人為近境之郡至則籍其郡人父子兄弟五十已下十五已上除習兵務農無得自用者如是不日而兵足用賊可滅矣其餘未可利也如其擒縱之法出於一時者不可先以悉數謹對第三問問贍軍國給公上出於物力其賦稅之謂耶煩則擾罷黎省則乏經用縉紳多士之論及此也莫不曰擾農困商敦本抑末知倚市者為弊梓稼者誡勞必在乎慎擇臨長之官加重耕織之出今牧宰非不選也而富庶未至衆貨非不制也而粟帛猶輕用何方可以致龔黄蒲密之理以惠康吾人用何術可以均衣食緡錢之饒以利澤南畆斯上心所注亟以延問觀光之士期為指明對百姓之貢輸賦患不在重而在於勞逸不均也今自謀叛以來農勞而兵逸其租賦所出之名不一猾吏撓之後期而輸者則鞭體出血若聲仍終不得䝉不忍欺故豪農得以蠧奸賈倍之而美地農産盡歸豪奸益其地資其利而賦嵗以薄失其産者吏篤其不奉而賦嵗以重是以割姻愛棄墳井亡之他郡而不顧亡者之賦又均焉故農夫蠶婦蓬從鹿走於天下而道死者多矣由是商益豪而農益敗錢益貴而粟益輕也今返之法必在刺史長吏而擇其良者使久留於任一年政成者一階之官一嵗一加之三年而政成者嵗加之異政累聞者五年而後遷之連率不如法者削其本不得齒則庶幾乎其化矣謹對西邊患對元和十有二年夏六月亞之西出咸陽行岐隴之間採其風得西土亡降故老謂余言邊之所以為患可痛之狀辭未條悉或短曰惟叟以西戎蠕蠕之旅而為邊出苦言使聞北塞匈奴雜虜之風叟曾不哭也盖天子之憂甚勤與師長分節符給所用以事邊何因對曰不然今言所以為患者非一因此而邊兵不得習伎險不得為固百姓不可為生如此吏尚輕易之然則北虜匈奴雖以逸馬强弓乗嚴時南馳其來衆不過數千其所掠民財貨一人所舉而巳由鷙隼不能止屯兵留塞且北過千里而屬烽望其興塵知奔蹄之幾受降城故事云虜南下望其塵髙下則知衆寡視其狀則烽燧次發然後收民畜嚴壁而待之且每嵗八月戍有清野之火使其馬無所食彼縱至不暇解鞍而旋矣而西戎則不然其衆蟻聚多包山川沮陸之利其兵材雖一不能當唐人然其策甚逺力戰不患死所守必險所取必地而唐人軍中以為材不能皆易之故自安西以東河蘭伊甘及西涼至於㑹寧天水萬三千里凡六鎮十五軍皆為西戎有由易而見亡也聞其始下涼城時圍兵厚百里伺其城既窘乃令能通唐言者告曰吾所欲城耳城中無少長即能東吾亦謹兵無令有傷去者城中争呺曰能解圍即東其後取他城盡如涼城之事由此人人皆頋生無堅城意自羅其策以來為語相傳尚近奈何客獨不聞其說乎岐隴所以可固者以隴山為阻也昔其林比繁故戎不得為便道今盡於斬伐矣而蹈者無有不達且又虚兵之號與實十五又有非戰鬭而役入山林伐麋鹿羆麏麝豪豕是徭者居十之三窮巖險障剃繁取材斤聲合叫不息於寒暑是徭者居十之四發蓄粟金繒文松大梓竒藥言禽薰臭之具挽轅於陸浮筏於渭抵咸陽入長安部署相屬是徭者居十之二其餘兵當守烽擊柝晝夜捕候者則皆困於饑寒衣食或經時不賑顧其心怨望幸非常尚能當戎耶是皆賴主上神聖彼戎畏其化而不敢東刄今岐隴之土甚饒農食不充秕稗衣結縷無帛布其租税納粟官一而耗倍細吏憑法而要賂賂厚者雖逋亦寛之粟雖後至必亟與符賂薄者或稽一日即白吏笞之粟當輸則曰次當某人又當某人故有累日而不得倍數矣其他征徭倣此農盡所穫不能也出其費尚無不忍吏視民由蓬息而處又何聊生今所患衆多其略可痛如此長吏終不省尚輕易之噫奈何為不困賢良方正能直言極諫策二道太和二年朕聞古先哲王之理也𤣥嘿無為端拱司契陶甿心以居簡凝日用於不宰厚下以立本推誠而建中繇是天人通陰陽和俗躋仁夀物無疵癘噫盛徳之所臻夐乎其莫可及已三代令王質文迭救百為滋熾風流寖微自漢而降足徵益寡朕顧昧理道祗荷丕構奉若謨訓不敢荒寧任賢惕慮宵衣旰食詎追三五之遐軌庶紹祖宗之鴻緒而心有所未達行有所未孚由中及外闕政斯廣是以人不率化氣或堙底災旱近嵗播殖愆時國廩罕蓄乏九年之儲吏道多端微三載之績京師諸夏之本也將以觀理而豪猾時踰檢太學明教之源也期於變風而生徒多墮業列郡在乎頒條而干禁或未絶又在乎按度而淫巧或未格俗恬風靡積訛成蠧其擇官濟理也聽人以言則枝葉難辨御下以法則恥格不形其阜財發號也生之寡而食之衆煩於令而鮮於理思欲究此繆戾致之治平兹心浩然若涉泉水故前詔有司博延羣彦佇啓宿懵冀臻時雍子大夫皆識達古今志在康濟造庭待問副朕虚懐必當箴主之闕辨政之庇明深條之所紊稽庶富之所急何施斯革於前弊何澤斯惠於下土何施而理古可近何道而和氣可充推之本源著于條對至若夷吾輕重之權孰輔於理嚴尤底定之策孰叶於時元凱之考課何先叔子之尅平何務維此龜鏡擇乎中庸期在洽聞朕將親覽對曰臣聞古者君天下之心也上降下應還若影響夫以身而養人者下以父尊之雖衰而無怨此神農之俗也以道而覆人者下則欣戴之雖衰莫得離其下此黄帝帝堯之俗也以義教人者下以神敬之雖衰而無慢此舜禹之俗也以刑戮而驅人者下以刑戮而畏之不俟衰而刑戮復矣此桀紂之俗也今陛下廓神睿之宇臨天下將三嵗矣索舉賢良待問之士聚而俯吿悉徵所達以輔於明臣幸得見墀級之嚴陳王由户之道臣之所奏善户有三神農唐虞之化是敗户有一桀之亂是彼三善之户其門甚闢皆可循轍而進唯在陛下命車而已矣制策曰厥聞古先格王之理也𤣥嘿無為端拱司契陶甿心以居簡凝日用於不宰厚下以立本推誠而建中繇是天人通陰陽和俗躋仁夀物無疵癘噫盛徳之所臻夐乎其莫可及已三代令王質文迭救百為滋熾風流寢微自漢而降足徵益寡者間有以古先𤣥嘿無為之化及三代質文迭救之法易難相殊者臣請指數而奏之夫數之始生起于其一而歴乎多數在盈十之間雖童子且能屈指而數也及延乎億兆塞乎天地雖明大人猶難舉籍而造其極夫饕者始生魄于嬰而蠢于䝉䝉嬰之時不俟更乳而飫矣及形具氣周設肥牛之肩加百品之佐不足以塞其饜也是則太古之人衆庶之俗其由數之竒寡饕之䝉嬰乎無越無踰蠕然濡之無營無慮愧守俟煦為之君者易其化五帝主之何以異賁育之材舉一毫而趨也三代以降衆庶之情缺變之俗其由數之億兆饕之周牡也君之者廣法制以御之飾禮義以導之明賞罰以齊之然猶不能使下表夸無益也臣聞聖人髙明而道中庸者法常制定使人無加踰于飾度猶恐其乆而為弊即以日新之言以勸誨使不為常也如其臨理有常制豪猾何致踰檢乎講習師受有常學儒者何致廢墮乎黜陟幽明有常令列郡何致干禁乎車服室屋有常度工者何致婬巧乎易問先迷失道之常也然照育之神不測者以其既弊于夕而能更興于晨使其光日日新也伏惟陛下觀日新之道以張化源復何俗恬風靡積訛成蠧之患乎制策曰其擇官濟理也聽人以言則枝葉難辨御下以法則恥格不形其阜財發號也生之寡而食之衆煎無已臣恐鑠於所制也伏願陛下脩日新之徳察善政之臣行尅已之令以拯其弊然後可以垂衣而化也制策曰故詔有司博延羣彦佇啟也陛下如能用其道可以澤惠下土也如使理古可近者其在明禮樂仁讓也若使和氣克充者其本在和人心之邪愠在理之雅正也其理怫者衆氣稚其理明者衆以洽夫衆庶之情和平愠抑之氣吁而散之大空還㑹于風雲合于水土包聲于陶埴之器每嵗附陰而伏乗陽而昇衆庶之氣雜于陰陽陶于變化者由麴糵乎愠氣居于中則戾戾則悲悲則水潦敗抑氣居于中則悖悖則亢亢則螟蛾生平氣居于中則序序則得常得常則風雨節寒暑時和氣居于中則泰泰則有餘有餘則交讓於變化涵而為休寳流而為精神洋衍乎祥光沛濊乎佳澤臣故曰充和氣者在調人心也制策曰若至夷吾輕重之權孰輔于理嚴尤底定之策孰叶于時元凱之考課何先叔子之尅平何務維此龜鏡擇乎中庸期在洽聞朕將親覽者夫廩畜之所賢者在乎賤入而貴出使人無所困饑於凶災傷勞於豐賤也夷吾之權微不可也從古已來西事戎者或辱于盟而困于嫁非有他由擾其鋒而侮其醜也及其所窘搏則啁物以其兵矣戎夷之生無以異也故聖王備而不擒也嚴尤之言亦可徵也自長慶寳厯已來金紫銀朱之佩盈于朝逸于郡國有紀何者今日布令明日而隳使人無所守是以紀綱不振也且教令所以設備為防也綱紀所以制物樞用也是皆虞患難拯困也人有赤子沈于水火者為之父母必將奔往而拯之使免於苦及無為救者則必坐悲而泣望也為救之具必在長綆之鈎修竿之抉乎有備而防者父母之人也無具徒手者雖悲不信也今陛下之赤子亦以困於是矣陛下亦將拯而免其苦乎今法制委弛維綱不樞則是修竿長綆之鈎抉不為也陛下居于九重臨于兆庶得無有坐悲泣望之恨乎臣竊為陛下懼不仁之尤於後代也伏願陛下擇忠言以廣其明察智謨以周於用一刑賞以信於令薄賦斂以息其勞慎禁奪以省其犯審獄訟以愛其生如此水火之陷不牽於瞽聵之俗矣多濟之防充列于無患之朝矣若是又以為不理不康不惠不仁非臣所知也謹附聖條陳寫大略冒黷之罪臣何敢逃謹對賢良方正能直言極諫策長慶元年皇帝若曰盖聞舜禹之有天下也起于側微積徳累勤多歴年所盛聖人慮豈有遺哉然由好問察言勤求賢士盖以承祧之任重憂人之志深也况朕長於深宫涉道日淺奉列聖之鴻緒撫萬㝢之矜人夙夜嚴恭不敢有懈實懼燭理未究省躬未明所以詳求讜言以補不逮子大夫是宜發所藴蓄沃予虚懐當極意正詞勿有所隠昔王者之政必臻于康泰霸國所立猶致于富强我國家提封溢於三代酌憲兼於百王無堯湯之災積祖宗之理而人未蕃庶俗尚彫訛家無盖藏公闕儲偫卒乘之數貨弊之資統而校之莫繼前代豈率土生殖變於古歟將阜時政令戾於今歟固已揣摩必究利病明徵末失之漸具陳興盛之謨且文武兼學以成身仕農迭居以豐業故家給足以戀本才周足以應時近古各循一端不相資用致令從事異心難于成課民佚無守輕為惰遊指明共貫之方期合二途之利永言化理期酌厥中施為或差得失斯逺將修睦勸善則在下難知將任數馭情則人心益偽思聞指要得合誠明精别比周之情敷詳忠厚之道知人則哲從古攸慎九徵恐泥五事難精或望可服人而才非周物或言皆詣理而行或乖方宜陳取舎之端用彰真偽之辨至於朝廷之闕四方之弊詳延而至可得直書退有後言朕所不取子大夫其勉之對臣伏念目之包明其在昏夕之時則與盲者等及屬日䝉光乃能寤𤣥黄披萬類傑智之才其處濁俗之中則為愚者混非遭聖偶時安能樞陰陽育萬物其理一也盲者雖䝉光莫能視愚者雖䝉聖莫能賢其理一也故舜禹翔其光於上益稷之徒周其視於下其中縣白日而省離婁也三代以降君之光微臣之智狹見其手而迷其足覩其前而昧其後其由舉燭螢而臨庶目也今陛下神光洞天鑒彼幽塞猶懼理之未至故親省羣言而臣瞽愚非能逾于智傑應陛下之清問臣以相與貢臣以賢良應詔微臣所冒非任當伏竄弃之尤不足以塞罪乃輒伏進所敢言臣伏讀睿問周視聖㫖見陛下思天災之病也臣愚以為皆由尚書六曹之本壊而致乎然也今請統而條指之睿問有念人俗之彫訛及于卒乘之數貨弊之資臣請以今之户部兵部之壊舉之睿問有才周於文武本固於士農臣請以禮部工部之壊舉之睿問有欲以辨行之真偽臣請以吏部之濫舉之睿問有以朝廷之闕臣請以刑部之失舉之睿問有四方之弊臣請以山東隴右之急奏之伏願陛下詳臣之言察臣之志無以臣微而忽其奏也臣聞周設六官以統百辟立國八百年其由綱之不絶於所制故也太宗龍興革魏晉之殘政修法度立中書設尚書六曹以序班文武以條系天下號令既布而萬方區矣愛其人若愛已之徳保其黎庶若保幼子恐其有墜也故明四目以先其視指教其未見也達四聰以先其聽開喻其未聞也尊賢之言而為視聽視聽先張則黎庶不陷於災害而康泰矣後代雖有盜臣姦夫而終不患其亡由綱之不絶于所制也夫尚書六曹之設猶人之有六腑也耳目口鼻之樞系于元首手足之用闗于肘膝其氣根血脉皆統于六腑符而命之然後能動用失其用者非邪則眩夫人莫尊於首故足司其履指司其所執百體之司各勤其用則首安其尊而不勞首之處身猶君之居上也百辟以位則君安其尊而不勞明矣今尚書六曹外雖備其官而中實繆今之俗凋訛者其由户部之綱不理也昔户部其在開元最為治平當時西有甘涼六府之饒東有兩河之賦仰給之卒不過四五帥其餘利殖所入盡與齊人四十年間富庶滂洋之若是及一日上恃昇平之功相肆威驕之佷直言得死諛色或進轉掌之間清蹕巡于巴蜀矣今西涼為虜兩河為兵盡開元天下之兵不過當今數郡之卒勝衣之農而百徭出矣鞭役重繁不勝於籍𣙜之不顧其害刑之不問其深吞危衆多欲無凋訛不得也兵部之選武士益繆矣武夫試射百矢為重騎射次之騎戈亦次之此武夫賦者之宜業也而真者百無一焉其餘盡買豪奸之輩役者以待冒入奮戈戲馬者亦得中名則估肆富人之子弟彼安能致武之所用顧欲占籍自恃以逭傜於鄉閭耳而欲卒乘貨弊之充强臣未見也今兩河之間至於幽薊連屬西邊北邊而仰給之卒多於其土之齊人十九在兵部者所操曾不能制一校尉而况紐其綱乎古者兵農之一體也三時務農一時習兵故春耕而夏植秋藏而冬講武誠願使兵部之綱維根於古道之要兵部之令加于將帥之臣則本久益大矣何卒貨不充於古哉今禮部之得進士最為清選而以綺言聲律之賦詩而擇之及中為仕也則責之不通天下之大經無王公之重器今取之至微而望之甚大其由擊陋缶而望曲于韶濩也今仕進之風益壊矣必以陰詐為朴陽明為狂顧以武為汚矣而况兼學乎陛下何不令禮部之臣督其所業雜考其所能則人可化矣夫惟博大之士為能兼學耳夫持綱舉維非博大之士不能也夫求博大之士非竭誠不能也故殷宗之竭誠于神神感于夢而得傅說周文之竭誠于氣氣感于兆而得太公陛下如能用殷周之誠而求之何患用才之不至矣今工部之綱之不舉其由百工之不條理焉且務於濫則能速壊惑于邪巧則多改作速壊相仍改作無巳欲使財費之不窮工力之不竭臣未見也夫堯之功與天比覆居於土階之上䕃于茅茨之下土簋而具禹親勤水而卑宫室是二君者非不能極巧侈之端故處陋而無厭蓋欲使天下之人自然而儉易也而周官百工之職一於六職之書詳矣其後昬君亂主未有不極遊觀之娛窮巧侈之樂恣羅紈之靡雖有生植之衆不能足充虞人之裁雖盡隴畆之農不足塞百工之役雖竭蠶媍之勞不足給綺綵之貢秦隋之末君不如此不足以隳社稷今仕家不著籍於鄉閭亦巳矣則農夫唯恐他業之不容于趨也安肯顧其本而戀其土哉伏願陛下仰堯之聖敬畏秦隋之敗奢念漢之節險凡在百工之用闗於將作内作技同者必使統於工部以觀制作之度使勞費之怨不起於下人則堯聖禹明周規漢儉為陛下擇耳何止士農之固業哉今吏部之補吏嵗調官千餘其試以偶文儷語之書程以二百字為准考之能否以定取舍直使其人真能然尚何以補况十九皆偽人乎以是而求其實不可得也且昆吾之利莫邪之才雖巧用不能雕咫尺之木鷙鳥之羅雖善掩者不能拘蚊蚋如使恢宏博大之士裁心鏤舌於比辭而其道安可見乎陛下何不命羣官立於朝者嵗各貢所知各以其所長試之各以其器任之不勝於任者罪罔上闕其貢者罪蔽賢而洽聞者爵逾次禮部吏部以時舉籍刑部督其不察如此則人人争好賢人人務克巳何患乎真偽不可辨哉今朝廷之闕衆多其最闕者刑部刑部之綱不舉其由賞罰之不信勅令迭降而相違故有行之於今日而廢之於明日罪之於此而赦之於彼是謂慢易詐欺之藪耳欲無枉撓不可得也誠願斥其煩苛去其相逾則人人易守難犯然後命儒賢究掌之不明於此者不得為刑部之官無令猾賊之徒輕身重貨竊法以自弄如此則清矣賞信刑果則逺罪修已之風序今非止於闕盖將病且痼矣夫病者其在皮膚則易也六腑尸繆氣非所經而其體痼不亦危乎臣請以醫方之言諭國之病伏惟陛下察焉臣聞良醫之理痼也陳以竒方進以猛餌外以針火導其血絡藥病相攻戰于其中及痼解病瘳六腑亦憊於是竭良材調徳膳以味從而補之然後六腑平百體正内强而和外矣夫近代之愚醫則不然必使病勝而形羸不危其身者稀矣三公六曹國之六腑也果刑信賞國之筋絡也九州百郡國之百體也四夷八蠻國之外膚也驕荒淫異國之痼病也嘉謀長算國之竒方也强將勁兵國之針火也禮樂法度國之徳膳良藥也夫百駭具於外六腑列於内相假而成生相致而動息本為一身也及一腑失理容而不攻其乆日大攻而不除其乆為痼除而不補其乆復發為瘵難矣臣以為天寳胎痼始於一支乆而容之侵及百體幾危其形𤣥宗肅宗除而不終痼反興元徳宗之時又無良臣可進内强之術而攻不就先皇攻于除而不攻于補今乃復發于幽冀居國之左足又有西戎之屬居于右掌之膚涉腕逾肘今已及肩何以知其自掌而及肩也以安西至於涇隴一萬三千里其間嚴闗重阻皆為戎有由此知其及肩也則王畿界戎無五百里此肩之去喉能逺乎奈何容而不除也此皆發于中朝之闕而流其病也若四方之敝莫若山東隴右之急莫若武備之不至又請詳舉之夫聖人之母萬物必體天地之功故以陽為文教極其光明也以陰為武備盡其肅厲也夫陽盈則韜而陰藩之陰盈則復而陽濟之故能相理而不亂五月陽盈使一陰居其間明正陰之有位而盜陰不生故聖人因之修武備至于十一月陰盈包將來之陽可大可乆也故外作雪霜以勵之恐僭陽之通也内密燠而養之使其為文為光也故聖人因之求賢以為輔雹凍霜雪禁其煩蕪陰用也故聖人因之以正刑雷風為前驅蕩其所不通温光從而舒之陽徳也故聖人因之以文宥是以聖人之徳文雖光而武備不去前年淮夷擒齊魯滅常山死幽燕歸臣未見制法有方法也而議者且以為兵可戢也遂用羸將守常山滯儒臨薊北不旋踵而賊氣復振矣伏願陛下慎動誡盈無傷陰之大候且行化而使人舉兵在立勢夫百斛之車百蹄之牛不能揺其轂如措之峻坂之上授之力者不盡數牛及轟然而遷則牛足之運不及輪奔矣此立勢之樞也今幽冀之兵其由病者之再病矣乘虚而强履獨有立勢而誅之立勢之急在於聚威於深棣實力於滄定然後以趙魏臨常山環兵而攻之則冀馬之蹤不望合於燕蹄矣以太原之師入薊丘則易水之東左臂不能傍連矣此拘燕囚冀之方也如其擒縱之法出於一時者則名將而用耳如其威不聚於急力不實于危雖有名將不能為也陛下見西制戎北制虜壁壘之勢盤運交錯兵甲之多賞勞之厚以為戎虜知畏此而不敢犯塞今以刑賞之不信也而戎臣以自入士卒虚名占籍者十五不啻日夜飛金璧走銀繒市言唯恐田園陂池之不廣也簪珥羽鈿之不侈也洞房綺闥之不邃也不如此不足以積怨勞卒及冦來則必固壁閉兵無敢出擊者如一日戎戈東刃陛下將安倚乎今北虜滑夏猶巳事嫁矣而西戎之虚盟安足信之不可無虞也夫人性有勇怯地形有險易勇怯可以習制制之以刑則亡怯樂之以利則亡怯借之以勢則亡怯假如陟險利强弩以遲重者據之平陸利騎戈以捷手健蹄者兼之此得勢而亡怯也今士卒之獲者得其馬牛羊雜畜及衣裝寳賂皆與之無令有奮奪此顧利而亡怯也䝉兵失律者誅此畏刑而亡怯也如此而用勇備百矣臣嘗仕於邊又嘗與戎降人言自輪海巳東神鳥燉煌張掖酒泉東至於金城㑹寧東南至於上邽清水凡五十六郡六鎮十五軍皆唐人子孫生為戎奴婢田牧種作或叢居城洛之間或散處野澤之中及霜露既降以為嵗時必東望啼嘘其感故國之思如此陛下能不念之臣意西戎今冬當逾河拒北虜明年必大入靈武冦西城先擊監宥城能因此時詔寧隴邠涇及南梁皆㑹兵計事獨得以老弱留謹城其他少壯及騎士皆持裝佩鹽糗令邠寧涇原軍皆出平涼道彈筝邠寧軍北固崆峒守蕭闗涇原軍西遮木硤闗鳳翔軍逾隴出上邽因臨洮取鳳林南闗南梁軍道鳳逾黄花因狄道㑹隴西得其利則擊因其牛羊足以供具各以輕騎入河蘭撫喻其遺人飛聲流勢延而益西敗故地盡可得也如此則王畿之内安有驚烽之虞哉臣固曰四方之敝莫若山東隴右今策臣之目曰直言極諫則言無所不直直不懼於罪也若諫無不極者今百不盡臣之一二焉何者答問之所及或未利於國臣雖欲漏之而不解則必欲言之臣不寤也睿問之所不及者當臣之言實有利於國臣雖欲奏之臣懼罪言於非宜也而况短晷之晨奔光馳曜之下筆之條奏拘以文陳乎臣所以憤憊之誠百不及于一二也豈無異日而顧問哉伏惟陛下察焉沈下賢集巻十欽定四庫全書沈下賢集巻十一唐沈亞之撰碑文臨涇城碑臨涇之築跡於郝泚貞元年泚為涇將徳于軍軍中皆推其公嘗從壯士數百騎出捕野還白於帥曰臨涇地扼洛口有洛川在涇州西北盡于臨涇其川絶饒利息蓄其西大野走戎道曠數百里其土乃流沙無能出水草當渉者盡疲即屯臨涇為休養便地願以城控之可艱其來泚出其傍一人謂帥曰誠而泚言有是也雖然公自念之公所以䝉殊恩大幸子姪昆弟俱得不業而官者蓋以邊防未可制上心日夜懸於此故厚公之事無所難今用泚言則邊已固公安倚耶雖戎不得越所趍而捕者復何以稱獲使上聞之亦且輕所憂矣遂不從泚計及帥死其校段祐代為帥嵗餘泚又白曰昔天寳時天下有兵為防者獨西戎矣而邊至王畿尚萬有餘里其烽叫之驚東不過燉煌張掖之間又有嚴關重阻盤錯之固綿屬於其中迺者燕人反安禄山史思明也其邊兵强壯悉㑹難咸陽東而西陲復為所攻盡亡美地今王畿之傍列為邊郡飛烽𫝊候昬曉之際必奏于帝垣况未有可固今每秋戎入塞冦涇驅其井閭父子與馬牛雜畜焚積聚殘廬室邊人耗盡而又以一方便宜委決於將軍何以自塞夫臨涇之築於涇甚便前年泚白於故將軍不聽今日幸願將軍省計遂築城於臨涇以泚部鎮之自是戎無敢犯涇者元和初祐入覲因留宿衛後為帥者惡泚能强涇以年朽不任兵罷之八年余西道塞歴岐隴而邊人無幼老盡能誦郝泚之功故余悉著所論勒其事於臨涇城墓誌靈光寺僧靈祐塔銘十一年夏作釋家之法以弟子嗣師由子其事死送葬禮如父母由是籍書贊記之常名而不姓今通氏言釋者必祖自佛𣲖分諸系於七祖各承其師之傳以為重望而律師光範者始為童子時事師曰靈祐且滿嵗師與其曹為狀喻之語而律師侍側輒達其至既學五年而通經記年及冠遂去髮被褐言語應引則老緇不能對矣大厯中詔度始成僧儀初居呉之嘉興空王寺其後緇衣男女相與誦其能於是俱使授學更居靈光寺遂與其徒講贊㣲言百流㑹歸之説自呉南北郡邑緇衣咸果受人人自得若濡露然又著㑹釋章句十五巻貞元十六年十月某日滅於其寺之居僧年四十五夀年七十四遺言令其子弟曰當殯我寺之居西園中其後四年門弟子相與成塔於其所元和中余遊呉弟子明辯來求銘焉律師字楷其家本呉人其鄉里存呉之崑山縣曽祖師利開府儀同三司食邑三百户祖亢亮於潛令父君卿彭澤丞母河東裴氏其子與明辯之列凡六人皆童子受學是哀事之儀由子也作銘其詞曰惟寂之門嗚呼已矣匪媾匪育孰後爾已能傳其心即繼乃嗣以圖我銘以紀萬祀涇原節度李常侍墓誌府君諱某太尉武穆公光弼之少子也為人健毅意氣祖楷落自匈奴提其屬來入始為唐臣累遷至將軍贈司徒武穆既壯當天寳末以平燕冦有功故公於提襁之間得賜校書郎武穆薨公少無所倚薛兼訓憐之奏賜殿中丞後從朔方軍事汾陽王於邠又從東平軍事李正已於淄青正已悖公説之以善語雖不從然得重賜與馳歸即從宣武軍司徒勉公使於京而賊希烈攻勉城拔公不得赴乃從淮汝軍事哥舒曜于東都興元中行營為先軍得試將作少監兼侍御史後從義成軍再事賈耽於滑得兼御史中丞貞元九年入為左神策左將加都將元和初加御史大夫二年出鎮同官四年加右散騎常侍遷宿州刺史七年改安州刺史九年入為右羽林將軍十年春加左散騎常侍拜節帥涇原既至聞士卒前以食不賑而鬻子者皆與贖歸之夏六月公疾發視政不能勤七月十二日薨行年五十九贈工部尚書𤼵御府粟帛命官即其家弔勞生子男三人女七人長女適焦氏娶竇氏夫人生嗣子罕夫人卒娶潭氏潭氏亦早卒公將葬使卜兆兆言合葬不宜罕從卜竟祔先將軍太尉之墓於華原其原乃用亞之為誌以銘其所詞曰惟漢都尉肇自其源居彼北方繼世不還乃公之祖始為唐臣武穆嗣毅即我家勲帝念不忘公亦為藩乃葬王畿北指華原嗚呼哀哉惟功與魂千古不冺唐故銀青光禄大夫檢校左散騎常侍兼宫苑閑廏使駙馬都尉郭公墓誌府君諱某其先關西鄭人也大父汾陽王始以戎勲著績為朔方軍副使天寳末𤣥宗南巡巴蜀肅宗勞兵於靈武乃率其義虜順夷合兵逐叛得為朔方軍節度既而二駕還都拜為中書令統兵於外代宗初犬戎飲馬昆明至於御溝天子在陜又以擊逐之功益拜尚書令封汾陽王尊稱尚父乃詔子曖尚昇平公主都尉主客皆賢故長安中名人文士自李端司空曙之徒咸遊其門賦詩席酒更日而主生子男三人女二人長今為皇太后府君即其少子初憲宗居邸時親臨主家納迎如禮及今上即位皇太后昆弟皆寵錫尊官而府君最少益䝉隆念自邠州刺史入為殿中監尚西河公主嵗餘改宫苑閑廏使府君寛柔和易不守剛決長慶二年七月五日暴疾卒于主家享年三十七太后聞之驚悼悲哀使者自中宫出按問𤼵疾之狀月餘乃解以其年十二月十九日葬於京兆其原之上初西河主前降呉興沈氏生子男一人及郭氏之䘮無後而以沈氏之嗣為之主辦卜葬有期主䘮者使其家吏牽馬操幣至於櫟陽即尉家曰尉之文記事有聞矣願得為之銘以誌其壙於是與序勲興之事表於墟中云詞曰河族崑崙命源惟長跋於神華其來泱泱影響邁㑹披華吐章靈烟氣交鼓而興祥陶以精神涵為濃光保我國步乃生汾陽在户作扄横天為梁息灾破難以藥疾瘡帝子入室固知維綱孫為國母沙麓以昌少為姻臣謙寛汪汪祿而不夀哀彼中霜惟其流慶與唐無疆故太平令李寰墓誌長慶元年故太平令李寰之䘮其妻沈氏挈其稚嗣哭丏於姻黨之門以事其殯事將具命其族亞之為銘以誌其壙府君唐之裔也其先奉髙祖入關定隋封定州刺史曾祖承昕為鴻臚丞丞生少連為激水令令生牟為縣尉尉生府君世以宗廕調官卒無達顯貞元中沈氏始以外戚隆貴而胄得為列卿掌太府乃以子女歸之府君府君貧負其屈而家仰給為生元和中調為太子令卒於官舍親黨語為善人多痛之銘曰廓乎圓穹覆乎萬古之中賢者或塞而夸者或隆唯達識不窮善人有終哀哉沈參軍故室李氏墓銘漢孝武時匈奴累犯塞夫人之先為都尉出居延力戰且陷遂與其部居胡中為貴落其後入唐為功臣世世以武績顯至大父臨淮王光弼父尚書彚皆為帥長及父没門下客沈亞之請其屬以夫人歸於從祖之子曰稱師從祖諱房當代宗時取良家配帝其姑以妃受選入宫生雍王沈氏之先繼烈組冕顯於籍牒者皆由文學及徳宗即位追尊皇太后太后昆弟父祖既追封矣其子姪皆䝉寵廕遂以房為將軍執金吾冕為卿掌太府羽為駙馬都尉尚長林主夫人既嫁三年而卒生子男未能視在元和十四年正月六日具葬城南次于沈氏之隴作銘其詞曰冗葉雖榮逮霜霰兮勞飈罹灾延而眉兮韶妖之葩笄刻晷兮觸烟寤露條委衰兮𤣥金蒼礫安静鎔兮紅瓊海碧包脆危兮嗚呼夫人曷而得支姑啼夫哀叢咽伊兮姊弟酸屑垂涎洟兮悽風送魄罇生漪兮黄壙圓隆緘若帷兮明能之魄來而安兮無越違兮韋媍墓誌四年春作夫人姓王祖曰楚天寳中為呉王府司馬父曰新貞元中為杭州文學卒母河南姚氏永貞初媍夫人於京兆韋氏夫人之媍年始十四已能成媍道年十八暴疾亡亞之姊乃夫人諸父之兄嫂也或謂姻家之䘮必有賻亞之貧無貨請以文易之故韋氏之䘮沈氏得為銘誌夫人之邦曰琅邪夫人之質多於容行多於和豈天不命於夀不多耶實既命短可奈何已矣蓮湖之西靈山東趾南極于江近十五里元和三年四月庚子而琅邪氏之骨歸於是盧金蘭墓誌九年冬作盧金蘭字昭華本亦良家子家長安中無昆弟有姊四人其母以昭華父殁而生私憐之獨得縱所欲欲學伎即令從師舍嵗餘為綠􅆎玉樹之舞故衣製大袂長裾作新眉愁嚬頂鬢為娥叢小鬟自是而歸諸姊不為列矣因恚泣謂其母曰今我不等我不若從所當耳年自十五歸於沈君二年從沈東南浮水行呉越之間從七年乃還都又二年沈復東南而昭華留止京師不得隨病且逝從沈凡十一年年二十六生男一人女一人葬於城南尹村原之下作銘其詞曰野遼刺兮衆草羅生颼鬱蓊兮孰先殞零綺顔奄忽兮辭金楹去何止兮歸無程芳藿紅荃兮昔所遲迎今銷亡兮不可再馨魂魄歸來兮復此園塋表表劉薫蘭劉薰蘭者洛陽中女子也字嫣蓀故居家時名鄭兒元和九年年十六房叔豹來求彈絃者其母以鄭兒入焉後以善笑得大悦曰更名薰蘭叔豹為人喜酒多廢薰蘭勉之曰某以孫稚䝉君曲娯之愛使得奉巾饌誠不足以正非是然而君之齒方壯且又足給幸疴恙無有乃終日碌碌自墮如即至力旦暮將何以㧞之若終不更則親戚友朋視君若某皆貊之乎於是房叔豹蹶然自咎遂取古籍詩書併學之是嵗余罷隴西軍來舍房氏始聞其語因嘉之遂為著篇以繼勸且古語有云女為悦已者容亦見其志也如薫蘭之能引媚其志歸於至理豈不知賢女之為容題薰蘭表後南卓昭嗣余所善房叔豹豹好色得劉薫蘭最為嬖後即不復顧他色始余與房讌宴言薫必預故余得周視薫蘭所舉凡為言雖尚才功柔戱以樂左右而徃徃甚正余獨恨對薫蘭凝視之移晷刻將有嘲述卒不能云云顧余才不足當語薫耳十年冬余友沈下賢抵豹居下賢誠才尤精為太史公言一見其書果能備薫善時余貢於京師豹與張孝標善喜言文并挑笑事因録沈述來余知薫之色而待沈之才才色兩相宜也故復叙之以繫於沈左沈下賢集巻十一欽定四庫全書沈下賢集巻十二唐沈亞之撰}
