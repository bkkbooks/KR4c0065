  - {type: variant, offset: 4, length: 0, content: '', WYG: 一巻杜牧李商隠集均有擬沈下賢詩則亞之固以詩名世而此集所載乃止十有八篇其文則務為險崛在孫樵劉蜕之間觀其答學文僧請益書謂陶器速售而易敗鍜金難售而經乆送韓静畧序亟述韓愈之言盖亦戛然自異者也其中如秦夢記異夢録湘中怨觧大抵諱其本事託之寓言如唐人后土夫人傳之類劉克莊後村詩話詆其名檢掃地王士禎池北偶談亦謂㺯玉邢鳯等事大抵近小説家言考秦夢記異夢録二篇見太平廣記二百八十二巻湘中怨觧一篇見太平廣記二百九十八巻均注曰出異聞集不云出亞之本集然則或亞之偶然戯筆為小説家所採後來編亞之集者又從小説摭入之非原本所舊有歟此本前有元祐丙寅重刻序不著姓名錢曽讀書敏求記乃稱為元祐丙申刻考元祐元年嵗在丙寅至甲戌已改元紹聖中間不應有丙申盖即此本而曽誤記寅為申又是集本十二巻曽記為二十巻亦誤倒其文也池北偶談又記末有萬厯丙午徐􅎾跋此本無之而别有跋曰吴興文集十二巻義取艱深字多舛脱不可卒讀因從秦對巖先生借所藏季滄華抄本校閲一過題曰辛夘仲夏有小印曰邦采不知為誰然則此本校以季氏本季氏本鈔自錢氏宋刻其源流固大概可見矣乾隆四十三年六月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀沈下賢集原序文章盛衰與世升降唐之文風大振於貞元元和之間韓柳唱其端劉白繼其軌當時學者涵濡游泳攬其英華洗濯磨淬輝光日新苟有作者皆足以拔出流俗自成一家之語則吳興之文是巳公諱亞之字下賢吳興人元和十年登進士第歴聘藩鎮嘗游韓愈門李賀許其工為情語有窈窕之思其後杜牧李商隠俱有擬沈下賢詩則當時稱聲甚盛而存於今者既不盡見世之所有復舛錯訛謬脫文漏句十有二三頃得善本再加校覈皆得其正惜其藏於篋笥不得好學之士共有翫繹因命工刋鏤以廣其傳元祐丙寅十月一日題欽定四庫全書沈下賢集巻一唐沈亞之撰賦夢遊仙賦余昔一夢寓遊一方樂態甚適覺而作賦題之夢遊仙其詞曰杳漠漠兮昇絶垠雲轡九天兮越崇門星凌曉以淡白瀾咽潾於錦礫石榴笑而織娥喜閽導余而就將止襲烈蕙之芳風送麗音於遼耳目恣邁而多適吾超超其樂此銀墉兮桂廂差瑶階兮上玉堂卷紅幕以𤼵繡户中有人兮結清處語嫣延兮情綽撦命余蔭于蘭之厦迴穠顔以一顧矕嬌眸而融冶烟津兮玉盤火桂兮炮鸞鼎娥司味和苦酸嬴吹既調戛湘絃合我飲食兮樂吾後園乃稱詩曰白日低兮春塘滿紅華芳兮草芽短菱結帶兮荇含絲設遨遊兮導佳期又詩曰穠光醉兮昏綿綿焉與久樂萬年春留連兮其未央吐芳意於荃言忽𤼵寤以無覩魂迷念兮情牽既諒人生之皆夢孰云夕非而晝是馳詠想之悠悠兮軸吾情於萬里柘枝舞賦并序往者某值宴於鄭衞之侯坐與客序樂作堂下行舞男女紛雜交貫率以百品而觀者盖􅝇然既罷昇鼓堂上筵吹大奏命為柘枝舞則皆排目矢座客曰今自有土之樂舞堂上者唯胡部與焉而柘枝益肆于態誠足以賦其容也因顧余緒之以洗客念賦曰昔神祖之克戎賓雜舞以混㑹柘枝信其多妍兮命佳人以繼態撼隆冠之繁珂兮披文纓于大帶跪閃舉以揮獝兮拖旋襟之䄡曳騖遊思於情杳兮注光波于穠睇顧巧度之無窮兮將多變而若雲揚厲唱於鼉鼓兮儼蘭露之芳津汨傍俯以裊影兮蕩風蕖於横茵愕兮若驚弛兮若嬾歘然逴姹翔然嫣偃婉振修袖以抛拂兮韜纎肱以糅綰差重錦之華衣俟終歌而薄袒既而抑倚昂􅀈蹈節振臂驅㨗蹀以捉碎盡戎儀於弱媚見孫律於武姓入西河之劔氣曲響未遒邊風襲吹聞代馬之清嘶𤼵言禽於詠類客曰若此之狀也以鄭衞而前陳吾固知其將墜古山水障賦和史館陳學士作挹清臣之嘉思兮信疎子以峭孤迴補籍之暇筆兮賦他山於遺圖擲琨瑶於呐口兮若含采以咀蘭惟古工之包化兮啓羣峯於無間勢蹙巘以特起牙騰排而上干翠參差以玉立俱疎疎以攢攢於是澒以長瀾森以怪木瑟汨慄飀凄煩蕩燠浸平繚於楚澤冶妖韶於陽谷低霾横瞑兮陳半腹夢雨神雲兮澹而不歸怨撦惹乎巖曲縹蘚青籬兮事幽澁細澗綿流兮洄噴噎山之人兮夕忘寐而坐忘興帷紺枝兮帶黄葛暖草被崖兮垂緑髮翺鸞翔翠相追征兮振錦舒繡錯以明兮啼羈酸雌裂眥吻兮風呺穴怒寥而辭兮山中之木何凋榮兮詩虎丘山真娘墓金釵淪劔壑兹地似花臺油壁何人值錢塘度曲哀翠餘長染柳香重欲薰梅但道行雲去應隨魂夢來春詞酬元微之黄鶯啼時春日髙紅芳𤼵盡井邊桃美人手暖裁衣易片片輕花落剪刀題候仙亭新剏仙亭覆石壇雕梁峻宇入雲端嶺北嘯猿髙枕聽湖南山色巻簾看答殷堯藩贈罷涇原記室勞君輟雅話聽說事疆場提筆從征虜飛書始伏羌河流辭馬嶺節卧聽龍驤孤負平生劔空憐射斗光五月六日𤼵石頭城步望前船示舍弟兼寄侯郎客子去淮陽逶迤别夢長水闗開夜鎖霧棹起雲凉烟月期同賞風波忽異行隠山曾撼櫓轉瀨指遥檣蒲葉剪刀綠筠筒楚粽香因書報司逺為我憶檀郎别龎子肅自為應仙才丹砂鍊幾迴山秋夢桂樹月曉憶瑶臺雨雪依巖避烟雲逐步開今朝龍仗去早晩鶴書來春色滿皇州何處春輝好偏宜在雍州花明夾城道柳暗曲江頭風軟遊絲重光融瑞氣浮鬭雞憐短草乳燕傍髙樓繡轂盈香陌新泉溢御溝迴看日欲暮還騎似川流宿白馬津寄冦立客思聽蛩嗟秋懐似亂砂劔頭懸日影蠅鼻落燈花天外歸鴻斷漳南别路賒聞君同旅舍幾得夢還家汴州船行賦岸傍所見古木曉蒼蒼秋林拂岸香露珠蟲網細金縷兎絲長秋浪時迴沬驚鱗乍觸航蓬烟拈緑線棘實綴紅囊亂穗揺鼯尾出根掛鳳腸􅂓持一濯足誰道比滄浪送文頴上人遊天台露花浮翠瓦鮮思起芳叢此際斷客夢况復别志公既歴天台去言過赤城東莫說人間事﨑嶇塵土中宿後自華陽行次昭應寄王直方重歸能幾日物意早如春暖色先驪岫寒聲别雁羣川光如戲劔帆態似翔雲為報東園蝶南枝日巳曛題海榴樹呈八叔大人曾在蓬壺伴衆仙文章枝葉五雲邊幾時奉宴瑶臺下何日移榮玉砌前染日裁霞假雨露凌寒送暖占風烟應笑强言河畔柳逢波隨浪逐張騫送龎子肅三年遊宦也迷津馬困長安九陌塵都作無成不歸去古來妻嫂笑蘇秦西藩請謁廟肅肅層城裏巍巍祖廟清聖恩覃布濩異域獻精誠冠盖分行列戎夷辨姓名禮終齊百拜心潔表忠貞瑞靄千重色簫韶九奏聲仗移迎日轉旌動逐風輕體運威儀正年推俎豆盈不才慙聖澤空此望華纓勤政樓下觀百官獻夀御氣黄花節臨軒紫陌頭早陽生彩仗霽色入仙樓獻夀皆鴛鷺瞻天在冕旒菊罇開九日鳳厯啓千秋樂闋祥烟起杯酣瑞影收年年歌舞夕此地慶皇休山出雲片雲朝出岫孤色迥難親盖小辭山早根輕觸石新飄揚經緑野明麗照青春拂樹疑舒葉臨江似結鱗從龍方有感捧日豈無因看助為霖去恩沾雨露均曲江亭望慈恩杏花𤼵曲臺晴望好近接梵王家十畆開金地千株𤼵杏花帶雲猶誤雪映日欲欺霞紫陌傳香逺紅泉落影斜園中春尚早亭上路非賒芳景偏堪賞其如積嵗華村居無樹巢宿鳥無酒共客醉月上蟬韻殘梧桐陰繞地獨出村舍門吟劇微風起蕭蕭蘆荻叢叫嘯如山鬼應縁我憔悴為我哭秋思沈下賢集巻一欽定四庫全書沈下賢集卷二唐沈亞之撰雜著湘中怨解湘中怨者事本怪媚為學者未嘗有述然而淫溺之人往往不寤今欲概其所論以著誡而已從生韋敖善撰樂府故牽而廣之以應其詠垂拱年中駕在上陽宫太學進士鄭生晨𤼵銅駞里乗曉月渡洛橋聞橋下有哭甚哀生下馬循聲索之見有艶女翳然䝉袖曰我孤養于兄嫂惡常苦我今欲赴水故留哀須臾生曰能逐我歸之乎應曰婢御無悔遂載與居號曰汜人所誦楚人九歌招魂九辯之書亦常擬其調賦為怨句其詞麗絶世莫有屬者因撰光風詞曰隆佳秀兮昭盛時播薰緑兮淑華歸顧里英與處萼兮潛重房以飾姿見稚態之韶羞兮䝉長靄以為衣醉融光兮𣺌𣺌瀰瀰迷千里兮涵湮湄晨陶陶兮暮熙熙舞婀娜之穠條兮騁盈盈以披遲酡遊顔兮倡蔓卉縠流蒨電兮石髮髓旎生居貧汜人嘗解篋出輕繒一端與賣胡人酬之千金居數嵗生遊長安是夕謂生曰我湘中蛟宫之娣也謫而從君今嵗滿無以久留君所欲為訣耳即相持啼泣生留之不能竟去後十餘年生之兄為岳州刺史㑹上巳日與家徒登岳陽樓望鄂渚張宴樂酣生愁思吟之曰情無垠兮靄靄洋洋懐佳期兮屬三湘聲未終有畫艫浮漾而來中為綵樓髙百餘尺其上施緯帳欄籠畫飾帷搴有彈絃鼓吹者皆神仙娥眉被服烟霓裙袖皆廣長其中一人起舞含嚬凄怨形類汜人舞而歌曰泝青山兮江之隅拖湘波兮裊緑裾荷拳拳兮情未舒匪同歸兮將焉如舞畢斂袖翔然凝望樓中縱觀方怡須臾風濤崩怒遂迷所往元和十三年余聞之於朋中因悉補其詞題之曰湘中怨盖欲使南昭嗣烟中之志為偶倡也文祝延有引文祝延之指其本禱祠閩人歌其質也閩侯居政民蔭而安他日侯恙在體巷野之祈祠於神者皆以請侯益憂焉後得閒而詞乃舒其俗以為言俚不足自道或謂軍副者亞之能變風從律善闡物志因耆耋為請於是與文以通其意且以古之得人者皆祝延之今復用延命為篇目其詞二闋閩山之杭杭兮水堋吞荒抱大兮香叠層騰氣清渾兮朝昏神生其中兮宅幽凝居如山兮惠如水處端卓兮赴下而忘鄙集人之祈兮從人之所市攀清明兮叩髣髴我民請兮期吉日願聽誠兮陳所當侯臨我兮恩如光照導兮天覆惠流吾兮樂且康恭聞侯兮飲食失常民縈憂兮心苦創飽我之飢兮侯由有穀神有澤兮宜蔭沃脫侯之恙兮歸侯之多福羣卑勤之恭潔兮鑒貞盟乎山竹右一闋為祈兕載吹兮音咿咿銅鐃呶兮呼眂睢樟之盖兮麓下雲垂幄兮烟為帷合吾民兮將安維吾侯之康兮樂欣肴盤列兮答神神擺漁篁兮降拂窣窣右侍伎兮左夫人態修邃兮佻𦕈調丹含瓊兮瑳去聲佳笑馨炮羶燔兮溢桉豆爵盎無虚兮菓摭雜佑秋雲清醉兮流融光巫裙旋兮覡袖翔瞪虚凝兮覽迴揚語神歡兮酒云央望吾侯兮遵賞事朝馬駕兮搦寳轡千弭函絃兮森導騎吾何樂兮神軒維侯之康兮居遊自遂右一闋為酬為人撰乞巧文和史館陳學士作邯鄲人妓婦李容子七夕祝織女作穿針戲取笤篁芙蓉雜致席上以望巧所降其夫以為沈下賢攻文又能剏窈窕之思善感物態因請撰為情語以導所欲詞曰惟雲渚之晨秋兮天曠碧以凝暮懸韶桂於姹月泫明淚之清露即何房之將期儼龍輪以就馭恭聞司巧之多方妾修馨香以奉具竊獨溺於自私希靈娥之所付㻁碧凝其異質兮韻隆虹於霾霽假文羽於孔雀兮而使擅夫佳麗戴雲蟬之重緌兮塗蠻金於綺篲細綃縷於藕腸兮差蓮跗以様齒命纎爪之蟲絲兮裊簷機之夕綴是物之巧功善飾願賜妾於針紉也葩萼鬱於濃妍包多宜以善喜引纎吹於輕颷若將翔而復倚醉春光之流景播清香於萬里霓烟出乎無間縹窈緲以斐亹若披若曳兮撦平林兮横曉水襲霽旦之繁芳兮因隠映而增綺澹冉冉其􅀈容世無隠以偕此是物之巧容善態願委妾於態媚也短蒲狹涘兮曲溜溢鵁鶄鵷雛兮引乳娣戲音清諧兮蕩演曳牽游裾之低凝兮蔓春心於淇裔枯寒勁幹兮憶棄葉擺風叫夜兮留燥雪流韻凄澁兮泱􅑜咽吟夢語之漣漣感霜鐘之流越是物之巧音善感願付妾于管絃也祝樠木神文并序謫掾秋病偃於漢之陽怳而夢鬼其形甚穢長股短胷薄頂無尻秃眉鑏吻嗜痔而饕誦視􅠓􅠓嚵氣􅧍臊指人生寒栗肌㨗毛及寤怪歎以告筆吏扃曰斯癘鬼也亞之曰癘鬼何端而侵我乎扃曰癘之為情惡倘倘而狎睢同丘為仇同惡扶依依邪傳影倒步側趨託舌附語以調淫巫今掾之為人體曠神虚樂態惡惡内曠外疎翺翔自儀舉止無虞不機不扃為所啁也無乃異乎亞之曰何以去斯患也吏曰扃聞之樠木之神其司郢土之陰可以酬而訴也願召巫用酒肴以寄詞為祝使其有愧必榜且戮掾無鬱也于是乃與撰為祝言一闋以道所惡其詞曰傾江漢之長瀾兮淘晨雲於宿靄惟附巘之横峯兮寫甘灣之清泚聞樠木之留古神兮宅同麓之荒邸茹清明之靈英含端光而為體與午節及皎峭兮惡清明之闇靄粤客子之何羈兮啁我血於癘鬼癘鬼之狀草剏樸􅈪蹴折兮蜍背棚横兮蠆腹板聱語虬反兮薄頂而蛇顙颭掞兮赤臉而䑕目伺差池於隟情兮投怪言以禍福拒良藥於煩痰兮謗嘉肴而謂之毒衣去聲戾氣以為介兮避神丹之利鏃彼怪魅之杇險兮非神君兮孰能以族洗身而為詞兮望皇霛於樠木雜記沂水北一百里有峴曰將軍甚靈民置祠於路左享之不已將軍曾為五郡牧常姓名𤣥通因築城失主將意而斬之其屍數日不仆今有臺曰立屍臺西南有山為鞍山山北有闗謂之穆陵李師古不臣作鎮於此防遏不意元和初罷之西有沂山山有廟則東安公也沂州刺史每春自禱恩是山山有谷九十九所河分流曰沂曰汶東注泝南流入青道沂州山東南有山曰太平山頂平可八九十里頃嵗有冦曾居之山北十餘里有樹五檀也秦夢記太和初沈亞之將之邠出長安城客槖泉邸舍春時晝夢入秦主内史廖家廖舉亞之秦公召至殿膝前席曰寡人欲强國願知其方先生何以教寡人亞之以昆彭齊桓對公悅遂試補中涓秦官也使佐西乞術伐河西晉秦郊也亞之帥將卒前攻下五城還報公大悅起勞曰大夫良苦休矣居久之公幼女弄玉聓蕭史先死公謂亞之曰微大夫晉五城非寡人有甚徳大夫寡人有愛女而欲與大夫備灑掃可乎亞之少自立雅不欲遇幸臣蓄之固辭不得請拜左庶長尚公主賜金二百斤民間猶謂蕭家公主其日有黄衣中貴騎疾馬來迎亞之入宫闕甚嚴呼公主出鬒髮著偏細衣裝不多飾其芳姝明媚筆不可模様侍女祗承分立左右者數百人召見亞之便館居之亞之於宫題其門曰翠微宫宫人呼沈郎院雖備位下大夫繇公主故出入禁衛公主喜鳳簫每吹簫必下翠微宫髙樓上聲調逺逸能悲人聞者莫不自廢公主七月七日生亞之嘗無貺夀内史廖曾為秦以女樂遺西戎戎主與廖水犀兩合亞之從廖得以獻公主公主悅受嘗結裙帶之上穆公遇亞之禮兼同列恩賜相望於道復一年春秦公之始平公主忽無疾卒公追傷不巳將𦵏咸陽原公命亞之作挽歌應教而作曰泣𦵏一枝紅生同死不同金鈿墜芳草香繡滿春風舊日聞簫處髙樓當月中梨花寒食夜深閉翠微宫進公公讀詞善之時宫中有出聲若不忍者公隨泣下又使亞之作墓誌銘獨憶其銘曰白楊風哭兮石甃髯莎雜英滿地兮春色烟和珠愁粉瘦兮不生綺羅深深埋玉兮其恨如何亞之亦送𦵏咸陽原宫中十四人殉之亞之以悼悵過戚被病卧在翠微宫然處殿外特室不入宫中矣居月餘病良巳公謂亞之曰本以小女將託久要不謂不得周奉君子而先物故敝秦區區小國不足辱大夫然寡人每見子即不能不悲悼大夫盍適大國乎亞之對曰臣無狀肺腑公室待罪右庶長長不能從死公主君免罪戾使得歸骨父母國臣不忘君恩如今日將去公追酒髙㑹聲秦聲舞秦舞舞者擊髆拊髀嗚嗚而音有不快聲甚怨公執酒亞之前曰夀予顧此聲少善願沈郎賡揚歌以塞别公命趣進筆硯亞之受命去為歌詞曰擊休舞恨滿烟光無處所淚如雨欲擬著辭不成語金鳳銜紅舊繡衣幾度宫中同看舞人間春日正歡樂日暮東歸何處去歌卒授舞者雜其聲而道之四座皆泣既再拜辭去公復命至翠微宫與公主侍人别重入殿内時見珠翠遺碎青階下窓紗檀㸃依然宫人泣對亞之亞之感咽良久因題宫門詩曰君王多感放東歸從此秦宫不復期春景自傷秦喪主落花如雨淚燕脂竟别去公命車駕送出函谷闗巳送吏曰公命盡此且去亞之與别語未卒忽驚覺卧邸舍明日亞之與友人崔九萬具道九萬博陵人諳古謂舍曰皇覽云秦穆公𦵏雍槖泉祈年宫下非其神靈憑乎亞之更求得秦時地誌說如九萬云嗚呼弄玉既仙矣惡又死乎沈下賢集巻二欽定四庫全書沈下賢集卷三唐沈亞之撰雜著夏平夏之為郡南走雍千五十里涉流沙以阻河地當朔方名其郡曰朔方其四時之辰夭暑而延冬其人毅其風烈其氣威而厲易憤而難平夫其難平之狀在陽為悖在陰為佷悖為不平者在上暴横而為也在下殘寃而為也佷為不平者在上蔽惑而為也在下憤激而為也元和初夏之節度韓將軍入覲其甥楊琳為之後以兵叛天子命將軍演代之既至盡殺其屬將曲直者無别罪併俘其家姊弟妻子乃以其善貌擇而入其餘均賞麾下騎士皆得肆辱汚明年拜右衞李將軍愿為尚書出代演為政至其城察民氣色不得平迺留意於察果得之即令曰天子愍不辜久而命四方為政執事觀察之夫楊琳叛脅其良人良人以骨肉妻子故不能得止又不能即死制巳在人今皆以是罪戮之矣其姊弟妻子當免者不宜復蓄汙且又皆良人子等類耳寧幸如是乎今盡籍出之無得隠吏更察敢有如是者斬於是尚書愿迺以畜馬為則詶得所虜者相當其直其人皆死志積寃憤既出即豁其所蓄道路呼聲四逸有感憤不勝於心者則仰而號俯而踊退而變為喜而舞謡其徳其聲雜調齊感如是連日改旬而後巳是則條理其政如此其氣復為悖邪夏之屬土廣長幾千里皆流沙屬民皆雜虜虜之多曰党項相聚為落於野曰部落其所業無農桑事事畜馬牛羊槖駝廣徳元中其部落先党項與其類意能氣不等因聚黨為兵相伐强者有其馬牛羊槖駝其後支屬更酬殺輾轉六七十年莫能禁道路殺掠以為常華迫貨馬牛羊槖駝者貨已輒以壯騎從㨗道伺險擊華民華民脫死者幾希矣尚書公既按察部落盡知其猾大者死小者盟又令曰今盟已敢有叛者滅之其後有人貨得一馬厚價善氣駭而逸亡其所就月餘奔歴數帳異逐之又至一帳帳之老乃相與執而詣公居請曰有馬逸來莫知其所由自後更嵗故亡馬者復得之是則整頓其弊如此其氣復能為佷耶夫政之不明則平不得施於氣笑色語法之不清則平不得信於市貨理化昔者周公之為政處於相則天下平處於東則一方平今夏北一方也得其平如此豈在位者而知周公之道耶乃籍所以于篇以明善理云爾旌故平盧軍節士郭昈郭航本不同俗家皆家平盧軍昈父珍岑舉進士與權皋著作同上第天寳末燕人叛雖以戮自是而齊趙之間頗聞其强矣昈既壯能習先人所業復舉進士時權相國為吏部尚書其所立欲擢之及聞家居非地即罷選歸而亦為師古所辟昈與故勃海人髙鉥為等伍師古死師道代之復用鉥昈為從事有頃常山帥卒其卒請嗣帥未得命師道亦遣甲卒萬人北渡河屯太原以為顧望鉥昈相與議語謂燕蔡之侯初封欲令師道先之為朝省以樹大功乃說曰傭有操鋤為人治稼者能勤榖滅稂嵗得均穡至於傭子既専地自入其伍益相辦助或謂之語曰田人百畆成而餉之直幾半足以飽三冬之腹至於所取非任賴主人土廣且寛之則曰可苟設一旦篤其不奉亦奪矣是屬固不殍矣此借言于家人尚爾况傭於天子乎今河北之傭方責其専田君侯寧可以假非於不理者誠能此時因經圖以盡入其地親謁闕下則君侯之功莫可與等保餉世世雖孱孫亦終不奪豈不偉哉夫舉食於人當飢渴之望也一飯千金未足者不能十金及飫而進於前雖海陸備鼎顧與糠籺齒尚何所酬願君侯省之無為人後事將行左右者更沮之曰猛虎所以使物畏而不敢犯者以能威自居也故盤林横谷奮睛以拏怒掉尾以倚嘯厭食於熊豕麏麚之肉及棄其所長而欲弭耳委首以待餒是知命縣于執者之手雖塵兒得以狎而搏雖欲申步於咫尺安得自遂也今公捨自食而就待餒其後亦能無恨乎孰為公計其事於是師道果大悔遂殺髙鉥而昈以能善人左右開之故得無殺幽於蔡之鄙縣使人守其門親屬通往來輒籍署更十餘嵗當元和九年蔡帥少陽死其子元濟欲以有父之地請於天子天子怒發兵圍之既急師道亦悖乃陰為之助明年秋師道兵萬餘東冦彭城入蕭豐沛且敗而還因艱四境出入者月餘昈乃為練繒書緘之絮帑如顆遣航持詣彭城請其帥願得上奏將行執航手曰努力慎勿洩書不吾名盖假齊人劉諒耳非見帥無得言吾書者航至彭城宗人運為武寧虞候都使始航欲舍之㑹運將兵出定豐未還航直詣賓府見郭行餘因曰航母之姊子劉諒有帛書奏記陳叛兵者山川曲折之狀願見將軍行餘得之喜悅起告其帥航見帥獨謂帥曰書郭昈為之畏洩故假劉諒劉諒者師道所信之吏也遂發書書詞云願以兵三千人出滄州用戈船浮海萊淄之上此時海不備所處皆罪人謫吏無所與豎遂與上奏於是天子遣吿彭城帥知之帥以為非昈書疑師道為之以相詿誤故航歸不得書報獨告以信語航不敢復故道道迴逺凡數千里乃及昈所處未見昈且為師道所召既行與昈兄子會於道因竊謂曰今者航無狀受召豈前事之露耶且露航獨死終無所敗無憂也昈聞之幾自引死航令萊人嘗以氣敢聞於平盧軍及師道欲叛盡縻絡敢士故航在召中初航不知其召之所以也意謂知前謀竟憂死明年元濟誅又明年師道反詔遣大梁楚彭城蔡許滑魏之師合而四入於是彭城軍下魚臺入金鄉楚軍圍海取其二縣大梁軍攻考城得之滑蔡許共拔斗門至臨濮魏軍渡楊流占東阿再戰涉商屯鄆西六十里近最近賊賊益敗故師道遣右將軍劉晤將握前後兵三十萬人出當魏魏兵日急晤晤亦為師道所篤乃歸斬師道盡以鄆城降得拜為滑帥在十四年二月乙亥也髙鉥以前著跡追為尚書盖言寵之昈得以外郎為滑從事詔令行餘為記室行餘與昈會於河闗之間昈謂行餘曰昈前者使航馳帛奏至彭城聞其還不聞其問今已死矣君知其請乎行餘曰請者云何昈猶能盡語章中之詞矣行餘曰果然嗚呼航竟死矣莫有聞者嗟乎十四年余與李褒劉濛宿白馬津俱聞之於郭記室明日復皆如濟北濟北之人盡能言昈之節故悉以論著將請于史氏云萬勝岡新城錄元和九年蔡之帥死其子元濟以其土叛逸掠陳汝之間冬縱兵臨夀春屠馬塘走其守令狐通焚霍丘淮南郡邑大駭民人卷席而居上聞之怒謫其守明年春詔執金吾李將軍馳𫝊出守之既至收其壊卒聚夀春城使人勞井閭而市貨耕桑之業始復民人莫知復為戰矣八月乙巳夜引兵南出霍丘百四十里又折而西四十里營於萬勝岡築新城初將度曰吾士卒萍合之衆也易散而難役吾以築壘令之必苦難使寇聞之必襲吾思欲其自用乃召諸將謂曰吾旦夕望氣其狀有寇謹備之令諸軍分營連居環迴之間十有餘里各視營之所向宜為數堵之垣以禦暴矢耳諸將數竒將軍言歸而亟曉其卒故所命立就將軍與監軍使出周視之還至武寧大稱築者之能勞以酒帛語寵其將因曰既已幸周繚之善也他將恥其功之不類乃復興即日而垣周將軍監軍使出牛酒而勞因士卒之樂又令曰山澤之地其土瘠漓今時方秋浸潦用事謂衆之功難為也顧為垣今日而周明日而壊吾為諸君惜之誠能致其厚則土藏去聲氣色脉力相輔雖霖潦不為患矣築者皆悅復争為厚及竟將軍監軍使出視之復勞曰嗟乎諸君之能衆士之力也既周且厚始謂其垣今則城矣因自吟曰城乎城乎使其增數仭而飾之寇雖蚩尤寧敢犯吾乎遂歸諸將相謂曰乃者將軍之詞得無意其髙耶吾黨亦魁醜其卑矣復增其築於是新城遂具明日寇果來望見皆愕然因至新城傍俱張喉髙言指城上曰為我曹敬謝將軍訖辭而去諸將盡伏寇亦以王賢董重質營其側拒之十一月戊辰將軍將卒萬餘西渡澗渠上史簇岡與賊陣自平明至日中進退相延不得合及日側將軍乃謀曰彼必乘暮伺吾還兵擊我必矣於是引兵急攻宼宼延退數里乃以精兵分伏其兩隅復自延退間拔其羸老先復令軍中曰皆坐賊之後見官幟有引渡者以為兵怠俱還遂大呼疾馳東下於是伏兵皆奮斷其後賊大潰殺傷千餘生得數十人官卒死者亦數百人是時李存亮為先鋒將使百騎遊擊左右獨五人環馳如轂至賊麾下斬其將王賢繼轡轉鬭而歸十一年夏髙霞寓敗於隋唐既謫盡發其卒屬陳秋捕得宼兵盡罷南境之備俱東備矣九月使偏將軍李曜領步卒數百人從險道夜銜枚入寇境西過九女原百餘里屠其堡聚三十餘壘又使義營諸將西北傍安陽山破其土附屯戍之衆數十百人招其降民男女萬户得其將二人用之久之朝之卿士以為將軍怠於戰或發其語而客亦有來語於將軍曰始天下髙將軍之義以將軍兵臨三州之寇謂一舉而取何為久不稱其獲與將軍曰子之望我非也夫鋤深稂者必利其鍤乃吾之部多吳楚畊販之人長習於沮澤之上彼魚鳥之性其生矣恇恇如偷兒其遊翔之羣非不多也及撫掌而駭之即争為潰矣而寇亦素難吾名常以精卒待我今驅是於谿谷之間與寇決鬭譬由畜彘之禦窮狼寧有所抗盖居之嚴城以固其意令旦暮從壁上望見寇騎號呼奔突之狀以熟其目然吾又常喻以風雲勝敗之語語之以壯所恃如目熟而恃壯及其可用吾伺其利而擊之期於必勝此吾所効也十一年冬詔書促戰十月乙未上遣中貴人來臨視將軍於是圖其陣於帳中令諸將各職其序旦暮擊鼓教士卒為分合圓方之勢備盡所用將軍出客有難之曰自建中於今淮夷三叛其間矣雖䝉赦令然未嘗斯須忘戰故介兵人𫝊其兵父訓之子兄教其弟非戰事不語是宼以將軍名聞天下固不敢犯自將軍西出疆屯兵於萬勝城以控其要濠水而東連次淮江之間郡邑之人畊桑自力輸轉相屬曾不為冦虞此將軍之功也以强計毅誠招其轉禍之人繼來如繩此將軍之用也今將軍不以此為百全之基驅貊越之人身自䝉堅而與必死之寇決命頃刻即萬一有不如將軍之指東土之固將安仰哉對曰此吾已熟於計久矣然吾昔嘗仕於河塞十有餘年公若僂之亡伸也前行始入覲不意䝉寵於過悞使率師振旅吾之力唯其所指以死効夫馬隨羈而引者也羈之使馳則為之馳緩則步安有擇塗陸而避僵蹶哉如有縱之不前銜之不止徒見撻賤之棄焉得延頸踠足以待御且聖上旦暮待績於吾中貴繼至亦吾䝉羈之日也何敢自引於便而巳矣遂以十一月庚辰夜漏過四十刻引兵西渡上史蔟牧之下矚賊壘分銖皆察及日中天風西猛起折幹迴幟將軍謂中貴人曰今日之候非不利邪願屯兵堡史蔟以伺之中貴人曰某受命視公戰不視公守將軍不得已乃陣中軍為前武寧軍次之左右輔皆親兵戰凡十合㑹盧宣之軍居間聞戰聲自驚潰失次且遯是賊軍方苦中軍武寧之殺傷幾欲引去聞盧宣之軍驚潰即分精兵數百勁突所潰以擊亡而將軍復與中軍武寧深逐賊西行數十里因與盧宣之軍相棄盧宣之軍先遁去卒無所傷至暮中軍力鬭遂死其將曹推直張忠信楊渾等及卒死者數百人寧武死者亦數百人還軍新城雖無功者亦勞之以故士卒無戰苦畏叛之患時某客夀春得詳其語而書之以備史聽魏滑分河錄九年冬為節帥薛公作元和八年秋水大至滑河南瓠子堤溢將及城居民震駭帥恐出視水迎流西南行思欲以救其患亦頗聞故有分河之事言其水嘗導出黎陽傍帥以其功尚可跡於是遣其賓裴引泰請於魏曰河經地而東滑最大自洛以西百流皆集於滑而春秋堤防不為固此將軍所明知也竊以黎陽西南其洄壖拒流以生衝激之力誠願決一派於斯幸分其威耳今秋雨連久不間洛滑以西雄川峻谷暴發之水争怒以走㑹即河勢日夜以壯恐一旦城郭無賴謹聽命於將軍魏帥許之其將卒吏民更請曰患難近也况滑得水禍於天久矣魏何戚乃許移於己哉帥曰民前聽所語是黎陽與滑居帝土否耶設人有不幸於水火而望及於四海道路之人凡見其苦即為舉手寜皆有戚者夫全大以棄細順理也且滑壁數萬人民不安業未知其賴吾安敢以河鄙咫尺之地為專惜乎顧桑麻五榖之出不能振百户假如水能盡敗黎陽尚不足愛况其無有民何患無土以食因召吏趨籍民地所當奪者盡以他地與之籍奏天子天子嘉其意而可明年春滑鑿河北黎陽西南役卒萬人間流二十里復㑹於河其壖田凡七百頃皆歸屬河南夏六月魏使楊茂卿授地滑帥令陳酒樂與浮河新渠是日亞之以客得與故悉其事於兩帥之賓學解嘲對客有以今廩食之不通充漕輓不勝於弊是勞逺而逸近以為問者余於是發憤數日故縷言而對之昔漢徙山東豪富兼併之家以奉園邑凡百二十四萬户又有南北東西軍及匈奴雜虜以國衆來歸者仰給於漢未聞嘗俟輓於吳越而復給也今以三十千人食勞輸江淮嵗貢三十萬斛迎流越險覆舷敗軏不得十半自漕以東督稽之官凡四十七署署吏不下百數嵗費錢十千萬為大數而部吏舟傭相踰為姦鞭榜流血酸苦之聲相聞禁錮連嵗不解嵗千餘人雖赦宥而獄死者不可勝多矣甚非仁聖之所以牧人也乃者燕人叛𤣥宗南巡巴蜀肅宗勞兵於靈武及二駕神遊代宗臨陜闗中流離羸牛一韁當市錢二百千故有轉輸之法雖救一時然終轉入人於禍誠可以痛今雖未可暴去且宜以三輔粟為貢重資於農則耕稼自勤耕稼自勤甸服無曠土遊人矣如此九年之蓄可以儲又何勞輸輓於逺哉客曰敬聞其㫖沈下賢集巻三欽定四庫全書沈下賢集巻四唐沈亞之撰雜著異夢錄元和十年亞之以記室從隴西公軍涇州而長安中賢士皆來客之五月十八日隴西公與客期宴于東池便館既坐隴西公曰余少從邢鳳遊得記其異請語之客曰願備聽隴西公曰鳳帥家子無他能後寓居長安平康里南以錢百萬質得故豪家洞門曲房之第即其寢而晝偃夢一美人自西楹來環步從容執巻且吟為古裝而髙鬟長眉衣方領繡帶紳被廣袖之襦鳳大悅曰麗者何自而臨我哉美人笑曰此妾家也而君客妾宇下焉有自耶鳳曰願示其書之目美人曰妾好詩而常綴此鳳曰麗人幸少留得賜觀覽於是美人授詩坐西床鳳發巻視其首篇題之曰春陽曲終四句其後他篇皆累數十句美人曰君必欲傳之無令過一篇鳳即起從東廡下几上取綵箋𫝊春陽曲其詞曰長安少女踏春陽何處春陽不斷腸舞袖弓彎渾忘却羅衣空換九秋霜鳳卒詩請曰何謂弓彎曰妾傅年父母使教妾為此舞美人乃起整衣張袖舞數拍為弓彎狀以視鳳既罷美人泫然良久即辭去鳳曰願復少賜須臾間竟去鳳亦覺昏然忘有記鳳更衣於襟袖得其詞驚眎復省所夢事在貞元中後鳳為余言如此是日監軍使與賓府郡佐及宴客隴西獨孤鉉范陽盧簡辭常山張又新武功蘇滌皆嘆息曰可記故亞之退而著錄明日客有後至者渤海髙允中京兆韋諒晉昌唐炎廣漢李瑀吳興邵合曰吾友王炎者元和初夕夢遊吳侍吳王久之聞宫中出輦鳴笳吹簫擊鼓言𦵏西施王悲悼不止立詔詞客作挽歌炎遂應教詩曰西望吳王國雲書鳳字牌連江起珠帳擇土𦵏金釵滿地紅心草三層碧玉階春風無處所悽恨不勝懐詞進王甚嘉之及寤能記其事炎本太原人也誼鳥錄貢籍中有鳥誼名著生商山始以誼聞商之貢來者云能搏擊雀鷃以為天子後宫遨戲貴幸宜進此以具樂後宫亦相尚竒飾之以綵絲合縷為足縈垂緌以絳繒衣尾加鳴金撼如珮又指習其㨗便指熟得如意後宫從上所遨幸者誇翫無厭春縱去秋輒復貢來誼鳥性與他禽不類色縹緑而文頸形大小類鶡而意氣狀貌復不類往往髙林大木間同巢者累數百其春乳當為食者還飼即先稚或疾無别已兒也秋羅人捕貢設羅有誤中者即羣衆相號呼若不忍去争投下集羅以如是故誼鳥無他名沈子曰余幼過商山熟誼鳥事於其宿老今余適藍田郵夫唱傳曰誼鳥貢余初喜其以誼䝉幸則生為梟獍者逺遁而愧死其餘賊暴侵凌之類期不得自性矣及聞其用材則不然使移其心從搏擊者伍備娛一旦之游而誼無所與何其失職也夫何其失職也夫李紳傳李紳者本趙人徙家吳中元和元年節度使宗臣錡在吳紳以進士及第還過謁錡錡舍之與宴遊晝夜錡能其才能留執書記明年錡以驕聞有詔召稱疾不欲行賓客莫敢言紳堅為言不入又不得去㑹留後使王澹專職為錡具行錡蓄怒始發於澹陰教士食之初士卒當勞賜者皆㑹府中受賜與中貴人臨視次至中軍士得賜者俱不散齊呼曰澹逆可食既盡即執中貴人脇曰爾寧遂衆欲寧飽衆腹曰請所欲曰為我衆書報天子幸得復錡位貴人懼偽諾之召書記以疏聞紳聞之亡入錡内匿衆索不得及中貴人至促錡行錡益怒急召紳授紙筆令操書上牘紳坐錡前佯惴怖戰管揺紙下扎皆不能字輒塗去累數十行又如是幾盡紙錡怒罵曰是何敢如此汝欲下從而先人耶對曰紳不敢惡生直以少養長儒家未嘗聞金革鳴今暴及此且不知精神在所誠得死在畏苦前幸耳錡復制以兵刄令易紙復然傍一人為錡言曰聞有許御史縱者尤能軍中書紳不足與等請召縱縱至錡銳意自舉授詞操書無不可錡意遂幽紳於潤之外獄兵散乃出縱竟逆死贊曰李錡之賊江東也其抗節者有李雲李紳雲則中山劉騰為書以大之而紳之迹未及稱且紳職錡肘腋下舉動顧盼有一不誠則支體立盡衆手而紳亦不顧而曉然自效如此可謂臨大節而不可奪者耶馮燕傳馮燕者魏豪人父祖無聞名燕少以意氣任專為擊毬鬭雞戲魏市有争財鬭者燕聞之往搏殺不平遂沈匿田間官捕急遂亡滑益與滑軍中少年雞毬相得相國賈公耽在滑能燕材留屬中軍他日出行里中見户傍婦人翳袖而望者色甚冶使人熟其意遂室之其夫滑將張嬰者也嬰聞其故累毆妻妻黨皆望嬰會嬰從其類飲燕伺得閒復偃寢中拒寢户嬰還妻開户納嬰以裾蔽燕燕卑脊步就蔽轉匿户扇後而巾墮枕下與佩刀近嬰醉且瞑燕指巾令其妻取妻取刀授燕燕熟視斷其妻頸遂巾明旦嬰起見妻毁死愕然欲出自白嬰鄰以為真嬰殺留縛之趨告妻黨皆來曰常嫉毆吾女迺誣以過失今復賊殺之矣安得他殺事即其他殺而安得獨存耶共持嬰且百餘笞遂不能言官家收繫殺人罪莫有辨者强伏其辜司法官小吏持扑者數十人將嬰就市看者圍面千餘人有一人排看者來呼曰且無令不辜死者吾竊其妻而又殺之當繫我吏執自言人乃燕也司法官與俱見賈公盡以狀對賈公以狀聞請歸其印以贖燕死上誼之下詔凡滑城死罪皆免贊曰余尚太史言而又好叙誼事其賓黨耳目之所聞見而為余道元和中外郎劉元鼎語余以馮燕事得傳焉嗚呼淫惑之心有甚水火可不畏哉然而燕殺不誼白不辜真古豪矣郭常傳郭常者饒人業醫居饒中以直徳信饒江其南導自閩頗通商外夷波斯安息之貨國人有轉估於饒者病且亟歴請他醫莫能治請常常為診曰病可去也估曰誠能生我我酬錢五十萬常因舍之先以針火雜治導其血開然後輔以竒藥誡曰第槖慮塊居月餘估稱愈欲歸常所許財常不聽估曰先生以為寡與常曰不也吾直吾之藥計吾之功不能損千錢而所受非任反禍耳卒不内人以常為詐而責常常曰夫販賈之人細度而狹見終日希售㩁買計量於毫銖之間所入不能補其望今暴奪之息財五十萬則必追恡欝惋寧能離其心且藥加於人病新去而六府方憊復有悒然之氣自内而伐即不可救奈何彼方有苦時知我能治而吿我我幸免之因利其財又使其死是獨不畏不仁而神可欺者吾何敢欺沈亞之曰仲尼盖言我未見好仁者惡不仁者而後學之徒未聞明好惡也豈其言之憤不足畏耶今世或為邦有土之臣専心聚斂殘割飢民之食以資所欲忍其死而不愧受刑辱而無恥是亦不仁甚矣終無有惡者郭常之賤而行之又焉得不稱于當時哉喜子傳喜子者飢年女子小字也且困時䝉活於估人劉承家女使喜子為人惠口而柔顔承載與往來襄閩楚越之間常之閩納貨與息客雜居閩市中有韋生者居比屋與承喜子旦夕交候言韋動悅喜子而承顧頗喜酒多亡故韋生得縱語靡曼喜子既拒韋益欲淫之會承欲北舟向利韋思得與偕及圖假載於承承曰諾且承因匿貨坐抵禁繫公室韋獨得與喜子在舟因賂傍者教以語云承得死罪事其財妾奴婢當輸入度終不能脫矣不如以財亡韋語達喜子喜子立謀自殺即夜就溺人相與岀之幾死及蘇復與言然知其妄乃巳自是各去其後不復相聞事在元和四年終衞人程生為之說贊曰吾聞程生云喜子之事至死不變亦可謂烈嗚呼狐死正丘首而喜子之仁也沈下賢集巻四欽定四庫全書沈下賢集巻五唐沈亞之撰記河中府㕘軍㕔記國朝設官無髙卑皆以職授任不職而居任者獨叅軍焉觀其意盖欲以清人賢冑之子弟將命試任使以雅地岀之耳不然何優然曠養之如此其差髙下則以五府六雅為之次第蒲河中界三京左雍三百里且以天子在雍故其地益雄調吏者必以其人授焉噫今之衆官多失職不失其本者亦獨叅軍焉長慶二年余客蒲河中城某叅軍某族世皆清胄又與始命之意不失矣乃相與請余記職官之本於其署歌者葉記昔者秦青之弟子韓娥從學久之以為能盡青之妙也即辭去青送之將訣且歌一歌而林籟振蕩再歌則行雲不流矣娥心乃裒然然韓娥亦能使逶迤之聲環梁而游凝塵奮飛微舞上下者三日不止能為人悲亦能為人喜其後漢武時協律李延年為新聲亦云能感動人至唐貞元元年洛陽金谷里有女子葉學歌於柳恭恭下之初與其曹十餘人居獨葉歌無等後為成都率家妓及率死復來長安中而轂下聲家聞其能咸與會唱次至葉當引弄及舉音則弦工吹師皆失執自廢既罷聲黨相謂約慎語無令人得聞知是時博陵大家子崔莒賢而自患其室饒乃曰吾緑組初秩寧宜厚蓄以自封耶遂大置賓客門下縱樂與遨遊極費無有所恡他日莒宴賓堂上樂屬因言曰有新聲葉者歌無倫請延之即乗小車詣莒莒且酣為一擲目作樂乃合韻奏緑腰俱矚葉曰幸給聲葉起與歌一解一坐盡眙是日歸莒莒沈浮長安數十年葉之價益露然以莒能善人而優曹亦歸之故卒得不貢聲禁中葉為人潔峭自處雖諧者百態争笑於前未嘗換色元和六年莒從事岐公在朔方時余往謁焉會與公賓舍於郵在莒隣夜聞其歌有一人坐泣甚悲良久復悅及卒聲而悲悅再三曰孰為之是欲吾不得自任耳明旦問其狀乃葉為也後莒復從岐公來彭城十年余過其居問葉安在曰近逝矣自趙璧李元馮世稱為知音之尤皆擅鼓弦及為余言葉之歌使其妙自備則音屬不知和矣嗚呼豈韓娥之嗣與惜其終莫有能繼其聲者故余著之欲其聞于後世云閩城開新池記閩城吻海而派江輔山以居先時無安沼平池為遊舟娛席之地而娉花媚竹散生擲華故酒笑酣視之晨而佳思莫極矣髙平公牧察之余乃經度隟空之所因卑汚塹而岸之浦嶼環迴之勢所造必勝羣山左右瀉影浮秀者輳空而入十一月辛卯新池成明日軍副者亞之疾閒公延䕶軍及從事絃工吹師裾袖之曹游池而酒既坐謂軍副亞之曰吾疎汙隟以就此而海波朝夕盈來之候逓輪足給以為我狀而石之以期乎不朽軍副亞之不敢讓遂執巵俯船祭酒於其流因祝且詞曰水能濁清首冠五行波流巳大有神為宰環塘縈縈為公藻鏡新池泱泱與地興禪嘉鯉鮐魴於水息昌嚵鮞嘘虺即水與死翡翠鵁鶄浴涘眠晴辛蒲剪剪扇荷擎擎時未云來勞思乃馨柘槿紺竹滲縮醖沃延榮接姿以水為禄輔佑堙隍吐孕百福惟我公之明之通之智之忠保夀考兮與池之無窮軍副者亞之詞既復再拜跪巵奉夀于公前公大喜還列就坐以酒以歌日入而起夀州團練副使㕔壁記戰國南北書更言故世諸豪争據於夀春或兵至百萬有不能得者豈地勢為要津乎自建中已來淮夷窟叛於蔡天子之詔或討或赦由是夀春備為東塞矣為之守者皆佩將軍印幕府符書之設擬於方鎮而有副使之官焉元和中韋公武以殿中侍御史為之九年秋蔡州叛夀春守令狐通引兵屯霍丘副使得孱卒百餘人留郡中冬蔡兵大入馬塘冦鄧家城殺其將卒五千餘人盡虜民男女焚壊邑室而去郡中驚駭民人多流其家而東副使因言夀春其地壍水四絡南有淠西遮淮潁東有淝下以北注激而迴為西流環乳而濬入于淮此天與險於是也假如愚民能棄其業西流即為蓬徙塵走耳安與國是為利耶乃出家奴與民户一丁但為水工決安豐已南陂池㑹其流于城傍野中浸注如澤以故居民流心稍稍復定時馬塘鄧家城既陷霍丘方畏冦乗其虚復飛語謡以惑其俗耶狐死首丘井閭多傳言之耆老曰果不能守是堡矣守聞之益恐遂棄其城亡歸是日霍丘焚行來及郡㑹日暮使吏馳告副使以歸狀令得夜開壁吏至壁卒捍闗不得入呼罵其卒副使立城上曰某得命於詔城晝受即晝復之今守獨入而卒露無為也如驅與俱來寧不知盜居其間得夜則禍成矣或幸止於郵平明闢闗介士陳兵夾道驗其號以入卒無敢越伍而趨居有頃守謫去詔以李將軍代將軍西出强兵臨萬勝城復以副使掌留事明年陟其能得加侍御史是嵗亞之東觀戰至夀春得副使之跡題之於署下以記行事之時云盩厔縣丞㕔記盩厔道巴漢三蜀南極山不盡三十里北沮渭短長之補與山而近其野半為澤故鼠倚穡而居雖善捕伐不能無傷于稼說者以為漢孝武帝嘗夜出射熊於是而田人輒留執帝從者由此觀之民情阻限古為艱理時猶逼畏指諫即稍罷然佞臣竟以帝恥不忘遂籍民人田為五柞長楊矣今又徙甌越卒留戍邑中神策亦屯兵角居俱稱䕶甸而三蜀移民遊於其間市閭雜業者多於縣人十九趨農桑業者十五又有太子家田及竹圃皆募其傭藝之由是募民豪農頗書名買横緩急以自藪匿民冒名欺偷浮詐相樛雖賢宰處之而丞與曹或不類莫能盡枉直之情也夫丞之職也贊宰之正以諸曹其有不便於民者丞能得不可今丞也余從祖居之既滿嵗民諍不作如此則宰之所宰丞之所贊可謂知方也已長慶初余思相如進諫之風南歴長楊至於射熊五柞訪其遺跡因退舍是邑遂悉論山川俗里之事題於丞之署云都梁山倉記汴水别河而東合於淮淮水東米帛之輸闗中者也由此漕入其所交販往來大賈豪商物多遊利鹽鐵之臣亦署致其間因擇官分曹以𣙜庶貨而部貢之吏盡令鹽鐵諸官校遣之疾徐用賞伐大梁彭城控西河皆屯兵居卒食出官田而畎畝頗夾河與之俱東抑澤河流水温而泥多肥比涇水四月農事作則争為之派決而就所事視其源緜緜不能通槁葉矣天子以為兩地兵食所急不甚阻其欲舟艫曝滯相望其間嵗以為常而木文多敗裂自四月至七月舟傭食盡不得前元和九年隴西李稼為鹽鐵官掌淮口院病其涸滯思欲以為救而乃與揚子留後議之曰自閩越以西百郡所貢輳輓皆出是以炎天累月之乆滯於咫尺之地篙公諸傭盡出所儲不能振十半之食只益姦偷耳幾或有終嵗而不得返其家者今誠得敖之倉列于所便以造出入計無憂也正月河冰始泮盡發所蓄而西六月之前虚廩以待東之至者矣如此則役者逸而弊何從生哉議定即以狀白得遂其便於是稼度泗上卑濕無堪地遂剏庾於淮南都梁山十二年詔以誅蔡之師食窘促令鹽鐵所輓皆趨偃城下是時下淮南倉發舂吏計舂其工人曰舂材必櫟若榆吏欲令公就山林剪市之稼曰天火方焚曰將燋萬方當頃刻之間雖得弊穢之器奮濁汚之波百夫汲而揚之立足滅患如曰不然我欲利其器待我柘桂之杓致滂沱之流操以救之彼言而後謀則然灰尚不可望而况全者今縣軍十萬旦暮不賑其為急也間不容釐今待汝訪山求材然後用何異乎柘杓滂流之語耶其倉材剪之餘大可以為臼小可以為杵長可以為杵之梁薄可以為䏶樞夾峙促命裁之即日而舂成百具其餘來與吏分辦之先以家奴就役次及郡吏各有差所舂凡二十八萬石不涉旬俱得浮淮而西矣十三年夏泗水大災淮溢壊城邑民人逃水西崗夜多相掠奪更驚恐號呼而鹽鐵貨帛十餘萬兩囊之於布緘用吏名載與渡貨帛無遺尺乃内倉中不能盈一敖其餘皆蔭仕家之急時余過泗上得其事故與悉論善濟之方而著之以明其績華州新葺設㕔記今天下邦郡之望莫與太華等然而公堂讌無别位顧几硯與餼樂之具日更廢置於其間寧地勢之要為守者無乆留於任而經慮莫及此乎隴西公為守未滿嵗郡中既治因窺其庶屋可攻者乃先問其吏曰政之為困何始也吏曰累更其守耳公曰吏知其病哉夫几硯者公事之重器也以宴而遷以宴而復則居不得常屢更其所政之為困不由此耶且吏入公門望其居則必莊是几硯之廬處宜其嚴也今朝徹而暮置事之者既勞固以慢矣而况酒行樂作婦女列坐優者與諸隆詼謾揺笑譏左右侍立或銜哂壊容不可罪也夫狎乆則不敬豈吾之獨患其吏亦醜之明日解冗宇一構于正寢西南隅壍其外數步土基之飾故材以輳用垢者磨其淄弱者承其輕決流於其所以便塗者補棟續楹不涉旬而功就沼沚之湄隨而比矣嗟乎轉􅂒為安不費而功吾知其由人長慶元年四月甲子吳興沈亞之仰公之跡因請張文其下紀其功焉隴州刺史㕔記昔制戎於安西瀚海之時而隴汧去塞萬三千里其處内居安如此朝之命守猶以為重地必拔其良能當時之務其難者不過理寵門大家之田園陂池而已觀昇平之基其須賢如此今自上邽清水已西六鎮五十郡既失地地為戎田城為戎固人為戎奴婢顧隴涇鹽靈皆列為極塞而隴益為國路凡戎使往來者必出此視其守由主人也而言語威儀豈容易而處近世者朝之命守殆未能注意耳今清河崔公承寵世仕安西軍司馬公生長於戎然而神性傑異行賢智之路頗通諸書又能博九州山川之理而國中之士知而仰者無幾人近嵗西戎累犯塞前年今上即位欲以姻交北虜以輔中國上書言兩蕃之事天子覽書以為必能同戎夷之情故命使之今年拜守隴州拜之日朝之卿咸謂隴之得賢為賀居郡而戎來者必憚愛而去嗚呼何向之命守未能注意而今之悟得其人賢何向之知者無而今之稱者盈朝豈一郡之事有時而理耶一郡之人有時而幸耶智者之道有時而用耶長慶初余西視戎至於隴下聞郡人之所美故列署而刻記焉沈下賢集巻五欽定四庫全書沈下賢集巻六唐沈亞之撰記櫟陽縣丞小㕔記便署所以接賓也櫟陽岐諸陵走左輔蒲太原燕趙魏山東至於匈奴雜虜之道而諸侯使者及戎王聘遺之臣交馳出是無虚日而邑頗瘠於擾費然而遊宦客子出入往來者則公賓為寡也夕館而晝饌自宰丞尉簿或不能支於給饋而賓去嘗悒悒不快長慶初燕趙魏侯者失理卒亂辱殺之更自立新帥大臣皆進意請討圜其境之諸侯咸㑹兵襲戰飛蹄走轡之奏傳呼相追而又降嫁匈奴中故使者益至若是宜謂私賓不能加也然又遣使陳蔡許滑大梁彭城皆發卒戍河北督責米帛於兩江之間使百郡所輓無西入由是天子之使入潼闗者日數十輩大者乗馬至百小者不下十餘郵馬盡死於道凡往來乗馬畜者無問其誰皆奪之故遊宦客子俱凑道櫟陽中計其衆寡復與公賓之數相髙矣是時櫟陽城當公主降匈奴使迎者之部千人天子使後宫貴御行餞於道侍嫁大臣從官衞士亦數千人夕頓田氏遣承奉供具以不能擾民一縣之吏稱善辦及歸乃計曰夫遊賓四時之來獨夏其為稀耳我且與理一署使其密温禮以待之然後以為家之給與賓僕相等是寧有忿賓哉既以賓之來者視其館之窮罄雖勇寒猛餒必抱愧自饜於所饗嗟乎隆否之跡由夫履也其構在公堂之左正寢西南隅其形類廂二間覆厦於南陲其就在長慶元年八月甲子也解縣令㕔壁記國家誅叛以來於今十年征徭息繁不勝於籍租𣙜之法居間為民起横縣令不得専以子養之化理之蒲鹽田居解邑下嵗出利流給雍洛二都三十郡其所㑹貿皆天子豪商猾估而奸吏踵起則解之為縣益不能等於他縣矣鹽田主官用郎吏其佐賦下不出御史操法繩縻十九闗於縣令而不得専但奉府曹侯長之教而已鹽田細吏皆縣民其田園雖業籍於縣而令不得親但以縣民之衆馭之而已若是為令與尤悔日争焉苟非智良不能日脫於横今令者余之從祖也且滿嵗而尤不及豈其厚於智乎而又招亡民還業者數百至于公堂便館葺飾者凡十餘構工不勞民又何多方也長慶二年余客其地因受命而著記云著一作書櫟陽兵法尉㕔記尉之曹兵法居末兵法之任在天下郡首長之臣且難其理而况畿之在尉乎櫟陽其瘠沃相半豪户寒農之居三分以計而豪有二焉其父子昆弟皆卒名南北東西軍圜衞雜幸之恃或籍書從事星臺藥局織館雕坊禽兒膳者之附而又勝女拏據反為之盤絡是多類者非獨不得為縣民之衆馭之而已亦且馮縁蔓横以業吞漁獄之所操動繫於此而禁局强曹垂攀於前援者持符以解之固能移情以二法使終決不必理從髙綴下相承而邪而不能竟者尤還於尉其受役唯單産孱民月徵之一人輸徑宫門至於内廡逓漏嚴夜給事諸主家及園池大廏皆校尉遺之豈尉之無慮也永貞前諸畿自進士而得尉而昇班者十六七他入之尉而昇者百一二是尉皆摩心清視以事察决用以此自價朝之未以此市若是今雖統曹不能强尉於無當近世恩臣負幸惡其踵進自致即白上約下以為尉未足拜且塞譽排能使昇班之恩必有自令視尉之風益賤而今益輕矣由觀為尉者俛俛自度民之吞者肆其懲弱者甘其困姦者隟其欺邑是者畏其為尤屬而決之其兵法之源使無撓濁其易乎哉其易乎哉古者盤盂有書盍誡其當器受量不陷也鐘磬必銘朂其全聲有待也鑄鼎記刑子産之為也尉也兵法之曹類此不復矣敢不有記故附署而屬誡焉移佛記元和四年三月五日杭州報恩寺長老與其鄉閭父子將徙故佛像歸復於其寺佛至乃饗長老使白其由於亞之而求詳錄焉沈子曰西域之有神教流於東域中者其教像法其法者名曰佛自稱曰天人師又曰世尊出其言亦曰經驗其經之說佛去世而後模其形焉像其真與衆瞻仰之故法之言像由斯也其或範金鐵以為之合土木以為之堅之以脂膠飾之以丹漆五色然後形神儼然成其像舉其數體有為尊而坐者有為卑而拱立者有跪而如受教諭者有執樂而弦者吹者有具其形怪荷戈而勉强者有瞋目咤叱者摸鬼神焉此為像之外者也其性之㫖為戒慎正邪去惡為濟渡力道盲聾警沈溺使民無不善如我仁誼慈惠然此為像之内者也又說有已來之生來生之後為福則福應為禍則禍應因縁化而設其㫖或由是舉域大敬自天子達於庶人一信佛之來於今八百餘年矣其間亦時神怪焉先天中其寺之佛事具足如向之稱者無何水火災生民流沈溺於是邦其寺之佛事卑而拱立者跪如受教諭者執樂而弦者吹者衞而荷戈叱咤者皆毁也散其宇皆落唯尊而坐者獨巋焉而存由是納去又重其莊敬焉數嵗其鄉人後生敵惡者十誡其三四故此鄉之人思其功力復求而歸之與其敵惡誡而敬順之道明矣嗟乎忠信仁誼不舒信于人乆矣而皆以已生來生之後因縁禍福之說化行焉今余因長老請余記移佛之由遂得道教之所以意者欲使羣生隨其機以悟之其機髙者其性惠見其内像而内覺發其心而能至其正其機下者其性回見其外變而外覺反其心而後歸其正是故精麄其内外之像以陳之謫掾江齋記謫掾沈亞之廨居負江方葦為墻正於隄防之下堂序四闢巽隅道門雖心風奔怒鷗瀁鷺澡顧簷廡之間而拏緒不發方署即盡提枕簟假庥於弗域之中雖淄衣煩厭乃陽為不省也一日謀解其西廂將面水以敞之而筆吏王局前語之曰掾俸簞而食或不能給尚能及堂室之為乎且廨宇非乆託即更之得不為尤乎况葦茅之葺輕弱易腐人人動歴嵗時寧任再滿所用直使罄裝併食以為之無所顧則郢壊阜磔而澤遊木生多不能材漢流聳急束栰寡止縱有必修巨重價又不當是用曷若無易其故與亞之曰誠爾也然則吾以為肝者膽附庸其中為棲魂之館故能専視而佐意隨姿而起情今漢流右吾之居不過數步壅擁之患不得日覩由隣顔冉而不親其徳也吾何能薄其實而厚其浮哉遂召工人庸人茅塗之者與寄之磨淄洗故得充用者十五太守聞之與其薪十四其餘則搜剪補輔然後配材就構雖紅短不委各輻凑以任一棟七桎助枑楣二桶覆厦狹廡重左而單右若翅之將翔然蕉旗竹篲分植叢列為箒風篩月之餌方檻短折面江虚波炳嶂委霞影對綵紅碧幟拾奔給于所曯逺邇髙卑龍苦交黨為宵清曉爽之借暴隂色蒸雷扇蹈震神冶鼓焰如金縆騰樛趠䋴䎀干聿切為颭燭揮鋩之駭蓊然頽雲若然漏曜倐閃態狀若笑若怒相為端緒馮坐之中足以自廣時大和五年五月十九日也杭州塲壁記國家始以輸邊事塞不足於用遂以鹽鐵𣙜估為助使吏分曹計其入於郡縣近利之地得為院鹽塲之署以差髙下之等顧杭州雖一塲耳然則南派巨流走閩禺甌越之賓貨而鹽魚大估所來交㑹每嵗官入三十六萬千計近嵗淮河之間頗聞其費自是汲利之官益重矣前年京兆韋子諒官始縣主簿有能名及秩謝當歸是時尚書職方郎崔稜為揚子留後使聞其行遂邀署之既到滿嵗利𣙜大登吏無敢怠與其縣主簿加勤也或謂亞之學史詞無苟故用是記焉復戒業寺記皇都左輔其屬縣朝邑縣令王鄆言能改作便民當有緇衣遷寺戒業民不便鄆復之初蒲冦李懐光既虜其屬將收其散卒聚之長春宫城圜朝邑室廬皆殘燼寺守益毁其後緇衣以為居近郭苦遊賓乃聚黨與謀遷之西堈縈垣侵社地又治殿廡諸墓墳隴當其下者輒平去是時鄆為尉固止之緇衣之魁得他吏與交通為助故尉終不能制日縱其徒於民間為禍福語以動惑之民無老幼男女争相率以奉所欲顧畏已後耳及鄆為令乃元和七年也明年召緇衣宿老師弟子與語曰緇衣之道非能逾仁誼以無害故天子許留國中前者緇衣無狀徙其居西堈之上侵社地壊丘隴夫社國之尊祭也丘塚人之反本也今而曹自為其居侵壊之是寧無害耶某昔争之不得身常慄慄抱痛願得自劾以快意今能亟復之幸善不能亦且論繫矣民聞之皆大喜故以其年十一月悉還其故九年余東適邯鄲走蒲闗朝邑令為具既酣前奉酒於余因請以其事次于文東渭橋給納使新㕔記渭水東附河輸流委迤於帝垣之後倚垣而跨為梁者三名分中東西天廩居最東内淮江之粟而羣曹百衞於是仰給唯平輕重之准為難即主官不職其咎何如哉長慶中得儒臣杜生以行御史主之能謹法整吏絶輕重出入之尤明量信敘無先貴後賤之弊故官曹士衞之所仰給者如取之家食焉居再嵗加為外郎因指其署曰夫渭津傍控甸邑諸陵道左輔出入河東藩而公賓遊士過必臨我我儒世家也宜飾宇俟賢以誠其敬今公齋陋冗無足為禮於是盡去之募市其傑棟巨楹文梁勁桷既已具構顧其中可敘百榻而儒良至者必與講談其道隨其能否而梯級之得乆留其下者雖孱車弊衣則名日彰矣今觀渭津之剏開署宇為嚴虚廣敞意者得無欲天下之士見其胷中之曠大乎沈下賢集卷六欽定四庫全書沈下賢集卷七唐沈亞之撰書上冡官書亞之伏念傑木之生大長越倫足谷肩山而大谷不足以業其根長霓不足以帷其華天之所借其體若此豈不使皆獲其所安而輳乎用及其未偶也徒見摧雪枯霜䝉烟老雲而已夫尋常之材也幹不丈而枝不尺而葉縱其根不饒􅀈土之膚生不十年各獲斤斧之制以就用何者受乎庶氣故易長於極成為衆用故易售於工其在松栢扶榮意自得仰視傑木不見其末相與笑其凡枿而無用及一旦遭遇得升賢工之所思採而飾之跨於楚而百棟賴負若是脩枝巨幹未易自致也賢士良匠未易能容也今閤下抱多能之强徳動與智諧可謂遭時也負難載重横於所安可謂得任也如能察出類之材異日處之然後次衆材備於百當如此則賢工之名可以自有古者賢士之居位也沐垢不終湯充饑不竟飯中輟而起畏日不足是皆採訪於衆能思致其爵養良士之道也今則不然為公卿大臣者必嚴居深視以自重養其所進者唯柔氣緩言瞽視而巧諛然後謂之厚徳故以多識為誣博知為狂遷善為流斷節為詐是皆斥而莫得稱也及一日操尺墨樞物機茫乎不知其所從使左右庸胥因得侮而役之彼非不欲自勝也盖事業之所報固然今西戎邀嫁移兵冦邊仍嵗不巳山東盜卒殺辱首吏未聞其歸誠可嗟也即如主上求其往而為理者閤下度之公卿大臣而誰擇乎亞之誠不肖也七嵗再官不逾九品之列陶心研慮謨古臣知輔之所以為化至於樂能慕哲亡其私而不回此則得之於性矣酌巖賢旅聖之所以立賢至於書得失備理亂敘往紀來此則得之於文矣學名將霸師之所以整暴亂至於奮旅陣師㑹百變之狀離如驚鳥合如凝雲此則得之於師矣是三者皆業於根然後緒其末非無所望也亦思願為一從材戴宏傑之梁立巨礎之上顧世之持斧之士安足以摹哉亞之聞戎鏡包陽當日而矚之則能延燧興火處陰而視之何異一規之幽銅耶而誰寤者夫氣應則生亞之亦䝉矚於光下以發所抱書詞多鄙又不盡志忤觸清嚴罪無所逭謹再拜上李諫議書月日將仕郎守祕書省正字沈亞之再拜貢書諫議閤下亞之常有混類之悲不能自置其拙也甚矣故祥禽之類凡羽而凡羽混之非獨混之而巳亦且掩其芳而奪其美何則善寡而凡多故也况世俗之耳幾能於此而别白之者寒暑易轉是皆非金石安能自永於時哉一失其顧以為類混則終從風雨而老矣可不痛之輒假所喻願賜終說幸甚楚王之鼎食十有餘年而王體不肥左右者懼王曰膳者不能味吾之鼎也國人亦曰膳者不能味王之鼎也更逐膳者凡十輩益不味王恥乃令國中曰有能使吾鼎之味調和以安吾體者寡人爵之三公楚里之處士賢聞之應令而起耆老屬袖而送之曰往矣即鼎也然王曰仰味於君君何以塞之對曰王必以鼎授我我力甚優夫治鼎之職約水燥薪㸑火以觀文武之用而巳其輳味則有椒桂梅醯鹽醢之品在吾總衆力而調於心此其功也王之體不肥何待楚老曰斯固也夫真偽雜鬻循户而啼祈其售者偽得十九焉是椒桂之質類而馨辛不為也梅醯之質類而苦酸不為也鹽醢之質類而醴鹹不為也皆具而不為滋一旦集而㑹之鼎則必虚空矣君焉能總是之力以成於王耶前膳之所以得逐者由庶品之任非其任歟然則君之明足以察偽惑君之智足以區物情誠能儲其真蓄其當以給其用則從之辛馨之才醯醢之具必越海逾陸而趨君之㫖矣斯百代之凖也豈但肥楚王之體然今閤下既以游泳道徳蓄儲助味之具必有素也然紛紛之真偽而清悟能不勞乎小子誠不足奉應對不得謁見久矣幸因從左右者召稍延於前獲進所語幸甚伏惟降察不忽謹再拜與薛浙東書再拜後還坐賓舍中有小吏突如其來其語曰帛十匹吏置帛書於亞之前曰閤下所以貺客也其敬之誠則厚矣然有所未滿者敢為閤下道之夫虬能興水濟物故佐天如臣草木仰其澤苗方秀而望其誠有乏一日之雨而不及其實者則仰告斯臣以求得一日足矣若纔潤於枯槁則已且猶將困之今亞之往復道路三千餘里顒顒之誠於苗之旱甚矣而千鍾之祿於水之用又大焉亦何惜一日之澤而不給其涸哉亞之狂愚當其困涸不知所為而復枯苗仰澤之說再敢煩告且閤下寧能不憐之亞之再拜上夀州李大夫書十一年秋作昔者燕昭以千金市駿骨而百代稱之非直朽骨之可貴也意必在將來之良而已矣今亞之仰閤下之風而進於前恭聞閤下又不以朽鈍而顧之寧鄙人之宜顧也其名得無將來乎是鄙人之價冒千金也幸甚幸甚今有傍徨之誠敢露肝膽伏惟聽察之亞之前應貢在京師而長幼骨肉萍居於吳無咫尺地之居以自託其食給旦營其晝晝營其暮如是凡三黜禮部得黜輒歸自二月至十一月晨馳暮走使僕馬不以恙即且碌碌如有一日霜露得欺氣體失理則一室向門之心無望矣今忘辛勤之榮扶挈長幼丐食而西雖已及埇口然猶困其所儲不能自給但涕泣語空無有所仰又度天下王公希可以此言告者乃閤下耳伏惟分一日之澤以濡之無使亞之復為朽骨所笑謹再拜與福州使主徐中丞第一書九月十日都團練副使沈亞之謹再拜狀所願陳于閤下某伏念從古以來懐其所為抱其所用者非知已之進無能自揚也自咎繇之䝉舉顔回七十子之䝉范叔之䝉鮑叔之推至於今知已之功相嗣而不絶非有文字之紀其功雖如前數士而後代無聞也可不惜諸往者某始得以文謁閤下於吳之嘉興明日權幼公謂某閤下言吾見古史者亞之也其後涉於仕路困則遭恩其知如此且以閤下居為世之端表故衆影依之言為世之典謨故衆聽傾之其重如此使一遊其門則天付以幸也而况知而推之哉提而用之哉然亦懼不申於文字而後代莫覩是以前者敢以先人所業之書上干清鑒求其筆為之光以揚於幽故而為後代寵奉獻之日惕怳咽然不能周露誠以黷矣伏願憐其繼志之心使輝華裔裔著於百代雖大寵何以加於此焉伏惟俯賜終筆書辭再陳無任惕汗謹再拜第二書二月二十八日都團練副使沈亞之拜書復獻大使中丞閤下亞之昨與二三子同途晨問起居指教所謂薄疾未除將欲有請草奏具示始則卒然愕窒不知詞對及退舍伏念閤下之所苦者惟中年之士十九而有之未嘗聞以此而去告閤下惟不為出入宴遊耳其餘決教益理膳息無減况方在强茂之時徒以小恙暫留膚中乃欲為吿以自遂豈當宜也且今時仕俗守榮路者雖已朽老支扶昏怳矣然則固其所居惟恐有損如此者亦八九而閤下瞭然自悟所向若此得無獨清之累猜疾於彼人之胷中哉閤下骨肉交姻如有逺萬里者即聞是請寧知其退讓也必且疑驚隠慮莫能自浣設使憂能侵人閤下何以解也亞之見識孱淺無足以奉請事今極慮深陳於前誠願得於中庸使人無加口語也非敢憑縁取領厚祿而終斯說伏惟稍變髙明之鋭以周慮之冒陳端白何任恐懼伏惟憐之第三書二月十一日都團練副使沈亞之拜書遣獻中丞閤下昨日候吏自外來急吿以赦至亞之誡前後左右不得常步及下馬就次揖謁先聖獨張侍御不領祗言哮呼詬此捽拽導將移罵侵怒俚言攻凌不容須臾之間以黨畀證攘掉呀騰如欲見食自羣官衆將至於聚立者咸聞見其麄聲奮態圜來驚視誠以亞之樗鉛之材處不當任可逃遭此衆辱宜矣然誠恐積暴不除異日酒塲恃醉率肆所為又為侵作誣言飛入清聽以是寒心自悲不能無患亞之幸䝉過意提在賓堦雖無分銖之能以事萬一然誓將鞭勵孱謹以効終身伏願哀其端拙察以無辜稍借光明使各得分限免其侵迫過此之虞餘何敢請伏惟加察幸甚幸甚謹再拜與李給事薦士書十年春作日月新及第進士沈亞之謹拜稽首給事閤下亞之幼學見其往記說曾參閔子騫之孝至於跬步不忘雖騃幼亦能蹴然内慕自是常思其人有能跂曾參閔子騫之行者即往傳其名於親戚朋友卿大夫間使其聲不滅昔者五年亞之以進士入貢至京師與其等清河張宗顔比居嘗與往來言始愛其人無遊詞至春宗顔去還家久聞其親喪又明年亞之東歸至洛聞洛人稱宗顔之孝曰宗顔貧無以事喪乃與其兄東下至汴出操契書奴裝自賣聞者皆慟感流涕然盈月不得售汴帥聞之持百縑使弔勞歸之盡發其先故羇柩歸𦵏於所是嵗亞之至彭城日話其事彭城人曰此吾里之客子也八九嵗時喪私親貧不能奉飯唅迺繫木為車與其兄自輓而送吾里謡之曰拖車郎是今曾閔之行難而里閭盡熟亞之竊痛賢公卿未得稱其如此伏惟閤下於異行尤能鋭樂故亞之敢以宗顔之事為請伏惟訪察之幸不黙黙已也沈下賢集巻七欽定四庫全書沈下賢集卷八唐沈亞之撰書與潞鄜州書六年夏作日月沈亞之再拜稽首言大夫閤下亞之昨去長安時歴别於所知親門所知親友謂亞之曰安所適安所為亞之對曰適鄜將假貸於諸侯門所知親友賀亞之曰鄜有長賢大夫也喜文學仁義之道故其所為文學仁義之道忻忻焉走其門者日有之亞之納喜於心充充焉捶馬走僕忘其勞失其怠望閤下之境日近日喜及至之也且觀將謁之禮於其門乃見納客之官奔奔而入促促而出言不及吐道不及陳退居三日不知所為乃復聽閤下採取賓士之道髙下之等則曰某自某方來以某執事書為之輕重書之多者館善宇飽善味書之次者又次之其有有無因而至者雖辯智過人猶以為狂即與偶然之輩徼幸之徒退栖陋室與百姓雜處飰惡味且走來閤下之門者亦不獨盡窮餓無依而來求粟帛於閤下亦有抱其智懐其才聞閤下好賢而來求臧否於閤下而望其推引之濟耳今一貫而禮一類而惠賢愚顛倒而又以書不書而為之輕重竊恐天下之士其來閤下之門者皆相争齎書為糧受閤下之惠者不口閤下之惠而皆曰某官之書禮我也何有愧於閤下不唯不愧而已亦有憤激於衷而終怨怒者竊恐閤下勞費以取無益亞之之愚獨為閤下惜伏願閤下稍精接士之道使賢愚明白閤下能知此則四方之士聞之皆謂閤下不恡巳之不至而求其方直如此今亞之冒旌㦸之嚴敢言進於閤下亦希知言之士聞知亞之不苟曲於閤下而存其直如此戰戢無任亞之再拜與潞州盧留後書八年夏作中丞閤下法者古王一其度於天下盖欲必信於人耳非執事之臣能得專喜怒以自弄今或奉之未如其意何哉迺十四日亞之晨出南府門見一人衣縞不帶乗捷馬北馳健僕呵道衆僕皆左右馬分走甚嚴亞之意謂執事有服者即止馬匿道下既去私曰執事寧不帶耶不則又何呵也問其僕曰是方士李元戢者繫盜他郡焉亞之曰既繫何為縱而遨乎僕曰彼言能化黄金反童齒今一郡大惑下自豪吏盡欲徳之故馳過其家旦暮不暇亞之因仰而呼俯而揖曰是能化黄金反童齒焉凡執左道亂正者在殺不以赦今其人且繫尚能惑設冠帶自儀而孰不陷前日信州刺史以夕祀黄老不當理官臣譖之得罪幾夷誠可寒心今閤下獨不省悟亞之雖不肖亦知為閤下畏伏惟亟誡獄吏使因手足之繫與常死罪者等無令出入自便不然法為吏侮而閤下安所任主哉幸留意焉亞之再拜與同州試官書今年秋亞之求貢於郡以文求知已於郡之執事凡三易郡失其知輒去其友相率而笑之亞之為之語曰里人有良金鬻於市而里之豪亦鬻焉俱將售於衡者豪人金雖精里人出其左衡人畏豪奪其價而先豪里人懐而去明日之他市而衡之值復不同又懐去又明日之他又然歸而聚黨與謀曰聞某市有衡人不欺一市之人謂之直遂往與羣金角俱歴火昇衡市人曰雖然願先豪衡人曰是精麄在目輕重在衡衡目可欺乎市人慙而退其直果然今亞之之負詞來於執事其望亦同於直者也伏惟孰察無忽亞之再拜與京兆試官書七年冬作孔子之徒三千而言升堂者十輩然皆不能周其徳故各以其所長出人者稱之名之曰四科百世之下皆言孔子聖是知無全能者也今亞之雖不肖其著之文亦思有繼於言而得名光裔裔不滅於後由是㫖春秋法太史雖未得陳其筆於君臣廢興之際如有義烈端節之事善惡無所回雖日受摧辱然其志不死亦將俟能為孔子之心者拔之是以晝夜增矣時亦有人勉亞之於進士科言得禄位大可以養上飽下去年始來京師與羣士皆進而賦以八詠琢雕綺言與聲病亞之習未孰而又以文不合於禮部先黜去今年復來聞執事主選京兆長安中賢士皆賀亞之曰某執事斯謂明矣其取舍必以目辨耳察亞之曰微亞之以八韻為畏對曰不然夫良工為厦而選材者不以桷廢棟不責能此而否彼又曰無求備於一人此聖人採取之至言也亞之文巳貢矣執事其服孔子之心有素如其取捨之際亦能留意乎亞之再拜答馮陶書馮生足下前辱書時㑹鄙人將有適方事役在焉今則足下又赴省於東故弟書久不遑答有負懇欵無以自露然則書辭所屬寧鄙人宜當托是乎乃敢自酌以揆其意惟智府寤之樂府唱為歌十年聲流邯鄲下而魏歌者往請之曰聞古之韓娥其歌也能易哀樂變林籟則有是也何自而及是乎今子能揚韻激妙感物態矣而人投聲請價者宜以遂之必且語我使聞聽於衆耳以得售進入為王左右之娛對曰若韓娥之歌韻合於氣聲合於情是故草木之於地也氣為之君五腑之居人也情為之長草木之生其根處瘠則其表訥處潤則其表昌瘠之訥潤之昌不過草木及其氣之作也為温陽則萬族舒為晦寒則衆色雜瘁五腑伏五行設如金困於内則肺亢應於外而嗅厭極則反之木極於内則肝怠應於外而視亂困則反之困而厭極而亂不過一發於内一應於外而巳及情之作也為喜適則百竅走而㑹之怡為悲愁則六氣集而赴之慘是皆不得自任也韓娥之得也在此馭二情以攻之故能易哀樂岐二氣以襲物則能變林籟其神至矣亦尚未聞飫寵賞於當時者何也所感者智人也草木仰天性智人不混於累夫衆庶之目怫於視世俗之耳離於聽故擊敝缶貫䑕革聚觀於市促促之歌巴聲夷辭唱一而和百贊之者千萬人南風之弦雲和之瑟曠世莫用烏能自唱其徳於聲音雖韓娥之妙欲誰繼者今足下將行者古道也將操者至聲也鄙人方困世之厭斥安足以使之聞聽於衆耳發嘉譽於此日乎畏辱雅向願悉所識幸甚幸甚答李生書亞之白辱書覽所措令僕人持書致安南守使從雅㫖以契所欲意者謂僕人居峻勢能可樞其意一云謂僕職在軍副其力可驅彼之情易如瞬眴夫何妄悞容易而不見知其不能如此哉且安南守其志木佷自齊從事已下咸以公籍督稽歴受訕侮繼章傍凌彼恃門矜耄無所加責前日韋同舍亦然顧亞之孱畏静常遭尤况又掌刑書累以法操其吏彼無路而露忿於僕人耳今來書指教欲使有為是執仇而赴於敵也何能致其願乎幸終悉省不宣亞之再拜上九江鄭使君書郢崖謫吏敬對所詰引言為書致於九江守鄭君閤下詰之既深焉得黙黙已也固折委譴之於章遂用悉陳惟聽之國朝天后之時使四裔達威徳之令皆儒臣自喬知之陳子昻受命通西北兩塞封玉門闗戎虜遁避而無酬勞之命斯盖大時之有體臣之當理也然喬死於讒陳死於枉皆由武三思嫉怒于一時之情致力尅害一則奪其伎妾以加憾一則疑其擯排以為累陰令桑梓之宰拉辱之皆死於不命嗟乎嗟乎自是之後臨戎觀危酌逸勞之狀為使者而儒臣莫與矣前年天子以兩河逐叛之兵連嵗不解負輓之輸而不造廩庫皆從便道為戰士衣食之給於兩河之間嵗尚賑朝輦之下執笏常謁請罷所討者十八九獨諫大夫自以為習知叛臣之情日就窘請得往導愍痛以歸之既可所奏即請以亞之為副又以為古者單車為使有功則為戎臣輕害之遂於行請兵以自柄詔書仍以便宜從事又詔邯鄲鉅鹿兵各以百騎與俱盖欲重擊鑿之柄也及過平原郡城而有常山卒分居之諫大夫因令亞之為書檄之書成亞之題帛引弓射書於常山帥帥得書以期請降滄海之人聞之降者日百有餘輩及滄海叩欵與符印偕至即請以城歸使者是日往受城亞之復引前驅騎為先至滄海同㨗與其徒繫頸者服衰不帶伏軍門之左委命於使執事於是諫大夫遣河南將石税部獻闕下稅夜殺同㨗於平昌亞之分道馳還以報事道中不得乗乃乗羸驅馳至貝魏之門守長皆為艱日昃不得食因中病於廣武之間歴再旬而謫書降即奔上所委今閤下罪諫大夫以為狷急忘體冒危取禍習𫝊不察其端本附言和唱敢避忌應對哉昔者酈生馮軾下齊城七十韓信剏而烹之在前代且爾况今持兵連營淹嵗經時既費且敗萬無以自塞之際而使臣幸命詔御解羈裂網之恩啟萬死重生之路曝鰓就鼎之枯彼不思於降復何歸矣今習詩書步規矩而進於是者因未嘗習武事况親於戰鬭之間耶必多武臣之言以為信何者重巳之不李祐避能而誠邁越之談也或亦有詰亞之曰李祐避壁攻平原城城危且急尚不聞有效且使臣居間曾不逾月而云城降者何端亞之應之曰獨不見童子之情乎夫童子師與終身之益何惡而不附乳母蠕蠕之常恩而扶戀肆喜氣微意迫則毅容之難洽而吿訴之言在前也是則向使之卒披堅甲持銳鋒以相攻差剛決於敵者不瞬而殞形喪魄矣有如使臣之煦諭明白寧有忘生趨死之渝乎此解拆之言誠不當為閤下說說亦不能降聽以委書之丁寧者盖欲流之於世以俟通方之士次第于所悞耳梗概之録不文於詞亞之敬再拜答馮兄書降書誨慰滓滯之情稍以揚矣昨日奉書應對之日操意張謀唯恐不逺刻文勵語唯恐不工思欲不肩於俗以為世之大寵及遭不録退舍自念夫若是也非窮心於此安能堅然而顧之雖窮心極思而風水之力所排者又安能固之於此固之於彼非吾兄韓兵部安能不為所惑者知與既寡攀援將誰近世復以知人為恥既知而譽乃為之私反不若譽姻黨耳以此自悲不能無憤亦欲極老目之力不忘於文以思雪於後代之人耳吾兄豈常失味于是耶乃教之空門之說小人狹薄尚為激然之氣戰燎于胸中故九引達者之波而澆之而熱腹九熱未知其救也果兄之教後至是將有可開也自廣之詞紙不能盡不宣亞之再拜答學文僧請益書孺顔上人上人足下辱書指問將望於僕人謂有解達可以梯進之級猶畏過意請聽畢說幸甚昔之有善煅者火五金而别器一日化百狀而智用不竭然常薄産自給弟子相率而笑之曰夫子之於業工矣然而市售之富不能當陶之饒何也對曰夫陶者淺勞而薄利與俗相用彼朝市而夕隳失其用復從而市之無虚日故能饒且吾之業搜其度而運其為及其成功于世終始彼匹居之人又安能罄其室而市吾之工哉故常飢亞之悞學為黄金之鍛且已困矣上人無乃襲飢於此哉非敢自重誠恐以陷其所從耳幸孰慮焉亞之再拜沈下賢集巻八欽定四庫全書沈下賢集卷九唐沈亞之撰序送張從事侍中東征序去年淮夷誅凡諸侯執兵者皆統在侍中故侍中得坐制於大梁以長子常侍帥萬人臨事破豎北勁皆先諸侯軍故宣武論功得為上今年齊淄不順命天子復使討圜其境之諸侯咸㑹兵四塞於是侍中空大梁驅甲馬三萬騎與攻壓之具金鐵草木飛石騰梯之器載而引者亦三萬乘擇日出夷門門下之賓叅于幕者張生從焉生舉進士得第因東客於侍中門以協律銀綬而居侍中器之以為敏良可親起居必與俱及考釭有期故謂余敘其所以云送叔父歸覲序古之取士得明經為清選近世即為進士亞之叔父獨謂古道可恃乃曰我儒世家也當勤經策義取髙第耳業之三貢果得中遂理槖言歸亟思以賀為髙堂之夀嗟乎斯古孝㢘之職叔父盡之無愧耳及東出都命諸子亞之撰序詩以贊行云送田令二子歸寧序昔兩河之流未歸而中書公為魏將因其師喪故門下將卒咸以農事歸中書公天子從人之欲而拜之凡類之制無大小皆俟決於朝朝之命士卒有所不孰聞者往往孽齬一年而化其後四年天子討淮夷使其中子布與去聲兵五年命討常山悉師臨淮南宫成七年淮夷滅八年常山貢二郡赦之秋命討齊魯移兵東渡河急攻濟北九年拔之斬其魁以獻其秋入覲盡以昆弟諸子去魏從謁京師者十餘人十年常山帥卒常山人以其狀來告中書公由此得其事前白奏於是拜帥常山自以魏歸不十年天子之兵南滅淮夷東清兩河而曰中書公之勤也乃以兄為尚書留置洛以其弟執金吾以子肇為亞尹居岐以將軍右持節回中以犨為將軍居北軍又以羣為將軍居列午為少將作牟為殿中丞以支恭玉昆弟姪俱以中書公䝉寵居官然皆謹恭下士人多以為當任與儒者比長慶初少子牟牟弟早令覲中書公明日出都門來顧余以云轂下名人文士必以文寵别欲余有撰於是與述終始之跡以塞其勤送韓北渚赴江西序或曰近世有府之侯邀士拜賓不由巳之所尚而使羣居不類故有諛言順容積微之讒以基所毁四鄰之地更効遞笑飛流短長天下聞以矣而其侯尚且不寤夫言諛足以瞽明薄毁足以害忠若是雖欲明其撓直而明莫之遂也雖樂聞已之所闕而闕莫之聞也彼思勤畏過者一牽於諛讒即爾而况已之所尚又使羣居不類乎是以慎行者之所畏也昔者余嘗得諸吏部昌黎公凡遊門下十有餘年北渚公之諸孫也左右杖屨奉應對言忠情勞其餘則工為魏晉之詩盡造其度今年春進士得第冬則賓仕於江西府且有行日其友追詩以為别乃相與訊其將處者而誰與曰有引農生倞耳夫引農慎行其道不欺者也北渚之往吾無虞其類之患勉矣惟耳不衰於道而已送韓静略序或者以文為客語曰古人有言仍舊貫如之何何必改作乃客之所尚也恢漫乎竒態紬紐已思以自織剪違曩者之成轍豈君子因循之道歟客應曰草木之病煩也使秋以治之維孱萌於窮枿之餘搔風被露相望愁泫陽津下潛雖佳懿之彩猶且抑隠唯恐失類於慘禪菸黄之色耳安暇自任其所長耶即春以治之擢氣於其根昇津百體之上暢之風露而繡英作誇紅奮綺緗縹紺紫錯若裝畫揚花流香靄蕩乎天地之端各極其至使肆勇曜如是寧可以一狀拘之人有植木堂下欲其益茂伐他幹以加之枝上名之樹資過者雖愚猶知其欺也且裁經綴史補之如􅤞疣是文之病煩久矣聞之韓祭酒之言曰善藝樹者必壅以美壤以時沃灌其柯萌之鋒由自而銳也夫經史百家之學於心沃灌而已余以為構室於室下葺之故材其上下不能逾其覆拘於所限故也剏之隟空之地訪堅修之良然後工之於人何髙不可者祭酒導其涯於前而後流䝉波稍稍自澤静略於祭酒其宗也導道十年而功就頗秀出流類今既别而延蔓將遊乎河江豈欲益其自廣哉惟其勉無怠别前岐山令鄒君序十年秋作昔者亞之西游過岐山而令秩始謝余將就給食人曰故令雖貧然能卑人厚禮何不往舍也時方暑既見解帶座令衣弊繒短衣使兒孫姪捧案前賓食食巳有客越而請曰聞令家無女使賤走賓客食必夫人親治之誠厚士勤矣且賓之來者無賢不肖皆即混然齊飽是愚為冒矣而賢者安所愧乎今願擇之而厚給如何者令曰古者侯生亦有言人固未易知夫士以食而來我者留於門無繫帶之間尚巳為久矣焉能待辨而後進乎亦寧有給之一食而使其甚愧固如是雖賢愚何望哉客慙而退至今三年與令遇未嘗再㑹食客今令窮來京師人無假氣而延於進者嗟乎㑹予與令各有適故書前事以敘所憤云别權武序七年冬作秦隴之地其氣雄而能産出竒夫良士由是古稱賢士大夫多隴西秦川在隴右數百里而隴峻水夷川之源出其左余吳興人生於汧隴之陽長而西望秦原水土精神之氣昏旦異狀予又怪近世竒夫良士不繁出於此往者五年余自東來京師見中山劉定命言天水權武其人可教耳吾常語善於武武發言往往次道及出門行事多以言明日余過言之復其語則仁與不仁義與不義必汗流􅡌慄胷目如即事既罷定命又從容為余言志所未遑者則下涕頓首又曰吾有女弟欲以歸武願言成之事皆未及㑹余東拜親於江淮冬還都下不幸而定命死其親友赴喪者數十人武臨喪具事終日繼哀無絶聲予持其手曰桑隴之能産賢由賢之能産徳誠未窮矣既𦵏武當西去予贈之曰夫孝慈仁誼忠信㢘直總於已曰賢辨是而行之不惑曰明子有之矣慎終行之夫金之為物也鎔而為器無不能然則將求為大用必圖於善冶者當其未善必更之當其善無墮鎔序詩送李膠秀才歌詩之所以為發寤其㫖甚逺夫物情暢樂怨抑之感吁而散之大空還㑹於風雲降於水土包聲於陶埴之器髣髴之變盡揺於樂樂之所感微則占於音章則見於詞微於音者聖人察之章於詞者賢人畏之故勤人之君欲以聞其下忠主之佐使以達其上夫往代之詩樂皆能沿聲諧韻今徵其文以觀之而其代興衰可見也寧近世學者固不變風從律耶何為其詞不聞充陳於管絃乎今樂府既闕所奏如有忠言之意衆所仰哉余故友李賀善擇南北朝樂府故詞其所賦不多怨鬱悽艶之功誠以盖古排今使為詞者莫得偶矣惜乎其終亦不備聲絃唱賀名溢天下年二十七官卒奉常由是後學争踵賀相與綴裁其字句以媒取價嗚呼貢諷合韻之勤益逺矣膠亦諸王孫頗専七言詞始來長安人以為思轍賀今一不中第言歸故楚江陵下豈欲以廣其情於烟波顧有撰余乃敢悉敘詩歌之大端以為别贄送杜憓序初亞之提筆西入闗留舍鮑溶於揚州溶出詩吟至夕過百篇而窈窕之思雜發亞之嘆息曰後生亦有繼之哉鮑溶前在長安常出入冢官杜氏家羣孫皆喜溶是時憓方學何虞詩於其音往往能自振激後可得也及亞之與生昆弟遊其相樂之愛故與溶等而溶言果然十年春生長上知生之志謂生曰巴漢瀟湘之水皆淪流於東合而為大江猛注於江陵揚州兩地之間其名山圜連横秀之色屬江而起前文者自馬遷皆經遊之六代為詩之士而得聲名騰翔矣因命生去遊以廣其思三月生即路亞之喜鮑之知言又樂生受命之遊故終始以序送同年任畹歸蜀序十年新及第進士將去都乃大宴朝賢卿士與來㑹樂而都中樂工倡優女子皆坐優人前贊武者奮袖出席於是堂上下匏吹絃簧大奏即暮既罷生揖語亞之曰吾家世居蜀嘗以進士得第吾少能嗣其業幸子之文得稱甚光願為我序還家之榮亞之辭謝不敏曰願無讓曰始生與兄之來舉進士得絀及綴字為便口之句歴贄其文於公卿之門由是一嵗而名八年成都貢士生名在貢首九年生與其兄試貢京兆京兆籍貢名生名為亞首生之兄亦在列下十年禮部第士生名在甲乙如是而後歸亞之以為相如還蜀之榮而生未厚也送受降城使序清河張生少以善言語應對聞長又好六符神畧嘗從竒丈夫游至北邊歴塞經受降城以宗人䝉幸於上將軍受降城扼塞得與方鎮列方鎮諸侯時節更置其使通殷勤生以善言語故遂得居使者位今年夏生使於夏得其歡而還夫以節度尚書公専聲重義為天下望者重目故四方使其來者難如此不必言受降城之上將軍之善應對不辱於此而見其不辱也不必言尚書公専聲重義於此而見其専重也六月壬子尚書公餞使者於陽平樓命幕府賓佐相與追詩以為贈不以亞之為不知言者皆願以亞之言為首敘草書送山人王傳乂夫匠心於浩茫之間為其為者必由意氣所感然後能啟其象也此凡一舉志則爾而况六藝之倫乎余聞之學者曰昔張旭善草書出見公孫大娘舞劔器渾脫皷吹既作言能使孤蓬自振驚沙坐飛而旭歸為之書則非常矣斯意氣之感歟今山人王𫝊乂學為旭書居故吳公子光劍池山傍積十年而功就歴游天下慕其出已者師之欲增其功也及至長安舍余家為余題故平盧節士文因感之聳髮寒肌謂吾友生曰願欲余敘其書意者豈余之文以感王生之志於皷噪劔氣之志乎顧不敏誠以孤生之望也聊題百數十言以塞其志送洪遜師序自佛行中國已來國人為緇衣之學多幾與儒等然其師弟子之禮傳為嚴専到於今世益則儒道少衰不能與之等矣於其流亦有派别焉為之師者量其性之髙下而有授說故有瞑坐而短行毁刑而皷談之道岐於是也十一年春予東上㑹稽還造江有緇衣洪遜從余假渡自言能贊導佛語嘗與其曹羣居講誦恒}
