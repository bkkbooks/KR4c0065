  - {type: variant, offset: 6, length: 0, content: '', WYG: 輩推信他日復來言當之闗中欲余以序之夫西都輻集之地居多豪緇得進於上前者車服之饒擬於卿士而遜得無欲乎在自勉而巳余不知佛故序無以備汝曹之事行勉贈尅躬先生士之冠髮就履莫不多善以自襲必泉好惡於其裏好惡形則利害隟而其明一悞所燭習識之惟與生相老矣而幼善亦違也惟尅躬慎惑為能多即之故曰尅躬敬事則道容以尅人則偷尅躬而擇行不諛者處濁則清居族則睦結友則義字俗則化折獄則不濫夫𤣥黄之滋不能混玉之素尅躬之志幹以潔故處濁而能清愉􅈔之私不能玩於禮尅躬之氣和而莊故居族而終睦稼穡之報不終負於勤尅躬之行誠輸而勞先故結友而能義河谷之湍不能返流而倒注尅躬之令重本而道常故字俗而能化䝉鑒之垢不固㸃於磨尅躬之辨窮思極明故折獄而無濫若是者非勤道孜孜則多易違也或問於力行之先生曰善可遷而可無悔乎對曰吾何敢誣尅躬自塞而已先生姓崔氏字夏封生於唐臣子五代居官則克慮以事事假牧於巴梁其民生祀之處則克力以倉居於河濟之沂其友交給而助之既跡既明賢者稱之矣他日生往邠侯之命余贈而勉之曰艅艎之舟腹萬斛而不盈浮波而馳終嵗而不息載之者穫於馳耳及厭風水之適安於所留曷與一敖之庾等雖坎坎循環之輪猶羞其止也顧潔狂之誠能思即哲居哲忘思則狂盖古者勉不息之勤言也先生其終勉諸沈下賢集巻九欽定四庫全書沈下賢集卷十唐沈亞之撰䇿問并對京兆府試進士策問第一問昔者秦襄公舉秦鄙之人逐犬戎於西河之外因其險而塞焉後代無敢逾始秦方列為小國而東有諸侯窺地之兵西有强戎不忘之怨未聞當時秦嘗籍卒於外而屈於敵也此一侯者之士尚爾况臣天下之大哉今西邊制戎起隴黄花輔兩闗新故闗也自黄花拒塞倚漢中南逾山綿阻極巴蜀自闗縈隴西北㑹彈筝杠於河壍於朔方夾河而東倚豊而角宥天障居其西以控戎者凡七師邐迤數千里之間壁衝扼要之戍百有餘城若此足以流威而謹塞乎且戎之力不能加古昔之患而邊防與地之兵方秦之多倍百矣猶以不足於用即東取卒於淮南吳越東南取長沙至於衡山臨江更嵗以易卒彼其土之人逾寒不纊而役之積冰之地役其所不習用其所不能非獨饋輓不勝於費也及聞墮指裂膚之事父母妻子坐而興哀今欲疏罷徵之請則邊臣有失助之吿如存乎舊規則贅疣而無用得失之端幸稱其當第二問問時皆曰縣令之官為能以化親於人矣訊其變化寵最之法曰嵗益氓幾室賦隨而息之是令之誨人曰勞氓其來我者遂其所而保之吾能使吏不浸決不渝一嵗曰僑人籍而不賦再嵗曰僑人賦而不役誠著而不衰四鄰之人逋而來者屬袖於道嵗吿籍於其郡達於連帥即遷之逋人之邑亦且虚籍以自蔽累賦於所存四鄰之邑更教斆誨以召之賦累而不能反者更往而逋之四土之人環遊不絶輕去其鄉閭猶脫垢耳雖恩書亟降為之濯煦然猶虚籍為租日增而不止豈褒尤寵最之謬哉不然其咎安在衆君子皆含智負能惟其不恡嘉謀竚聞通理第三問問夫才之居人也自中正降短長之不相侔甚矣今士非列於朝請者必仰於吏部故嵗調試千餘人即假疑於事使對書決之亦有冒買其書者莫有所禁其取舍之程考於字句耳夫櫨甍軛輻之具也細不掩短挾不摸撓隨用有輳於今士一規而選授於殊執豈可盡其性哉欲去書判之選則有司者無以為准約未知何以而得其中也惟陳必中之言以程斟酌之度省試策三道問教化賞罰政之大端固並行而不相悖在交修而底於道漢文以恭嘿致理式合古風鄭産以刑鼎興譏是稱叔代昭然薄厚豈俟敷陳然則馭時自有宜急禮云不從其所行斯不亦教化之功乎又云使人有所愧恥斯不亦賞罰之羞乎若曰澄其源而清其流端其本而正其末陶然而臻福夀薰然而化暴戾體則盛矣如寛舒何是黜幽陟明為瞰察也其或舉一善而衆皆勸懲一惡而衆皆懼進猶加膝辱過撻市效則有矣如削刻何是道徳齊禮為虚說也今聖上思理股肱宣力有司登選茂異周觀材器酌時而行必有所先原始要終行能精辯幸陳其要無或蔓詞對賞罰所以禁弊也不可使其弊也夫太寛則上逸而下偷太急則上勞而下怨下偷則怠慢生下怨則暴亂作故殷周之王因其弊而更張之因人利而改作之是以不相襲制而秦驕霸嗜利吞天下以入咸陽鞭百國之貨以富宫室當是時秦法行於四海天下之人側足而立漢興悉蕩煩苛與天下更始樹可守之法使賞必能刑必罪至于文帝漢天下已四十年矣文帝躬節儉務簡易因其時而若子産者當㣲諸侯争霸禮讓流䘮盜賊羣起鑄鼎著刑以救時耳今可法之理於近莫如太宗龍興革亂隋之殘政脩法度立中庸圖堯舜為鏡於前用以為明白之理使房杜為之相輔不及當時之風一化天下流乎開元井閭之人反朴若先古然夫既理之代理之在中而已矣猛則救以仁寛則輔以毅孔子亦曰從容中道聖人也亞之雖不肖然讀其書見三代之作如此秦漢亦如此太宗中庸之理又如此且貞觀之來非逺而鄉中之老往往猶有詠其事者伏惟明徵之可從容言於上前第二問問文武之道布在方策博通其舉唯君子能之是知超乘穿札非謂武也搜章摘句非謂文也苟不通乎源流而徒習乎藝事工則工矣是謂末節者終軍班超奮於文儒有請纓投筆之志壯圖急病何代無之乃有淮右小醜久稽天憲聖上深覆燾之念極綏懐之仁網開三面舞引七徳而䑕盜蜂結趦趄未}
