  - {type: variant, offset: 9, length: 0, content: '', WYG: 巻唐沈亞之撰下賢亞之字也本長安人而原序稱曰吴興人以從其郡望然李賀集有送亞之詩亦曰吴興才人怨春風又曰家在錢塘東復東則似真吴興人矣唐人里貫多錯互不得其真未之詳也亞之登元和十年進士第太和三年柏耆宣慰徳州辟為判官耆罷亞之亦坐貶南康尉是集凡詩賦一巻雜文雜記一巻雜著二巻記二巻書二巻序一巻策文併對一巻碑文墓誌表一巻}
