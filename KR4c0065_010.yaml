body:
  text: 䇿問并對䇿問三道省試䇿三道西邉患對賢良方正䇿二道京兆府試進士策問三道問昔者秦襄公舉秦鄙之人逐犬戎于西河之外因其險而塞焉後代無敢逾始秦方列為小國而東有諸侯窺地之兵西有强戎不忘之怨未聞當時秦嘗籍䘚於外而屈於敵也此一侯者之士尚尔况臣天下之大哉今西邊制戎起隴黄芲輔両闗新故関也目黄芲拒塞倚漢中南逾山綿阻極已蜀自闗縈隴西北㑹彈筝杠于河壍于朔方夾河而東倚豊而角宥天障居其西以控戎者凡七師邐迤數千里之間壁衝扼要之戍百有餘城若此足以流威而謹塞乎且戎之力不能加古昔之患而邊防與地之兵方秦之多倍百矣猶以不足於用即東取䘚於淮南吳越東南取長沙至于衡山臨江更嵗以易䘚彼其土之人逾寒不纊而投之積氷之地役其所不習用其所不能非獨饋輓之不勝於費也及聞墮指裂膚之事父母妻子聚而興哀今欲疏罷徴之請則邊臣有失助之吿如存乎舊規則贅疣而無用淂失之端幸稱其當苐二問問時皆曰縣令之官為能以化親於人矣訊其變化寵㝡之法曰嵗益氓幾室賦隨而息之是令之誨人曰勞氓其來我者遂其所而保之吾能使吏不侵决不渝一嵗曰僑人籍而不賦再嵗曰僑人賦而不役誠著而不哀四隣之人逋而來者屬袖於道嵗吿籍於其郡達于連帥即遷之逋人之邑亦且虗籍以自蔽累賦於所存四隣之邑更斆誨以召之賦累而不能友者更徃而逋之四土之人環遊不絶輕去其鄉閭猶脫垢耳雖恩書亟降為之濯煦然猶虗籍為租日增而不止豈褒尤寵㝡之謬哉不然其咎安在衆君子皆含智負能惟其不恡嘉謀竚聞通理苐三問問夫才之居人也自中正降短長之不相侔甚矣今士非列於朝請者必仰扵吏部故嵗調試千餘人即假疑於事使對書决之亦有冐買其書者莫有所禁其取捨之程考扵字句耳夫攎甍軛輻之具也細不掩短狹不摸撓隨用有輳於今士一規而選授於殊執豈果盡其性哉欲去書判之選則有司者無以為准約未知何以而得其中也惟陳必中之言以程斟酌之度省試策三道問教化賞罰政之大端固並行而不相悖在交修而底于道漢文以恭黙致理式合古風鄭産以刑鼎興譏是稱叔代昭然薄厚豈俟敷陳然則馭時自有宜急禮云不從其所行斯不亦教化之功乎又云使人有所愧恥斯不亦賞罰之羞乎若曰澄其源而清其流端其本而止其末陶然而臻福夀薫然而化暴戾體則盛矣如寛舒何是黜幽陟眀為瞰察也其或舉一善而衆皆歡懲一惡而衆皆懼進猶加膝辱過撻市効則有矣如削刻何是道徳齊禮為虗說也今聖上思理股肱宣力有司登選茂異周觀材噐酌時而行必有所先原始要終行能精辯幸陳其要無或蔓詞對賞罰所以禁弊也不可使其弊也夫太寛則上逸而下偷太急則上勞而下怨下偷則怠慢生下怨則暴亂作故殷周之王因其弊而更張之因人利而改作之是以不相襲制而秦驕覇嗜利吞天下以入咸陽鞭百國之貨以富宫室當是時秦法行于四海天下之人側足而立漢興悉蕩其煩苛與天下更始樹可守之法使賞必能刑必罪至于文帝漢天下已四十年矣文帝躬節儉務簡易因其時而若子産者當㣲諸侯争覇禮讓流䘮盗賊群起鑄鼎著刑以救時耳今可法之理於近莫如太宗龍興革亂隋之殘政脩法度立中庸圖堯舜為鏡於前用以為明白之理使房杜為之相以輔不及當時之風一化天下流乎開元井閭之人反朴若先古然夫既理之代理之在中而已矣猛則救以仁寛則輔以毅孔子亦曰從容中道聖人也亞之雖不肖然讀其書見三代之作如此秦漢亦如此太宗中庸之理又如此且貞觀之來非逺而鄉中之老徃徃猶有詠其事者伏惟明徵之可從容言於上前苐二問問文武之道布在方冊博通其舉唯君子能之是知超乘穿朴非謂武也搜章摘句非謂文也苟不通乎源流而徒習乎藝事工則工矣是謂末節者終軍班超奮於文儒有請纓投筆之志杜圖急病何代無之乃有淮右小醜久稽天憲聖上深覆燾之念極綏懐之仁網開三面武引七德而䑕盜蜂結赼趄未賓忠臣義士有以憤激今明詔既下王師皷行視被兇殘坐見殱盪誠太山洪河壓夘注螢不足以喻然衆君子備詳前志多綜流略必有善師善戰之術七縱七擒之方一為指陳悉徵備要將求其可上達宸聦如或出乎竒秘亦當周蜜以聞獻亞之提筆之士也區區討論之間迷失聖意究未能得安足與論功伐之事歟雖然前嵗亞之覧古於濠梁從容觀魚之地而濠人有習知蔡兵舉止者嘗謂亞之言曰自吳少誠叛已來王師曾㑹徳宗尊仁宥罪詔天下悉罷襲蔡之人雖䝉恩然日夜益訓甲卒堅城深壍芻食盈廩積至今十五年餘未嘗一日忘戰非有他居反側之間唯恐為所襲耳而四境之郡備禦已罷雖數更其守未嘗聞一守留心下人收愛百姓皆能名虗軍畜肥私狗馬田園陂池之利用以自入務行金繒卜射幸臣祈遷乎善地而蔡益知其境之虗果因喪而横前日夀州失利則固然也今又欲兵徴四方使來㑹用於小凢蔡即北取趙魏燕齊西取寧隴邠岐西南巴漢南取甌閩東取吳越皆是提逺趣而萍合相容於其山川險易曾不影響又未聞其將軍稱者使其士䘚一有父母妻子之念是寧能死志一方安所為聊且勞給非所為也争鋒則失利坐守則厚費今議者或以為不足於練皆非也而屯集師旅亦非也今必欲不計時而誅之獨有使才人為近境之郡至則籍其郡人父子昆弟五十已下十五已上除習兵務農無得自用者如是不日而兵足用賊可滅矣其餘未可利也如其擒縱之法出於一時者不可先以悉數謹對苐三問問瞻軍國給公上出於物力其賦稅之謂耶煩則擾罷黎省則乏經用縉紳多士之論及此也莫不曰擾農困啇敦本抑末知倚市者為弊梓稼者誡劳必在乎慎擇臨長之官加重耕織之出今牧宰非不選也而富庶未至衆貨非不制也而粟帛猶輕用何方可以致龔黄蒲密之理以惠康吾人用何術可㕥均衣食緡錢之饒以利澤南畆斯上心所注亟以延問觀灮之士期為指明對百姓之貢輸賦患不在重而在於勞逸不均也今自謀叛已來農勞而兵逸其租賦所出之名不一猾吏撓之後期而輸者則鞭體出血若聲仍終不得䝉不忍欺故豪農淂以蠧姧賈倍之而羙地農産盡歸豪姧益其地資其利而賦嵗以薄失其産者吏篤其不奉而賦嵗以重是以割姻愛弃墳井亡之他郡而不頋亡者之賦又均焉故農夫蚕婦蓬從鹿走於天下而道死者多矣由是商益豪而農益敗錢益貴而粟益輕也今返之法必在刺史長吏耳擇其良者使久留於任一年政成者一階之官一嵗一加之三年而政成者嵗加之異政累聞者五年而后遷之連率不如法者削其本不得齒則庶幾乎其化矣謹對西邊患對元和十有二年夏六月亞之西出咸陽行歧隴之間採其風淂西土亡降故老謂余言邊之所以爲患可痛之狀辭未條悉或短曰惟叟以西戎蠕蠕之旅而爲邊出苦言使聞北塞匈奴雜虜之風叟曾不哭也盖天子之憂甚勤與師長分節符給所用以事邊何因對曰不然今言所以爲患者非一因此而邊兵不得習伎險不淂為固百姓不可為生如此吏輕易之然則北虜匈奴雖以逸馬强弓乗嚴時南馳其來衆不過數千其所掠民則貨一人所舉而巳鷙集不能屯兵留塞且北過千里而屬烽望其興塵知奔蹄之幾受降城故事云虜南下其塵髙下則知衆寡視如狀則烽燧次彂然後收民畜嚴壁而待之且每嵗八月戍有清野之火使其馬無所食彼縱至不暇解鞍而旋矣而西戎則不然其衆蟻多包山川沮陸之利其兵材雖一不能當唐人然其策甚逺力戰不患死所守必險所取必地而唐人軍中以為材不能皆易之故自安西以東河蘭伊丼及西􅋽至于㑹寧天水萬三千里凡六鎮十五軍皆為戎有由易而見亡也聞其始下亰城時圍兵厚百里伺其城既窘乃令能通唐言者告曰吾所欲城耳城中人無少長即能東吾亦謹兵無令有傷去者城中争呺曰能圍即東觧其後取他城盡如􅋽城之事由此人人皆固生無堅城意自羅其榮以來為語相傳尚近柰何客獨不聞其說乎歧隴所以可固者以隴山為阻也昔其林北繁故戎不淂為便道今盡於斬伐矣而蹈者無所不達且又虚兵之号與實十五又有非戰闘而役入山林伐麋鹿羆麏麝豪豕是徭者居十之三窮嵒險障剃繁取材斤聲合呌不息於寒暑是徭者居十之四彂畜粟金繒文松大梓竒藥言禽薰臭之具挽轅於陸浮筏於渭咸陽入長安部署相屬是徭者居十之二其餘兵當守烽擊柝晝夜捕候者則皆困於飢寒衣食或經時不賑頋其心怨望幸非常尚能當我耶是皆賴主上聖神彼戎畏其化而不敢東刄今歧隴之土甚饒農食不充秕稗衣結縷無帛布其相税納粟官一而耗倍細吏憑法而要賂賂厚者雖逋亦寛之粟雖後至必亟與符賂薄者或稽一日即白吏笞之粟倍數矣其他征徭倣此農盡所穫不能出其費尚無不忍吏是民由逢息而處又何聊生今所患衆多其略可痛如此長吏終不省尚輕易之客柰何爲不困賢良方正能直言極諫策二道朕聞古先格王之理也玄黙無爲端拱司契陶甿心以居簡凝日用於不宰厚下以立本推誠而建中繇是天人通陰陽和俗躋仁夀物無疵癘噫盛徳之所臻夐乎其莫可及三代令王質文迭救百為滋熾風流􅐛微自漢而降足徴盖寡朕頋昧道祗荷丕構奉若謨訓不敢荒寧任賢惕慮宵衣旰食詎追三五之遐軌庶紹祖宗之鴻緒而心有所未達行有所未孚由中及外闕政斯廣是以人不率化氣或堙底災旱近嵗播殖愆時國廪罕蓄乏九年之儲吏道多端微三載之績京師諸夏之本也將以觀理而豪猾時踰檢太學明教之源也期於變風而生徒多墮業列郡在乎頒條而干禁或未絶又在乎按度而淫巧或未格俗恬風靡積訛成蠧其擇官濟理也聼人以言則枝葉難辨御下以法則耻格不可近何道而和氣堯推之本源著於條對至若夷吾輕重之權孰輔於理嚴尤底㝎之䇿孰叶於是元凱之考課何先叔子之尅平何務維此龜鏡擇乎中庸期在洽聞朕將親覧對曰臣聞古者君天下之心也上降下應還若影響夫以身而養人者下以父尊之雖衰而無怨此神農之俗也以道而覆人者下則欣戴之雖衰莫淂離其下此黄帝堯之俗也以義教人者下以神敬之雖衰而無慢此舜禹之俗也以刑戮而驅人者下以刑戮而畏之不俟㐮而刑戮復矣此桀紂之俗也今陛下廓神睿之宇臨天下將三嵗矣索舉賢良待問之士聚而俯吿悉徴所達以輔于明臣幸得見墀級之嚴陳百王由户之道臣之所奏善户有三神農唐虞之化是敗户有一桀之亂是彼三善之户其門甚闢皆可循轍而進唯在陛下命車而已矣制策曰厥聞古先格王之理也玄黙無為端拱司契陶甿心以居簡凝日用於不宰厚下以立本推誠而建中繇是天人通陰陽和俗躋仁夀物無疵癘噫盛徳之所臻夐乎其莫可及以三代令王質文迭救百為滋熾風流寖微自漢而降足徴寡者問有以古先玄黙無為之化及三代質文迭救之法易難相殊者臣請指䫫而奏之夫數之始生起於其一而歴乎多數在盈十之間雖童子且能屈指而數也及延乎億兆塞乎天地雖明大之人猶難舉籍而造其極天饕者始生魄於嬰而蠢於䝉䝉嬰之時不俟更乳而飫矣及形具氣周設肥牛之肩加百品之佐不足以塞其饜也是則太古之人衆庶之俗其由數之竒寡饕之䝉嬰乎無越無踰蠕然濡之無營無慮愧守俟煦為之君者易其化五帝主之何異以賁育之材舉一毫而趍也三代以降衆庶之情變之俗其由數之億兆饕之周牡也君之者廣法制以御之飾禮義以導之明刑賞以齊然猶不能使下表夸無益也臣聞聖人髙明而道中庸者法常制定使人無加踰扵飾度猶恐其乆而為弊即以日新之言以勸誨使不為常也如其臨理有常制豪猾何致踰檢乎講習師受有常學儒者何致廢堕乎黜陟幽明有常令列郡何致干禁乎車服室屋有常度工者何致媱巧乎易問先迷失道之常也然照育之神不測者以其既弊於夕而能更興扵晨使其光日日新也伏惟陛下觀日新之道以張化源復何有俗恬風靡積訛成蠧之患乎制策曰其擇官濟理也聼人以言則枝葉難辯御下以法則恥格不形其阜財彂號也生之寡而食之衆煎無以臣恐鑠於所制也伏願陛下修日新之徳察善政之臣行尅已之令以拯其弊然後可以垂衣而化也制策曰故詔有司博延群彦佇啟也陛下如能用其道可以澤惠下土也如使理古可近者其在明禮樂仁讓也若使和氣克充者其本在和人心之邪愠在理之雅正也其理怫者衆氣雅其理明者衆以洽夫衆庶之情和平愠抑之氣吁而散之大空還㑹于風雲合于水土包聲于陶㨁之噐每嵗附陰而伏乗陽而昇衆庶之氣雜于陰陽陶于變化者其由麴孽乎愠氣居于中則戾戾則悲悲則水潦敗抑氣居于中則悖悖則亢亢則螟蛾生平氣居于中則序序則得常得常則風雨節寒暑時和氣居于中則泰泰則有餘有餘則交讓於變化􅉼而爲休寳流而爲精神洋衍乎祥光沛濊乎佳澤臣固曰充和氣者在調人心也制策曰若至夷吾輕重之權孰輔扵理嚴尤底定之策孰叶於時元凱之考課何先叔子之尅平何務維龜擇乎中庸期在洽聞朕將親覧者夫廪畜之所賢者在乎賤入而貴出使人無所困飢於凶災傷劳於豊賤也夷吾之權微不可也從古已來西事戎者或辱於盟而困扵嫁非有他由擾其鋒而侮其醜也及為所窘摶則啁物以其兵矣戎夷之生無以異也故聖王備而不擒也嚴尤之言亦可徴也自長慶寳曆已來金紫銀朱之佩盈于朝逸于郡國有紀何者今日布令明日而隳使人無所守是以紀綱不振也且教令所以設備為防也綱紀所以制物樞用也是皆虞患難拯困也人有赤子沉於水火者為之父母必將奔徃而拯之使免於苦及無為救者則必坐悲而泣望也為救之具必在長綆之鈎修竿之抉乎有備而防者父母之人也無具徒手者雖悲不信也今陛下之赤子亦以困於是矣陛下亦將拯而免其苦乎今法制委㢮維綱不樞則是脩竿長綆之鈎抉不為也陛下居于九重臨于兆庶淂無有坐悲泣望之恨乎臣竊為陛下懼不仁之尤於後代也伏願陛下擇忠言以廣其明察智謨以周於用一刑賞以信於令薄賦歛以息其劳慎禁奪以省其犯審獄訟以愛其生如此水火之陷不牽於瞽聵之俗矣多濟之防充列扵無患之朝矣若是又以為不理不康不惠不仁非臣所知也謹附聖條陳寫大略冐黷之罪臣何敢逃謹對賢良方正能直言極諫策皇帝若曰盖開舜禹之有天下也起扵側微積徳累勤多歴年所未經盛聖人慮豈有遺㢤然由好問察言勤求賢士盖以承祧之任重憂人之志深况朕長於深宫涉道日淺奉列聖之鴻緒撫萬㝢之矜人夙夜嚴恭不敢有懈實懼燭理未究省躬未明所以詳求讜言以補不逮子大夫是宜發所藴蓄沃予虗懐當極意正詞勿有所隠昔王者之政必臻於康㤗霸國所立猶致扵富强我國家提封溢於三代酌憲兼于百王無堯湯之災積祖宗之理而人未蕃庶俗尚彫訛家無盖藏公闕儲峙䘚乘之數貨弊之資統而校之莫繼前代豈率土生殖變於古歟將阜時政令戾於今歟固已揣摩必窮利病眀徴末失之漸具陳興盛之謨且文武兼學以成身仕農迭居以豊業故家給足以戀本才周足以應時近古各徇一端不相資用致令從事異心難扵成課去秩無守輕為惰遊指明共貫之方訢合二途之利永言化理期酌厥中施為或差得失斯逺將修睦勸善則在下難知將任數馭情則人心益偽思同指要得合誠明精别比周之情敷詳忠厚之道知人則哲從古攸慎九徴恐泥五事難精或望可服人而才非周物或言皆詣理而行或乖方冝陳取舎之端用彰真偽之辨至於朝廷之闕四方之弊詳延而至可得直書退有後言朕所不取子大夫其勉之對臣伏念目之包明其在昏夕之時則與肓等及屬日䝉光乃能寤玄黄披䫫傑智之才其䖏濁俗之中則為愚者混非遭睈偶時安能樞陰陽育萬物其理一也肓者雖䝉光莫能視愚者雖䝉聖莫能賢其理一也故舜禹翔其光於上益稷之徒周其視於下其中縣白日而省離婁也三代以降君之光㣲臣之智狹見其手而迷其足覩其前而昧其後其由舉燭螢而臨庶目也今陛下神光洞天鍳彼幽塞猶懼理之未至故親省群言而臣瞽愚非能逾智傑應陛下之清問臣以相與貢臣以賢良應詔微臣所謂非任當伏竄弃之尤不足以塞罪乃輒伏進所敢言臣伏讀睿問周視聖㫖見陛下思未災之病也臣愚以為皆由尚書六曹之本壊而致乎然也今請統而條指之睿問有念人俗之凋訛及于卒乘之數貨弊之資臣請以今之户部舉之睿問有才思於文武夲固於士農臣請以禮部工部之壊舉之睿問有欲以辨行之真偽臣請以吏部之濫舉之睿問有以朝廷之闕臣請㕥刑部之失舉之睿問有四方之弊臣請以山東隴右之意奏之伏願陛下詳臣之言察臣之志無以臣微而忽其奏也臣聞周設六官以統百辟立國八百年其由綱之不絶於所制故也太宗龍興革魏晉之殘政修法度立中庸設尚書六曹以序班文武以條系天下號令既布而萬方區矣愛其人若愛已之徳保其黎庶若保㓜子恐其有墜也故明四目以先其視指教其未見也達四聦以先其聼開喻其未聞也尊賢之言而為視聽視聼先張則黎庶不陷於災害而康泰矣後代雖有盜臣姦夫而終不患其亡由綱之不絶於所制也夫尚書六曹之設猶人之有六腑也耳目口鼻之樞系于首手足之用闗于肘膝其血賑其緒皆統於六腑符而命之然後能動用者非邪則眩夫人莫尊其道故足司其履指司其所執百體之司各勤其用則首安其尊而不勞首之䖏身猶君之居上也百辟以位則君安其尊而不勞明矣今尚書六曹外雖備其官而中實繆今人俗彫訛者其由户部之綱不理昔户部其在開元最為治平當時西有凉六府之饒東有両河之賦仰給之卒不過四五師其餘利殖所入盡與齊人四十年間富庶滂洋之若是及一日上恃昇平之功相肆威驕之佷直言得死䛕色或進轉掌之間清蹕巡于巴蜀矣今西􅋽為虜両河為兵盡開元天下之兵不過當今數郡之䘚勝衣之農而百傜出矣鞭役重䌓不勝於籍榷之不頋其害刑之不問其深吞危衆多欲無彫訛不得也兵部之選武士益繆矣武夫試射百矢為重騎射次之騎戈亦次之此武夫賦者之冝業也而真者百無一焉其餘盡買豪姧之軰役者以待冐入奮戈戲馬者亦得中名則估肆富人之子弟彼安能致武之所用頋欲占籍自恃以逭傜於鄉閭耳而欲䘚乘貨弊之充强臣未見也今両河之間至于幽薊連屬西邊北邊而仰給䘚多於其土之齊人十九在兵部操曾不能制一校尉而况細其綱乎古者兵農之一體也三時務農一時習兵故春畊而夏植秋藏而冬講武成願使兵部之綱維根於古道之要兵部之令加於將帥之臣則本久益大矣何䘚貨不充於古㢤今禮部之淂進士最為清選而以綺言聲律之賦詩擇之及中為仕也則責之不通天下之大經無王公之重噐今取之至㣲而望之甚大其由擊陋缶而望曲於韶護也今仕進之風益壊矣必以陰詐為朴慱明為狂頋以武為汙矣而况兼學矣陛下以殷周之誠而求之何患周才之不至矣今工部之綱不舉之由百工之不條理言且務於椩濫則能速壊惑扵邪巧則多改作速壊相仍改作無巳欲使財費之不窮土力之不竭臣未見也夫堯之功與天比覆居于土階之上䕃扵茅茨之下土簋而具禹親勤水而卑宫室是二君者非不能極巧侈之端故處陋而無猒蓋欲天下之人自然而儉易從也而周官百工之職一於六職之書詳矣其後昏君亂王未有不極遊觀之娛窮巧侈之樂恣羅紈之靡雖有生植之衆不足充虞人之裁雖盡隴畆之農不足塞百工之役雖竭蝅婦之勞不足給竒綵之貢秦隋之末君不如此不足以隳宗社今仕家著籍於鄉閭亦已矣則農夫唯恐他業之不容於趍也安肯頋隴畝而戀其本哉伏願陛下仰堯之聖敬畏秦隋之敗奢念漢文之節儉凡在百工之用闗於將作内作技同者必使統於工部以觀制作之度使勞費之怨不起於千人則堯聖禹明周規漢儉為陛下擇耳何止仕農之固業哉今吏部之𥙷吏嵗調官于千餘其試以偶文儷語之書程以二百字為准考之能否以定取捨直使其人真能然尚何以補况十九皆偽人乎以是而求其實不可得也且昆吾之利莫耶之才雖巧用不能雕咫尺之木鷙鳥之羅雖善掩者不能拘蚊蚋如使恢宏博大之士裁心鏤舌比辭而道安可見乎陛下何不命群官立於朝者嵗各貢所知各以其所長試之各以其噐任之不勝於任者罪罔上闕其貢者罪蔽賢而洽聞者爵逾次禮部吏部以時舉籍刑部督其不察如此則人人争好賢人人克巳何患乎真偽不可辯㢤今朝廷之闕衆多其㝡急者刑部刑部之綱不舉其由賞罰之不信勅令迭降而相違故有行之於今日而廢之於明日罪之於此而赦之於彼是謂慢易詐欺之藪耳欲無枉撓不可得也誠願斥其煩再去其相逾則人人易守難犯然後命儒賢究掌之不明於此者不得為刑部之源官無令猾賤之徒輕身重貨竊法以自弄如此則清矣賞信刑果則逺罪修已之風序今止於闕盖將病且痼矣夫病者其在支膚則易也六腑尸繆氣非所經而其體固不亦危乎臣聞良醫之理痼也陳以竒方進以猛餌外導其血絡藥病相攻戰于其中及痼解病瘳六腑亦憊於是竭良藥以才調徳膳以味從而𥙷之然後六腑平百體正内强而外和矣夫近代之愚醫則不然必使病勝而形羸不危其身者稀矣三公六曹國之六腑也果刑信賞國之筯維也九州百郡國之百體也四夷八蠻國之外膚也驕荒淫異國之痼病也嘉謨長筭國之竒方也强將勁兵國之針火也禮樂法度國之徳膳良藥也夫百骸其於外六府列於内相假而成生相致而動息本為一身也及一腑失理容而不攻其乆日大攻而不除其乆為痼除而不補其乆復發為瘵難矣臣以為天寳胎痼始於一支乆而容之浸及百體幾危其形玄宗肅宗除而不終痼友興元徳宗之時又無大臣可進内强之術而攻不就先皇攻扵除而不攻扵𥙷今乃復遜於幽兾居國之左足又有西戎之屬居于右掌之膚涉腕逾肘今已及肩何以知其白掌而及肩也以安西至于涇隴一萬三千里其門嚴闕重阻皆為戎有由此知其及肩也則王畿界戎無五百里此肩之去喉能逺乎奈何容而不除也此皆發于中朝之闕而流其病也若四方之敝莫若山東隴右之急莫若武備之不至又請詳舉之夫聖人之母萬物必體天地之功故以陽為文教極其光明也以陰為武備盡其肅厲也夫陽盈則韜而陰藩之陰盈則復而陽濟之故能相理而不亂五月陽盈使一陰居其間明正陰之有位而盜陰不生故聖人因之武備至于十一月陰盈包將來之陽可大可乆也故外作雪霜以勵之恐僣陽之通也内蜜燠而飬之使其為文為光也故聖人因之求賢以為輔雹凍霜雪禁其煩蕪陰用也故聖人因之以正刑雷風為前驅蕩其所不通温光從而舒之陽徳也故聖人因之以文宥是以聖人之傳文而武備不去前年淮夷擒齊魯㓕常山死幽燕翫臣未見制法有方法也而議者且以為兵可咠也遂用羸將守常山滯儒臨薊北不旋而賊氣復作矣伏願陛下慎動誡盈無傷陰之大候且行化在使人舉兵在立勢夫百斛之車百蹄之牛不能揺其糓如措之峻坂之上援之力者不盡數牛及轟然而遷則牛足之運不給輪奔矣此立勢之樞也今幽兾之兵其由病者之再病矣乘虗而强履獨有立勢而誅之立勢之急在於衆威於深棣實力於滄定然後以趙魏臨常山環兵而攻之則兾馬之蹤不望合於燕蹄矣以大原之師入薊丘則易水之東左臂不能傍連矣此拘㷼囚兾之方也如其擒縱之法出於一時者則名將而用耳如其威不聚於急力不實於危雖有明將不能為也陛下見西制戎北制虜壁壘之勢盤連交錯兵甲之多賞勞之厚以為戎虜知畏此而不敢犯塞今以刑賞之不信也而戎臣以自入士䘚虚名占籍者十五不啻日夜飛金壁走銀繒市言唯恐田園陂地之不廣也簪珥羽鈿之不侈也洞房綺闥之不邃也不如此不足以積怨勞䘚及冦來則必固壁閉兵無敢出擊者如一日戎戈東刃陛下將安倚乎今北虜猾夏猶巳事嫁矣而西戎之虗盟安足信之不可無虞也夫人性有勇怯地形有險易勇怯可以習制制之以刑則亡怯樂之以利則亡怯借之以勢則亡怯假如陟險利强弩以遲重者㩀之平陸利騎戈以揵手健蹄者兼之此得勢而亡三怯也今士䘚之獲戎者得其馬牛羊雜畜及衣裝寳賂皆與之無令有奮奪此頋利而亡怯䝉兵失貲者誅此畏刑而亡怯也如此而用勇倍百矣臣嘗仕於邊又嘗與戎降人言自輪海巳東神鳥燉煌張掖酒泉東至于金城㑹寧東南至于上邽清水凡五十郡六鎮十五軍皆唐人子孫生為戎奴婢田牧種作或叢居城落之間或散䖏野澤之中及霜露既降以為嵗時必東望啼噓其感故國之思如此陛下能不念之臣意西戎今冬當逾河拒北虜明年必大入靈武冠西城先擊塩宥城能因此時詔寧隴邠涇及南梁皆㑹涇計事獨得以老弱留謹城其他少壯及騎士皆持裝佩塩糗令邠寧涇原軍皆出乎􅋽道彈筝邠寧軍北固崆峒守簫閞涇原軍西遮木硤闗鳳翔軍逾隴出上邽因臨洮取鳳林南闗南梁軍道鳳逾黄芲因狄道㑹隴西得其利則擊因其牛羊足以供具名以輕騎入河蘭撫喻其遺人飛聲流勢延而益西則故地盡可得也如此則王畿之内安有驚烽之虞㢤臣因曰四方之敝莫若山東隴右今策臣之目曰直言極諫則言無所不冝冝不懼於罪也若諫無不極者今百不盡臣之一二焉何者荅問之所及或未利於國臣雖欲漏之而不解則必欲言之臣不寤也睿問之所不及者當臣之言實有利於國臣雖欲奏之臣懼罪言於非冝也而况短晷之晨奔光馳矅之下筆之奏拘以文陳乎臣所以憤懑之誠百不及於一二也豈無異日而頋問故伏惟陛下察焉謹對沈下賢集卷苐十
