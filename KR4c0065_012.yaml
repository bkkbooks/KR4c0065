front:
  text: 沈下賢文集卷苐十二
  hash: sha256:7ff9926b0078169d36e73b1f7f4c713e23e09176fd827dba7e31b6871f72fc18
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0065_SBCK_012-1a}
body:
  text: 行狀祭文為宿賓撰行狀為韓尹祭韓令公文祭李少丑文祭胡同年文祭故室姚氏文為人祭媵者文劉巖夫哀文祈雨文郢州修明真齋為漢中宿賓撰其故府君行狀唐故銀青光祿大夫檢校户部尚書左金吾大將軍兼御史大夫上柱國河南縣開國公食邑二千户賜紫金魚袋贈太子少保柳公行狀曽祖該皇任陵州録事參軍贈陵州刺史祖岑皇贈祕書監父潭皇太僕卿駙馬都尉贈司空狀公諱晟其先河東人肅宗時詔取儒賢配主其父以門葉中選拜太㒒卿尚和政公主主及大僕繼喪而公年始十二孝聞宫􅊚既去喪代宗憐之召養宫中令與皇子諸王俱受學故公得通籍中禁詔以吳大瓘為之師又以大瓘子通玄通微玄為助教令十日考學績勸所進乾元初除尚舍奉御淂歸故又詔吳大瓘通微通玄令就舍授學廣德中加檢挍太常卿賜佩金魚及德宗即位以公故奉銅輦將欲加賜遷官未幾而屬車駕西狩公徒走會難奉天因泣奏曰臣願淂尺詔持而東入都購其豪人以為效德宗竒其忠賜詔如奏公於是傭裝入賊軍中見賊偽右將軍郭常左將軍張公晟公説曰隂潦之災鱉遊其墀壇即楊先赫明是輩不知枯桂之地者公等寧能從其挂哉乃出詔示常等皆捧詔伏與誓約所歸未及期會樞籍宦臣朱既昌隂以公之狀飛告泚遂與捕繫定死矣泚二將詞不伏即徙於外獄稍寬之有頃賊兵纍敗守吏益怠公因其共繫者十餘人謀相與脫其錮髠而走之奉天德宗為之撫背流涕明日宸輿幸漢中公奉轡至南梁還拜王府長史貞元六年改嘉王府長史嵗餘翰林舍人吳通玄謪死公為疏陳雪再進不得命公之季止公曰上方怒寧可為也公不聼公章卒三貢於是德宗寤之謂公見義不回賜書寵勞竟雪通玄改澧州别駕十一年入為少將作永貞初遷大將作加朝請大夫起崇陵㓛以檢校左常侍居使內作封河東縣開國子食邑五百户加銀青光祿大夫起豐陵功賜上柱國元和初西蜀叛發歧隴邠涇朔方太原及山東六郡之卒皆屬長武軍詔以髙崇文討之既誅三蜀大困而漢中最險狹益不能賑輸所奉中朝以器用當濟遂拜工部尚書兼御史大夫持節帥漢中始詔諸征蜀卒各還故部而獨以漢中卒三千人移戍梓州其卒以為始去父母鄉里既勞而歸及境乃不得見其閭亦以為自賴今則徙之謂若謫耳皆鋒奮食所引刃援弓迫中貴人時公行未及郡聞之遂疾驅倍走往其所先勞之若辛勞已乃問曰君等何以而成功乎俱曰某等伐闢耳又問闢何以而淂伐俱曰不受指於天子公曰君等既知闢以不受指而得伐又親滅之而得功反不受指耶今即不受指即受滅矣于是卒皆免胄匍匐遂從所徙嵗餘入為大將作使胸奴先之戎相出視國使必自據偃以相辱傲公知之乃先謂曰聞若等皆以去信強亡禮自大禮信不為誠不仁也何足奉吾國乎於是單于諸王貴人聞之愕然失待皆莫能詞先則改容跪伏遂致天子之命約信成禮而歸拜金吾右將軍始得公居爵益封千五百户加為大金吾九年加户部尚書以大金吾為左將軍元和十三年三月九日殁享年六十九上聞之一日廢聼奏詔命從官臨之賜賵未帛贈太子少保公強辨多學謙下好問因危而致其節見義不顧其私輸公之急某從寮其門備得前行謹以所聞所見實録於斯謹狀貞元十四年七月十七日狀為韓尹祭韓令公文澤梁宋之戎郊􅉼雄渾於雲水陶沉毅與濃剛作晄晄之巨士綿將流於洪光鼓神禱之在已昔丞相之東征統梁城之千雉􅒛賓余以掌檄縱牧馬之遺美見公佩之橫腰冠衙旗於宋壘及夷門之節臥余奉歸于故里寧後者之無當顧狂埃以渤起司馬啖而賓徒烹血肉肆而為市何繼師之無作始公之㓛由是伏豺豹於神猊遂清寧乎千里聞君書於天閽帝嘉悅而忘恥嘗敘族以姪余謂同源於康子言康樂於一方竟綿歷乎再紀廪蓄粟以億計積有餘而流委攊甲馬之萬銜惟君王之所指擈準僮與齊萬當烹氷以燎葦視燕趙之強侯若負垤之群蟻彼承風其如何聞當飯之遺匙及柱天而轍日信慱壯之可倚逢諒暗之初晨遂踐阼而為治推轂兮升壇河橋兮鄜畤恩光被以湛稠仍分嗣以及嗣遵往年之來覲見差班於父子復何殃之不造遽相追而沒齒榮華之不遒兮倐云乎已矣悼皇情以注想每凝旒而無扆錫祕物之必周余得命為臨視還壤厦而將駕導清笳而哀徴鑒卑志之潔恭願降歆而省此嗚呼哀哉尚饗祭河南府李少尹文維長慶四年五月十七日福建等州都團練副使沈亞之謹遣郡吏李權奉酒肴之奠敬祖于故河南少尹李公之尊靈夫哲之達塞兮繫其時之艱通故孔子危而周公龍管遇齊而卒業賈遭漢而不終嗚呼哀哉古昔何思所思唯時謨不我進綱不我維民不得濟道不得施雖富且貴何大用為夫子之道殁矣今將遺誰卷清明之特達歸壤厦而藏之哀哉尚饗祭胡同年文維長慶元年十一月二十六日同年韓復張正謨龐嚴沈亞之饌庶羞清酌之奠祭於故安㝎胡君之靈惟溫毅之尤顔兮含朴謙而苞野工時言之便平聲詩兮鬪風識於逺雅同遭恩於昔年蒙擢身於長者念嘉歡之平生君何先而捐捨痛雕華之誰疾兮聞號號之稚寡省余奠之不遒兮促將征於前馬何決邁而無顧兮豈樂居乎壤厦既啓全而無尤君子美其終也哀哉尚饗祭故室姚氏文噫佳惠之淑敏承嚴明以信修既笄佩之有儀俟嘉人以為仇豈位者以無當顧采贄以納豫惟鄙夫之蓬塵牽阻離以為尤始仕筆而關塞俄自夏而涉秋誰來歸之須臾遂省拜於東陬潔幼弱之室處奉板輿於修途值凝氷之泝川乃築居以捨舟念􅊚嫁之以時負重鈞於薄軀可困蹇之多淹汩嵗序之忽周誤聞恙吾中閨言迅轡於皇都及鄭洛之外郊承凶言於來書悼追悲之莫及聲失慟以咽呼目虗疑而直想容髮佛之在眸舉椒桂之觴感百年之永乖纜繐帷之撫臆非倣徨於故居惟靈魂之昭昭省余心之勞劬為人祭媵者文六年春作念昔媵者容華不常喜顔如春酣葩之芳霩乎將然曄乎為光偏然去步如煙洋洋萃然來𥚑如鸞下翔佳言如酒和人中腸情如蠶絲繚不可央惟我所當遂栖余床為余馨香自始于今六謝冰霜才云就木言歸壠首道既已隔淹不可久嗚呼哀哉尚饗劉巖夫哀文秀才劉巖夫父沒不勝喪余弔而作詞以哀之其詞曰號呼窒悶喑嗚兮一溢不入百體痛兮體泉竭日髮根枯兮脆黃推亂如霜蕪兮形若龍骸骨膚兮悲占六腑神無居兮魂魄惝惝客四隅兮去衣風雲將君疏兮待待地之赴幽都兮生成果克李意舒兮厚􅊚薄養世有諸兮俗􅪶且廣無誰誅兮清魂佳字赫來圖兮鼎設海陸備肴𦵔兮吳梅狄酪浹濃腴兮逢果錯實態味殊兮酣若頰視若珠兮香津桂蟻沉浮兮緑盂既彂有樽盂兮醪醴百味君安須兮惟君之嘗恣所如兮三爵與洗祝延呼兮為君澆奠一饗余兮祈雨文詞漢武帝維長慶三年正月己巳櫟陽尉沈亞之承命於大京兆以嵗旱用乾肉清醪恭祀于漢武皇帝神之祠下因巫人以達其祝語嗚吁隂陽水旱其司唯神五行六氣神得而均如愆且災神何為仁惟神昔帝漢日何祥不臻燕雍滂洋甘露騏驎人荷其澤亦仰如春氣配髙明殁而為神居滿必誅居抑必申今者獻陽始嵗亢而為屯草木蔽萌塞脈沉津不蒸不泄逾于十旬雨師慢傲尸違不賔潛深驕髙祐此下人風伯囂戲簸陶濃塵潰為凝霾坌若頺雲鴻突渤上蒙無垠掩蔽光明以垢春晨彼風伯雨師皆神所司處位不職荒役不祗神假之權使之為用上帝如恕其殃孰罹神明胡不督其稽察其欺壞法者戮笞然後泰陽蒸雲雨膏以時發生有涯農力有施今官庶併誠虔虔于祠集于宫室鼓舞彈吹神其聼之無敢苟祈郢州修明真齋詞大唐大和五年嵗次辛亥十月十五日己邜眀真大齋主朝請大夫守郢州刺史李祥與謫臣郡客將吏等仰首稽首再啓詞於虗無自然元始天尊無極大道太上老君郡靈衆仙咸俟畢降蕩蕩乎混元始精半漓涵奧薰蒸為氣形生於聲衆動既品隨而有名清濃薄厚四氣之營乃歧乃陌拆其混并衆動夀量道居清濃覆人為大啓悟為明拒惡為塹護善為扄居惡如何恥燕面點居善如何陽然懷聲道之所宰尊無與亰伏惟皇上保聖億為夀程天齊尊髙如天無傾某官幸職居專城雖喜從樂善之發怒因嫉惡而嬰每覺逾息失以度刻不寧是用澆氣於恬奪性於情害意之和傷和於平而神誤序胃血差經伏願大道神尊垂尊澤祐雕堅老榮遐衆之齡使淄垢磨濁迷醉醒伏願金借其堅玉助其貞今某等之志戴道之大德荷道之生成某等之狀蓼孽為甘山嶽為輕伏願災從日銷福與時迎某等之弘恭洗思滌慮以奉以行謹辭沈下賢文集卷苐十二
