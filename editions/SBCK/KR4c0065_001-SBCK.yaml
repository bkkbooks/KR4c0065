front:
  text: 沈下賢文集卷苐一
  hash: sha256:dabbb8459cb816669bdbb7978925ec2025578cfcfa101c47e9ab7f3d06ada37f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0065_SBCK_001-1a}
body:
  text: 賦夢遊仙賦柘枝舞賦右山水障賦詩虎丘山真娘墓春詞贈酬元㣲之題候仙亭荅殷尭藩贈罷涇源記室望前舡寄侯􅀰别龎子肅春色滿皇州􅀫白馬津寄㓂立見張秀才送文潁上人遊天台寄王直方題海榴􅀣呈八叔大夫送龐子肅西蕃請謁廟觀百官獻壽山出雲曲江亭望杏芲􅀤夢遊仙賦余昔夜夢寓遊一方樂態甚適􅁴而作賦題之夢仙其詞曰杳漠漠兮昇絶垠雲轡九天兮越崇門星􅎼暁以淡白瀾咽潾於錦礫石榴笑而織娥喜閽導余而就將止襲烈蕙之芳風送麗音於遼耳目恣邁而多適吾超超其樂此銀墉兮桂廂差瑶踏兮上玉堂卷紅幕兮􅀤繡户中有人兮結清䖏語嫣延兮情綽撦命余􅄻於蘭之厦廻穠顔㕥一頋曫嬌眸而融冶􅃄津兮玉盤火桂兮炮鸞鼎娥司味和苦酸羸吹既調戞湘絃合吾飲食兮樂吾後園乃稱詩曰白日低兮春塘滿紅華芳兮草芽短菱結􅅁兮荇含􅁝設遨遊兮遵佳期又詩曰穠光酔兮昏緜緜焉與乆樂萬年春留連兮其未央吐芳意於荃言忽􅀤寤以無覩䰟迷念兮情既諒人生之皆夢孰云夕非而晝是馳詠想之悠悠兮軸吾情於萬里柘枝舞賦徃者某值宴於鄭衞之侯㘴與客序樂作堂下行舞男女紛雜交貫率㕥百品而觀者蓋􅝇然既罷昇皷堂上絃吹大奏􅒛為柘枝舞則皆排目矢座客曰今自有􅁟之樂舞堂上者唯胡部與焉而柘枝益肆于態誠􅁕以賦其容也因頋余緒之以洗客念賦曰昔神祖之克戎賔雜舞以混㑹柘枝信其多妍兮命佳人㕥􅁇態㙳􅂭冠之繁珂兮披文纓於太帶跪閃舉以揮獝兮拖旋􅁭之䄡曵騖遊思之情香兮注光波於穠睇頋巧度之無窮兮将多變而若雲􅀭厲唱於鼉皷兮儼蘭露之芳津汨傍俯以裊影兮蕩風渠扵横茵愕兮若驚㢮兮若􅈸欻然逴姹翔然嫣偃婉振脩䄂㕥抛拂兮韜纎肱㕥糅綰差重錦之華衣俟終歌而薄􅃝既而抑􅀝昂枅蹈節振臂驅揵蹀以捉碎盡戎儀於弱媚見孫律於武姓入西河之劔氣曲響未遒邊風襲吹門代馬之清嘶􅀤言禽於詠䫫客曰若此之狀也以鄭衞而前陳吾固知其将墜古山水障和史舘陳學士作挹清臣之嘉思兮信踈子㕥峭􅀌廻􅀘籍之睱筆兮賦他山於遺圖擲琨瑶於呐口兮若含氷以咀蘭惟古工之包化兮啟群峯於無間􅀔蹙巘以特起牙騰排而上干翆參差㕥玉立俱竦竦以攅攅於是澒以長瀾森以怪木瑟汨慄飀凄煩蕩燠浸平繚於椘澤冶妖韶於陽谷􅊠霾横暝兮陳半腹夢雨神雲兮澹而不歸怨撦惹乎巖曲縹癬青籬兮事幽澁細澗緜流兮洄噴噎山之人兮夕忘􅄰而坐忘興帷紺枝兮􅅁黄􅁑暖草􅀍崖兮垂緑髮翺鸞翔翆相追征兮振錦舒繡錯以明兮啼羇酸雌裂眥吻兮風呺穴怒寥而辭兮山中之木何凋榮兮虎丘山真娘墓金􅁫淪劔壑兹地似芲臺油壁何人值值一作遇錢塘度曲哀翆餘長染桞香重欲薫梅但道行雲去應隨魂夢来春詞酬元微之黄鸎啼時春日髙紅芳􅀤盡井邊􅊝羙人手暖裁衣易片片輕芲落剪刀題􅀱仙亭新剏仙亭覆石壇雕梁峻宇入雲端嶺北嘯猿髙枕聽湖南山色卷􅄕㸔荅殷尭潘贈罷涇原記室勞君輟雅話聽說事壃塲提筆從征虜飛書始伏羗河流辭馬嶺節卧聽龍驤孤􅀒平生劔空怜射斗灮五月六日􅀤石頭城歩望前舡示舎弟兼寄侯􅀰客子去淮陽逶迤别夢長水􅀜開夜鏁霧棹起雲􅋽煙月期同賞風波忽異行􅀮山曽撼櫓轉瀬指遥墻蒲􅹋翦刀緑筠筒楚棕香因書報司逺為我憶檀􅀰别龎子肅自為應仙才丹砂錬㡬廽山秋夢桂􅀣月暁憶瑶臺雨雪依巖避煙雲逐歩開今朝龍仗去早晩鶴書來春色滿皇州何䖏春輝好偏冝在雍州芲明夾城道栁暗曲江頭風軟遊􅁝重光融瑞氣浮闘雞憐短草乳鷰傍髙樓繡轂盈香陌新泉溢御溝􅅆看日欲暮還􅀐似川流􅀫白馬津􅀉㓂立客思聽蛩嗟秋懐似亂砂劔頭懸日影蝇鼻落燈芲天外歸鴻㫁漳南别路賖聞君同旅舎㡬得夢還家汴州舡行賦岸傍􅀁見古木暁蒼蒼秌林拂岸香露珠䖝網細金縷兎􅁝長秋浪時廽沬驚鱗乍觸航蓬煙拈緑線􅁄實綴紅囊􅅍穗揺鼯尾出根掛鳯膓􅂓持一濯􅁕誰道比滄浪送文潁上人遊天台露芲浮翆瓦鮮思起芳叢此際㫁客夢况復别志公既歴天台去言過赤城東莫說人間事﨑嶇塵土中􅀫後自華陽行次昭應寄王直方重歸能㡬日物意早如春暖色鮮驪岫寒聲别鴈群川光如􅃧劔㠶態似翔雲為報東園蝶南枝日巳曛題海榴􅀣呈八叔大夫曽在蓬壼伴衆仙文章枝葉五雲間㡬時奉宴瑶臺下何日移榮玉砌前染日裁霞假雨露凌寒送暖占風煙應􅀏強言河畔柳逢波随浪遂張騫送龎子肅三年遊䆠也迷津馬困長安九陌塵都作無成不歸去古來妻嫂􅀏􅂫秦西蕃請謁廟肅肅層城裏巍巍祖廟清聖㤙覃布濩異域獻精誠冠蓋分行列戎夷辨姓名禮終齊百拜心㓗表忠貞瑞氣千重色簫韶九奏聲仗移迎日轉旌動逐風􅁿休運威儀正年推爼豆盈不才慙聖澤空此望華纓勸政樓下百官獻夀御氣黄芲節臨軒􅂵陌頭早陽生彩仗霽色入仙樓献夀皆鴛鷺瞻天在冕旒菊罇開九日鳯曆啟千秌樂闋祥煙起柸酣瑞影収年年歌舞夕此地慶皇休山出雲片雲朝出岫􅀌色逈難親蓋小辭山早根輕觸石新飄􅀭經緑野明麗照青春拂􅀣疑舒葉臨江似結鱗從龍方有感捧日豈無因㸔􅂇為霖去恩沾雨露均曲江亭望慈恩杏芲􅀤曲臺晴好望近接梵王家十畞開金地千株􅀤杏芲􅅁雲由誤雪映日欲欺霞􅂵陌傳香逺紅泉落影斜園中春尚早亭上路非賖芳景偏堪賞其如積􅀊華沈下賢文集卷苐一
