  text: 沈下賢文集卷苐二
  hash: sha256:b7020239471623985fb6c1e677c92123fab2524103280dbe0038e6f5606dc311
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0065_SBCK_002-1a}
body:
  text: 雜著湘中怨􅄙文祝延為人撰乞巧文祝樠木神文雜記湘中怨􅄙湘中怨者事本恠媚為學者未甞有􅄒然而􅁋溺之人徃徃不寤今欲概其論以著誠而已從生韋敖善譔樂府故牽而廣之以應其詠垂拱年中駕上陽宫太學進士鄭生晨􅀤銅駞里乗暁月渡洛橋聞橋下有􅂘甚哀生下馬循聲索之見其艶女翳然蒙䄂曰我􅀌養於兄嫂惡常苦我今欲赴水故留哀湏臾生曰能遂我歸之乎應曰婢御無悔遂與居号曰汜人能誦椘人九歌招䰟九辯之書亦常擬其調賦為怨句其詞麗絶世莫有屬者因譔光風詞曰􅂭佳秀兮昭盛時播薰緑兮淑華歸頋室荑與䖏蕚兮潜重房以餙姿見稚態之韶羞兮䝉長靄㕥為幃酔融光兮􅄅瀰迷千里兮􅉼洇湄晨陶陶兮暮熈熈舞婑娜之穠條兮騁盈盈以披遲酡遊顔兮倡蔓卉縠流舊電兮石髮髓旎生居貧汜人甞􅄙篋出輕繒一端與賣胡人酬之千金居􅁆􅀊生遊長安是夕謂生曰我湘中蛟宫之娣也謫而從君今􅀊滿無以乆留君􅀁欲為訣耳即相持啼泣生留之不能竟去後十餘年生之兄為岳州剌史㑹上已日與家徒登岳陽樓望鄂渚張宴樂酣生愁吟曰情無垠兮蕩洋洋懐佳期兮屬三湘聲未終有􅀞艫浮漾而来中為綵楼髙百餘尺其上施緯帳欄籠􅀞飾帷褰有彈弦皷吹者皆神仙娥眉被服烟霓裙䄂皆廣長其中一人起舞含嚬凄怨形䫫汜人舞之歌曰泝青山兮江之隅拖湘波兮􅙂緑􅅂荷拳拳兮未舒匪同歸兮將焉如舞畢歛䄂翔然凝望樓中縱觀方怡湏􅁷風濤崩怒遂迷所徃元和十三年余聞之於朋中因悉􅀘其詞題之曰湘中怨蓋欲使南昭嗣烟中之志為偶倡也文祝延有引文祝延之指其本禱祠閩人􅁔其質也閩侯居政民䕃而安他日侯恙在體巷野之祈祠于神者皆以請侯益憂焉後淂問而詞乃舒其俗以為言俚不足自道􅂉謂軍副者能變風從律善闡物志因􅂄耋為請於是與文以通其意且㕥古之淂人者皆祝延之今復用言命為篇目其詞二闋山之杭杭兮水堋吞荒抱大兮香疊層騰氣清渾兮朝昏神生其中兮宅幽凝居如山惠如水䖏端卓兮赴下而忘鄙集人之祈兮從人之􅀁市攀清明兮叩髣髴我民清兮期吉日願􅃪誠兮陳􅀁當侯我兮㤙如光照導兮天覆惠流吾兮樂且康恭聞侯兮飲食失常民縈􅁨兮心苦瘡飲之飢兮侯由有糓神有澤兮冝䕃沃脫侯之恙兮歸侯之多福群卑勤之恭潔兮鍳貞盟乎山竹右一闋為祈兕載吹兮音咿咿銅鐃呶兮呼眡睢樟之蓋兮麓下雲垂幄兮為帷合吾民兮􅀅安維吾侯之康兮楽欣肴盤列兮荅神神擺漁篁兮䧏拂窣右持妓兮左夫人態脩邃兮佻眇調丹含瓊兮瑳上聲佳􅀏馨炮羶燔兮溢按豆爵盎無虗兮菓摭雜佑秋雲清酔兮流融光巫􅅂旋兮覡䄂翔瞪虚凝兮覧廻楊語神歡兮酒去夾望吾侯兮遵賞事朝馬駕兮搦寳轡千弭亟絃兮森道􅀐吾何樂兮神軒維侯之康兮居遊自遂右一闋為酬為人撰乞巧文和史舘陳學士作邯鄲人妓婦李容子七夕祀織女作穿針􅃧取苕篁芙蓉雜致席上㕥望巧􅀁降其夫以為沈下賢工文又能剏窈窕之思善感物態因請撰為情語以導􅀁欲謌曰惟雲渚之晨秋兮天矌碧㕥凝暮懸韶挂於姹月泫明淚之清露即何房之將期儼龍輪㕥􅈬馭恭聞司巧之多方脩馨香以奉具􅀼獨溺於自􅀻希靈娥之􅀁付㻁碧凝其異質兮韻虹隆於霾霽假文羽於孔雀兮而使擅夫佳麗戴雲蟬之重􅈁兮塗蠻金於綺篲細綃縷於藕腹兮差蓮跗以㨾齒命纎􅆶㕥䖝􅁝兮裊簷機之夕綴是物之巧善餙願賜妾於針紐也葩蕚欝於濃妍包多冝以善喜引纎吹於輕颷若將翔而復􅀝醉光春之流㬌播情香於萬里霓煙出乎無間縹窈緲以斐亹若披若曵兮撦平林兮横暁水襲霽旦之繁芳兮因隠映而増綺澹冉冉其夥容世無容以偕此是物之巧容善態願委妾於態媚也短蒲狹涘兮曲溜溢鵁鶄宛兮引乳娣􅃧音清諧兮蕩演曵牽游􅅂之低凝兮蔓春心於淇枯寒勁餘兮憶弃葉擺風呌夜兮留燥雪流韻凄澁兮泱􅑜􅍋吟夢語之漣漣感霜鍾之流越是物之巧音善感願付妾於管絃也祝樠木神文并序謪􅁺秋病偃于漢之陽怳而夢􅀑其形甚穢長股短􅅐薄頂無凥秃眉鑏吻􅄝痔而饕誦視睒􅠓嚵氣􅧍臊指人生寒粟肌揵毛及窹怪歎以告筆吏扄曰斯癘􅄦也亞之曰癘􅀑何端而侵我乎扄曰癘之為情惡儻儻而狎睢同丘為仇同惡扶依依邪傳影倒歩側趍託舌附語以調􅁋巫今掾之為人體曠情虚楽態惡汙惡内曠外踈翺翔自儀舉止無虞不機不扄為􅀁啁也無乃異乎亞之曰何以去斯患也吏曰扄聞之樠木之神其司郢􅁟之隂可以酧而訴也願召巫用酒肴㕥􅀉詞為祝使其有媿必榜且戮􅁺無欝也扵是乃與譔為祝言一闋㕥道􅀁惡其詞曰傾江漢之長瀾兮淘晨雲於􅀫靄惟附巘之横峯兮寫甘灣之清泚聞樠木之留古神兮宅同􅅢之荒郖茹清明之靈英含端光而為體與午節及皎峭兮惡情明之闇靄粤客子之何羈兮啁吾血於癘􅀑癘􅀑之狀草剏樸梀蹴折兮蜍背棚横兮蠆腹板聱反語虬兮薄頂而虵顙颭掞兮赤臉而䑕目伺差池於隟情兮投怪言㕥禍福拒良藥於煩痰兮謗嘉肴而謂之毒衣去戻氣以為介兮避神丹之利鏃彼恠魅之杇險兮非神君兮孰􅀎以族洗苦身而為詞兮望皇靈於樠木雜記沂水北一百里有峴曰將軍甚靈民置祠于路左享之不已􅀅軍曽為五郡牧常姓名玄通因築城失主􅀅意而斬之其屍數日不仆今有臺曰立屍臺西南有山為鞍山山北有閞謂之穆􅁜李師古不臣作鎮于此防遇不意元和初罷之西有沂山山有廟則東安公也沂州刺史每春自禱㤙是山山有谷九十九􅀁河分八曰沂曰汶汶東注沂南流入清道沂州山東南有山曰太平山頂平可八九十里頃􅀊有㓂曽居之山北十餘里有􅀣五檀也秦夢記大和初沈亞之將之邠出長安城客槖泉邸舎春時晝夢入秦主内史廖舉亞之秦公召至殿􅂰前席曰寡人欲強􅀦願知其方先生何㕥教寡人亞之以昆彭齊桓對公悅遂試􅀘中㳙秦官也使佐西乞伐河西􅀳秦郊也亞之帥􅀅卒前攻下五城還報公大悅起勞曰大夫良苦休矣居乆之公㓜女弄玉聓簫史先死公謂亞之曰微大夫􅀳五城非寡人有甚徳大夫寡人有愛女而欲與大夫備洒掃可乎亞之少自立雅不欲遇幸臣蓄之固辭不得請拜左庶長尚公主賜金二百斤民間猶謂簫家公主其日有黄衣中貴􅀐疾馬來迎亞之入宫闕甚嚴呼公主出鬒髮着偏細衣裝不多飾其芳姝明媚筆不可模様侍女祗承分立左右者數百人召見亞之便舘居之亞之於宫題其門曰翠微宫宫人呼沈􅀰院雖備位下大夫繇公主故出入禁衞公主喜鳳簫每吹簫必下翆㣲宫髙樓上聲調逺逸能悲人聞者莫不自廢公主七月七日生亞之甞無貺夀内史廖曽為􅁗以女樂遺西戎戎主與廖水犀两合亞之從廖得以献公主公主悅受甞結裙􅅁之上穆公遇亞之禮兼同列㤙賜相望於道復一年春秦公之始平公主忽無疾卒公追傷不巳將葬咸陽原公命亞之作挽􅁔應教而作曰泣葬一枝紅生同死不同金鈿墜芳草香繡滿春風舊日聞簫䖏髙樓當月中梨芲寒食夜深閉翆微宫進公公讀詞善之時宫中有出聲若不忍者公隨泣下又使亞之作墓誌銘獨憶其銘曰日揚風哭兮石甃髯莎雜英滿地兮春色煙和珠愁粉瘦兮不生綺羅深深埋玉兮其恨如何亞之亦送葬咸陽原宫中十四人殉之亞之以悼悵過戚􅀍病卧在翠㣲宫然䖏殿外特室不入宫中矣居月余病良巳公謂亞之曰本㕥小女将託乆要不謂不淂周奉君子而先物故敝秦區區小國不􅁕辱大夫然寡人每見子即不􅀎不悲悼大夫盍適大國乎亞之對曰臣無狀肺腑公室待罪右庶長不能從死公主君免罪戾使得歸骨父母國臣不忘君㤙如今日將去公追酒髙㑹聲秦聲舞秦舞舞者擊髆附髀嗚嗚而音有不快聲甚怨公執酒亞之前曰夀頋此聲少善願沈􅀰􅆳􅀭􅁔㕥塞别公命趣進筆硯亞之受命去為歌辭曰擊體舞恨滿煙光無處􅀁淚如雨欲擬著辭不成語金鳯衘紅舊繡衣㡬度宫中同看舞人間春日正歡樂日暮東歸何䖏去歌卒授舞者雜其聲而道之四座皆泣既再拜辭去公復命至翠微宫與公主侍人别重入殿内時見珠翠遺碎青階下䆫紗檀㸃依然宫人泣對亞之亞之感􅍋良乆因題宫門詩曰君王多感放東歸從此秦官不復期春㬌自傷秦䘮主落芲如雨淚燕脂竟别去公命車駕送出凾谷􅀜巳送吏曰公􅒛盡此且去亞之與别語未卒忽驚覺卧邸舎明日亞之與友人崔九萬具道九萬愽陵人諳古謂余曰皇覧云秦穆公葬雍槖泉祈年宫下非其神靈憑乎亞之更求得秦時地誌說如九萬云鳴呼弄玉旣仙矣惡又死乎沈下賢文集卷苐二
