body:
  text: 雜著夏平旌故平盧軍節士萬勝崗新城録魏􅉸分河録夏平夏之為郡南走雍千五十里渉流沙以阻河地當朔古名其郡曰朔方其四時之辰夭暑而延冬其人毅其風烈其氣威而厲易憤而難平夫其難平之狀在陽為悖在隂為佷悖為不平者在上􅁀横而為也在下殘寃而為也佷為不平者在上蔽惑而為也在下憤激而為也元和初夏之節度韓將軍入覲其甥楊琳為之後㕥兵叛天子命􅀅軍演代之既至盡殺其屬將曲直者無别罪併俘其家姊弟妻子乃以其善貌擇入其餘均賞麾下􅀐士皆得肆辱汙明年拜右衛李將軍愿為尚書出代演為政至其城察民氣色不淂平廼留意於察果得之即令曰天子愍不辜乆而命四方為政執事觀察之夫楊琳叛脅其良人良人㕥􅇧肉妻子故不能得止又不䏻即死制巳在人今皆㕥是罪戮之矣其姊弟妻子當免者不宜復蓄汙且又皆良人子等䫫耳寜幸如是乎今盡籍出之無得􅀮吏更察敢有如是者斬於是尚書愿廼以畜馬為則詶淂􅀁虜者相當其直其人皆死志積寃憤旣出則豁其所畜道路呼聲四逸有感憤不勝于心者則仰而􅃅俯而踊退而變為喜而舞謡其德其聲雜調齊感如是連日攺旬而后已是則條理其政如此其氣復􅀎為悖邪夏之屬􅁟廣長㡬千里皆流沙屬民皆雜虜虜之多曰党項相聚於野曰部落其􅀁業無農桑事事畜馬牛羊槖駞廣德年中其部落先党項與其䫫意氣不等強者有牛羊槖駞其後更酬殺轉轉六七十年莫􅀎禁道路殺掠以為甞與華民迫貨馬牛羊槖駞者貨已輒以壯􅀐從㨗道伺險擊華民華民脫死者㡬希矣尚書公旣按察部落盡知其􅠕大者死小者盟又令曰今盟已敢有叛者㓕之其后有人貨淂一馬厚價善色駭而逸亡其􅀁就月餘奔歴􅁆帳異逐之又至一悵帳之老乃相與執而詣公居請曰有馬逸来莫知其􅀁由自後更􅀊故亡馬者得復之是則整頓其􅁦如此其氣復􅀎為佷耶夫政之不明則平不淂施于氣􅀏色語法不清則平不得信于市貨理化昔者周公之為政處于相則天下平䖏于東則一方平今夏北一方也淂其平如此豈在位者而知周公之道耶乃籍􅀁㕥于篇㕥明善理云爾旌故平盧軍節士郭昈郭航本不同族皆家平盧軍昈父珎岑舉進士與權臯著作同上苐天寳末燕人叛雖㕥戮自是而齊趙之間頗聞其強矣昈旣壯􅀎習先人􅀁業復舉進士時權相國為禮部尚書其􅀁立欲擢之及聞家居非地即罷選歸而亦為師古􅀁辟昈與故渤海人髙鉥為等伍師古死師道代之復用鉥昈為從事有頃常山帥卒其卒請嗣帥未得命師道亦遣甲卒萬人北渡河太原㕥為頋望鉥昈相與議語謂燕蔡之侯初封欲令師道先之為朝省㕥􅀣大效乃說曰傭有操鋤為人治榢者􅀎勤糓㓕稂􅀊得均穡至于傭子既専地自入其伍益相辦􅂇􅂉謂之語曰田人百畆成而餉之直㡬半􅁕㕥飽三冬之腹至於􅀁􅂑非任頼主人土廣且寛之則曰可苟設一旦篤其不奉亦奪矣是属固不殍矣此借言於家人尚尔况傭於天子乎今北河之傭方責其専田君侯寜可以假非於不理者誠􅀎此時因經圖㕥盡入其地親謁闕下則君侯之功莫可與等保餉丗世雖孱孫亦終不奪豈不偉㢤夫舉食於人當渴饑之望也一飯千金未􅁕者不􅀎十金及飫而進於前雖海陸備鼎頋與糠籺齒尚何􅀁愧願君侯省之無為人後事將行左右者更沮之曰猛虎􅀁㕥使物畏而不敢犯者以􅀎威自居也故盤林横谷奮睛以拏怒掉尾㕥􅀝嘯猒食於羆豕麏麚之􅁏及弃其􅀁長而欲弭耳委首以待餒是知命懸扵執者之手雖塵兒得㕥狎而搏雖欲申歩於咫尺安淂自遂也今公捨自食而就待餒其後亦􅀎無恨乎孰為公計其事扵是師道果大悔遂殺髙鈢而昈以􅀎善人左右開之故淂無殺幽於蔡之鄙縣使人守其門親屬通徃來輒籍署更十餘􅀊當元和九年蔡帥少陽死其子元濟欲以有父之地請於天子天子怒􅀤兵圍之既急師道亦悖乃隂為之􅂇明年秋師道兵萬餘東㓂彭城入簫豐沛且敗而還因艱四境出入者月餘昈乃為練繒書緘之絮帑如顆遣航持詣彭城請其願得上奏將行執航手曰努力慎勿􅂥書不吾名蓋假齊人劉諒耳非見帥無得言吾書者航至彭城宗人運為武寜虞􅀱都使始航欲舎之㑹運將兵出㝎豊未還航直詣賔府見郭行餘因曰航母之姊子劉諒有帛書奏記陳叛兵者山川曲折之狀願見將軍行餘淂之喜悅起告其帥航見帥獨謂帥曰郭昈為之畏􅂥故假劉諒劉諒者師道􅀁信之吏也遂􅀤書書詞云願㕥兵三千人出滄州用戈舡浮海莱淄之上此時海不備􅀁䖏皆罪人謪吏無􅀁與堅遂與上奏扵是天子遣告欵城帥知之帥以為非昈書疑師道為之㕥相詿誤故航歸不得書報獨告以信語航不敢復故道道廻逺凡􅁆千里乃及昈􅀁䖏未見昈且為師道􅀁召既行與昈兄子㑹於道因􅀼謂曰今者航無狀受召豈前事之露耶且露航獨死終無􅀁敗無憂也昈聞之㡬自引死航令莱人甞以氣敢聞於平盧軍及師道欲叛盡縻絡敢士故航在名中初航不知其召之􅀁㕥也意謂知前謀竟憂死明年元濟誅又明年師道反詔遣大梁椘彭城蔡許􅉸魏之師合而四入於是彭城軍下魚臺入金郷椘軍圍海取其二縣大梁軍攻考城淂之􅉸蔡許共拔斗門至臨濮魏軍渡楊流占東阿再戰渉商屯鄆西六十里兵最近賊益敗故師道遣右將軍劉晤將握前後兵三十萬人出當魏魏兵日急晤晤亦為師道所篤乃歸斬師道盡以鄆城降得拜為􅉸師在十四年二月乙亥也髙鉥以前著跡追為尚書蓋言寵之昈淂以外􅀰為􅉸從事詔令行餘為記室行餘與昈㑹於河􅀜之間昈謂行餘曰昈前者使航馳帛奏至彭城聞其還不聞其問今巳死矣君知其請乎行餘曰請者云何昈猶􅀎盡語軍中之詞矣行餘曰果然鳴呼航竟死矣莫有聞者嗟乎十四年余與李褒劉濛􅀫白馬津俱聞之於郭記室明日復皆如濟北濟北之人盡􅀎言昈之節故悉㕥論著將請于史氏云萬勝崗新城録元和九年蔡之帥死其子元濟㕥其􅁟叛逸掠陳汝之間冬縱兵臨夀春屠馬塘走其守令狐通焚霍丘淮南郡邑大駭民人卷席而居上聞之怒謪其守明年春詔執金吾李將馳傳出守之既至􅀵其壊卒聚夀春城使人勞井閭而市貨耕桑之業始復民人莫知復爲戰矣八月乙巳夜引兵南出霍丘百四十里又折而西四十里營於萬勝崗築新城初將度曰吾士卒萍合之衆也易散而難役吾㕥築壘令之必苦難使㓂聞之必襲吾思欲其自用乃召諸將謂曰吾旦日望氣其狀有㓂謹備之令諸軍分營連居環廻之間十有餘里各視營之􅀁向冝為􅁆堵之垣以禦􅁀矢耳諸將素竒将軍言歸而亟暁其卒故􅀁命立􅈬将軍與監軍使出周視之還至武寜大稱築者之􅀎勞以酒帛語􅃂其将因曰既已幸周繚之善也他􅀅恥其功之不䫫乃復興即日而垣周􅀅軍監軍使出牛酒為勞因士卒之樂又令曰山澤之地其􅁟瘠漓今時方秋浸潦用事謂衆之功難為也頋為垣今日而周明日而壊吾為諸君惜之誠􅀎致其厚則土藏去聲色氣脉力相輔雖霖潦不為患矣築者皆悅復争為厚及竟􅀅軍監軍使出視之復勞曰嗟乎諸君之􅀎衆士之功也既周且厚始謂其垣今則城矣因自吟曰城乎城乎使其増數仭而飾之㓂雖蚩􅀹寜敢犯我乎遂歸諸􅀅相謂曰乃者將軍之詞淂無意其髙邪吾黨亦魁醜其卑矣復増其築於是新城遂具明日果㓂来望見㫮愕然因至新城傍俱張喉髙言指城上曰為我曹敬謝􅀅軍訖詞而去諸􅀅盡伏㓂亦㕥王賢董重質營其側拒之十一月戊辰􅀅軍􅀅卒萬餘西渡澗渠上史蔟崗與賊陣自平明至日中進退相延不得合及日側􅀅軍乃謀曰彼必乗暮伺吾還兵擊我必矣於是引兵急攻㓂㓂延退數里乃以精兵分伏其兩隅復自延退間拔其羸老先渡者㕥為兵怠俱還遂大呼疾馳東下扵是伏兵皆􅁬㫁其後賊大潰殺傷千餘生得數十人官卒死者亦􅁆百人是時李存亮為先鋒将使百􅀐遊擊左右獨五人環馳如轂至賊麾下斬其將王賢􅁇轡轉闘而歸十一年夏髙霞寓敗於隋唐既謪盡􅀤其卒属東備矣九月使偏将軍李曜領歩卒數百人從險道夜衘枚入㓂境西過九女原百餘里屠其堡聚三十餘壘又使義營諸􅀅西北傍安陽山破其􅁟附屯戌之衆數十百人招其䧏民男女萬户得其􅀅二人用之乆之朝之卿士以爲􅀅軍怠於戰􅂉􅀤其語而客亦有來語於􅀅軍曰始天下髙将軍之義㕥将軍兵臨三州之㓂謂一舉而取何爲乆不稱其獲與􅀅軍曰子之望吾非也夫鋤深稂者必利其鍤乃吾之部多吴椘畊販之人長習於沮澤之上彼魚鳥之性生矣恇恇如偷兒其游翔之群非不多也及撫掌而駭之即争為潰矣而㓂亦素難吾名常以精卒待我今驅是於欹谷之間與㓂决闘譬由畜􅇾之禦窮狼寜有􅀁抗蓋居之嚴城以固其意令旦暮從壁上望見㓂􅀐號呼奔突之狀以熟其目然吾又常喻以風雲勝敗之語語之壯􅀁恃如目熟而恃壯及其可用吾伺其利而擊之期於必勝此吾􅀁効也十一年冬詔書促戰十月乙未上遣中貴人來臨視􅀅軍於是圖其陣於帳中令諸將各職其序旦暮擊皷教士卒為分合圎方之􅀔備盡􅀁用􅀅軍岀客有難之曰自建中於今淮夷三叛其間矣雖􅂪赦令然未甞斯湏忘戰故介兵人傳其兵父訓之子兄教之弟非戰事不語是㓂以將軍名聞天下固不敢犯自􅀅軍西出􅆠屯兵於萬勝城以控其要濠水而東連次淮江之間郡邑之人畊桑自力輸轉相屬曽不為㓂虞此將軍之功也以強計毅誠招其轉禍之人􅁇來如䋲此􅀅軍之用也今􅀅軍不以此為百全之基驅貃越之人身自􅂪堅而與必死之㓂决命頃刻即萬有一不知􅀅軍之指東土之固􅀅安仰㢤對曰此吾㕥熟於計乆矣然吾昔甞仕於河塞十有餘年公若僂之亡伸也前行始入覲不意􅂪􅃂於過悞使率師振旅吾之力唯其􅀁指巳死効夫馬隨羈而引者也覊之使馳則為之馳緩則歩安有擇塗陸而避僵蹶哉如有縱之不前衘之不止徒見撻賤之弃焉得延頸踠􅁕以待御且聖上旦暮待績於吾中貴􅁇至亦吾􅂪覊之日也何敢自引於便而巳矣遂以十一月庚辰夜漏過四十刻引兵西渡上史蔟牧之下矚賊壘分銖皆察及日中天風西猛起折浙幹廻幟將軍謂中貴人曰今日之􅀱非其利也願屯兵堡史蔟以伺之中貴人曰某受命視公戰不視公守將軍不得巳乃陣中軍為前武寜軍次之左右輔皆親兵戰凡十合㑹廬宣之軍居間聞戰聲自驚潰失次且遁是賊軍方若中軍武寜之殺傷㡬欲引去聞廬宣之軍驚潰即分精兵􅁆百勁突􅀁潰以擊亡而將軍復與中軍武寜深逐賊西行􅁆十里因與廬宣之軍相弃廬宣之軍先遁去卒無􅀁傷至暮中軍力闘遂死其將曹推直張忠信楊渾等及卒死者數百人武寜者亦數百人還軍新城雖無功者亦勞之以故士卒無戰苦畏叛之患時某客夀春得詳其語而書之㕥備史聽魏􅉸分河録九年冬為師薛公作元和八年秋水大至􅉸河南瓠子堤溢將及城居民震駭帥恐出視水迎流西南行思欲以救其患亦頗聞故有分河之事言其水甞導出􅀺陽傍帥以其功尚可跡於是遣其賔裴引㤗請於魏曰河經他而東滑最大自洛以西百流皆集于滑而春秋堤防不為固此􅀅軍􅀁明知也切以􅀺陽西南其洄壖拒流以生衝激之力誠願决一􅂀於斯幸分其威耳今秋雨連乆不間洛􅉸㕥西椎川峻谷􅁀􅀤之水争怒以走㑹即河􅀔日夜益壯恐一旦城郭無賴謹聽命於􅀅軍魏帥許之其將卒吏民更請曰患難近也况􅉸得水禍於天乆矣魏何戚乃許移於巳㢤帥曰民前聽􅀁語是􅀺陽與􅉸俱帝􅁟否耶設人有不幸扵水火而望及於四海道路之人凡見其苦即為舉手寜皆有戚者夫全大㕥弃細順理也且􅉸壁卒數萬人民不安業未知其頼吾安敢以河鄙咫尺之地為專惜乎願桑麻五糓之出不􅀎賑百户假如水􅀎盡敗􅀺陽尚不足愛况其無有民何患無土㕥食因召吏趍籍民地􅀁當奪者盡㕥他地與之籍奏天子天子嘉其意可而明年春􅉸鑿河北􅀺陽西南役卒萬人間流二十里復㑹于河其壖田凡七百頃皆歸屬河南夏六月魏使楊茂卿授地􅉸帥令陳酒樂與浮河新渠是日亞之以客得與故悉其事於兩帥之賔學􅄙嘲對客有以今廪食之不充漕􅞮不勝於弊是勞逺而堕近以爲問者余於是彂憤􅁆日故縷言而對之昔漢徙山連豪冨兼併之家以奉國邑凡百二十四萬户又有南北東西軍及匈奴雜虜以國衆来歸者仰給於漢未聞甞俟􅞮於吴越而復給也今以三千人食勞輸江淮􅀊貢三十萬斛迎流越險覆舷敗􅞮不得十半自漕以東督稽之官凡四十七署署吏不下百􅁆􅀊費錢十千萬爲大數而部吏舟傭相踰爲姦鞭榜流血酸苦之聲相聞禁錮連􅀊不􅄙􅀊千餘人雖赦宥而獄死者不可勝多矣甚非仁聖之􅀁牧人也乃者燕人叛玄宗南廵巴蜀肅宗勞兵于靈府及三駕神遊代宗臨陜􅀜中流離羸牛一韁當市錢二百千故有轉輸之法雖救一時然終轉人於禍誠可以痛今雖未可􅁀去且冝㕥三輔粟為貢重資於農則耕稼自勤畊稼自勤甸服無曠􅁟遊人矣如此九年之蓄可以儲又何勞輸􅞮於逺㢤客曰敬聞其㫖沈下賢文集卷苐三
