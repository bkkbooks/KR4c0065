front:
  text: 沈下賢文集卷苐四
  hash: sha256:881caec462428282a52d0be7e838dc9fad832ee2e6bf2c4095fc913e6f19b528
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0065_SBCK_004-1a}
body:
  text: 雜著異夢録􅁩鳥錄李紳傳馮燕傳郭常傳喜子傳異夢録元和十年亞之以記室從隴西公軍涇州而長安中賢士皆来客之五月十八日隴西公與客期宴於東池便舘既㘴隴西公曰余少從邢鳯游得記其異請語之客曰願備聽隴西公曰鳯帥家子無他􅀎後寓居長安平康里南以錢百萬質得故豪家洞門曲房之苐即其寢而晝偃夢一羙人自西楹來環歩從容執卷且吟為古裝而髙鬟長眉衣方領繡脩帶紳被廣袖之􅃭鳯大說曰麗者何自而臨我哉美人􅀏曰此妾家也而君客妾宇下焉有自耶鳯曰願示其書之目羙人曰妾好詩而常綴此鳯曰麗人幸少留得觀覧於是羙人授詩㘴西床鳯􅀤卷示其首篇題之曰春陽曲終四句其後他篇皆累數十句羙人曰君必欲傳之無令過一篇鳯即起從東廡下凡上取綵牋傳春陽曲其詞曰長安少女踏春陽何䖏春陽不㫁膓舞䄂弓彎渾忘却羅衣空換九秋霜鳯卒詩請曰何謂弓彎曰妾傳年父母使教妾為此舞羙人乃起整衣張䄂舞􅁆拍為弓彎狀㕥示鳯既罷羙人泫然良乆即辭去鳯曰願復少賜湏􅁷間竟去鳯亦覺昏然忘有記鳯更衣於􅁭䄂得其詞驚眎復省􅀁夢事在貞元中後鳳為余言如是是日監軍使與賔府郡佐及宴客隴西獨孤鉉范陽盧簡辭常山張又新武功􅂫滌皆歎息曰可記故亞之退而著録明日客有後至者渤海髙允中亰兆韋諒晉昌唐炎廣漢李瑀吴興姚合曰吾友王炎者元和初夕夢遊吴侍吴王乆聞宫中出輦鳴笳簫擊皷言塟西施王悼悲不止立詔詞客作挽歌炎遂應教詩曰西望吴王國雲書鳯字牌連江起珠帳擇水􅌾金􅁫滿地紅心草三層碧玉階春風無䖏􅀁悽恨不勝懐詞進王甚嘉之及寐􅀎記其事炎本太原人也􅁩鳥錄貢籍中有鳥􅁩名著生啇山始以􅁩聞啇之貢来者云􅀎摶擊雀鷃以為天子後宫遨􅃧貴幸宜進此㕥具樂後宫亦相尚竒飾之以綵􅁝合縷為足縈垂緌以綘繒衣尾加鳴金撼如珮又指習其捷便指熟得如意後宫從上所遨幸者誇翫無猒春縱去秋輒復貢来􅁩鳥性與他禽不䫫色縹緑而文頸形大小䫫鶡而意氣貌狀復不䫫往徃髙林大木間同巢者累數百其春乳當為食者還飼即先稚􅂉疾無别巳兒也秋羅人捕貢設羅有誤中者即群衆相號呼若不忍去争投下集羅以如是􅍞􅁩鳥無他名沈子曰余㓜過商山熟􅁩鳥事於其􅀫老今余適藍田郵夫唱傳曰􅁩鳥貢余初喜其以􅁩􅂪幸則生為梟獍者逺遁而愧死其餘賊􅁀侵凌之䫫期不得自性矣及聞其用材則不然使移其心從搏擊者伍備娛一旦之游而􅁩無􅀁與何其失職也夫何其失職也夫李紳傳李紳者夲趙人徙家吴中元和元年莭度使宗臣錡在吴紳以進士及苐還過謁錡錡舎之與宴遊晝夜錡􅀎其才留執書記明年錡以驕聞有詔召稱病不欲行賔莫敢言紳堅為言不入又不得去㑹留後使五澹專職為錡具行錡蓄怒始􅀤扵澹隂教士食之初士卒當勞賜者皆㑹府中受賜與中貴人臨視次至中軍士淂賜者俱不散齊呼曰澹逆可食既盡即執中貴人脅曰尔寜遂衆欲寜飽衆復曰請􅀁欲曰我為衆書報天子幸得復錡位貴人懼偽諾之召書記以䟽聞紳聞之亡入錡内匿衆索不得及中貴人至促錡行錡益怒急召紳授􅁓筆令操書上黷紳㘴錡前佯惴怖戰管揺􅁓下札皆不􅀎字輒塗去黒數十行又如是㡬盡􅁓錡怒罵曰是何敢如此汝欲下從而先人耶對曰紳不敢愛生直㕥少養長儒家未甞聞金革鳴今􅁀及此且不知精神在􅀁誠得死在畏苦前幸耳錡復制以兵刄令易􅁓復然傍一人為錡言曰聞有許御史縱者􅀹􅀎軍中書紳不足與等請召縱縱至錡銳自舉受辭操書無不可錡意遂幽神於潤之外獄兵散乃出縱竟逆死賛曰李錡之賊江東也其抗節者有李雲李紳雲則中山劉騰為書以大之而紳之跡未及稱且紳職錡肘腋下舉動頋眄有一不誠則支體立盡衆手而紳亦不頋而暁然自效如此可謂臨大節而不可奪者耶馮燕傳馮燕者魏豪人父祖無聞名燕少以意氣任專為擊毬闘雞􅃧魏市有争財􅋐者燕聞之徃慱殺不平遂沉匿田間官捕急遂亡􅉸益與􅉸軍中少年鷄毬相得相國賈公耽在滑􅀎燕林留屬中軍他日出行里中見户傍婦人翳神而望者色甚冶使人熟其意遂室之其夫滑將張嬰者也嬰聞其故累毆妻妻黨皆望嬰㑹從其飲䫫燕伺得間復偃寢中拒寢户嬰還妻開户納嬰以􅅂蔽燕燕卑歩􅈬蔽轉匿户扇後而巾堕枕下與佩刀近嬰酔且􅉂燕指巾令其妻取妻即刀授燕燕熟視㫁其妻頸遂巾明旦嬰起見妻毀死愕然欲出自白嬰隣㕥為真嬰煞留縳之趍告妻黨皆來曰常嫉毆吾女廼誣以過失今復賊煞之矣安得他殺事即其他殺安得獨存耶共持嬰且百餘笞遂不􅀎言官家收擊煞人罪莫有辦者強伏其郭常傳郭常者饒人業醫居饒中以直得信饒江其南導自閩其南頗通商外夷波斯安息之貨國人有轉估于饒者病且亟歴請他醫莫􅀎治請常常為詐曰病可去也估曰誠􅀎生我我酬錢五十萬常因舎之先以針火雜治導其血開然後輔以竒薬誡曰弟無槖慮塊居月餘估稱愈欲歸常􅀁許財常不聽估曰先生㕥寡與常曰不也吾直吾之藥計之功不􅀎損千錢而􅀁受非任反禍耳卒不内人以常為詐而責常常曰夫販賈之人細度而狹見終日譽集攉買計量於毫銖之間所入不􅀎􅀘其望今􅁀奪之息財五十萬則必追恡欝惋寜􅀎離其心且藥加於人病新去而六府方憊復有悒然之氣自内而伐即不可救􅀕何彼方有苦時知我􅀎治而告我我幸免之因利其財又使其死是獨不畏不仁而神可欺者吾何敢欺沈亞之曰仲尼蓋言我未見好仁者惡不仁者而從學之徒未聞明好惡也其言之憤不足畏耶今世􅂉有為􅀖有􅁟之臣專心聚歛殘割飢民之食以資􅀁欲忍其死而不愧受刑辱而無恥是亦不仁甚矣終無有惡者郭常之賤而行之又焉得不稱於當時哉喜子傳喜子者饑年女子小字也且困時􅂪活於估人劉承家女使喜子為人惠口而柔顔承載與徃來襄閩椘越之間常之閩納貨與息客雖民閩市中有韋生者居比屋與承喜子旦夕交候言韋動悅喜子而承顏頗喜酒多亡故韋生得縱語靡曼喜子既拒韋益欲􅁋之㑹承欲北舟向利韋思得與偕及圗假載於承承曰諾且承因匿貨㘴抵禁繫公室韋獨淂與喜子在舟囙賂傍者教與語云承得死罪事其財妾奴婢當輸入度終不􅀎脫矣不如以財亡韋語達喜子喜子立謀自殺即夜􅈬溺人相與岀之㡬死及􅂫復與言然知其妄乃巳自是各去其後不復相聞事在元和四年中衞人程生為之說賛曰吾聞程生云喜子之事至死不變亦可謂烈鳴呼狐死正丘首而喜子之仁也沈下賢文集卷第四
