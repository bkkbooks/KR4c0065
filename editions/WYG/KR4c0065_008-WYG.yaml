front:
  text: 日喜及至之也且觀將謁之禮於其門乃見納客之官奔奔而入促促而出言不及吐道不及陳退居三日不知所為乃復聽閤下採取賓士之道髙下之等則曰某自某方來以某執事書為之輕重書之多者館善宇飽善味書之次者又次之其有有無因而至者雖辯智過人猶以為狂即與偶然之輩徼幸之徒退栖陋室與百姓雜處飰惡味且走來閤下之門者亦不獨盡窮餓無依而來求粟帛於閤下亦有抱其智懐其才聞閤下好賢而來求臧否於閤下而望其推引之濟耳今一貫而禮一類而惠賢愚顛倒而又以書不書而為之輕重竊恐天下之士其來閤下之門者皆相争齎書為糧受閤下之惠者不口閤下之惠而皆曰某官之書禮我也何有愧於閤下不唯不愧而已亦有憤激於衷而終怨怒者竊恐閤下勞費以取無益亞之之愚獨為閤下惜伏願閤下稍精接士之道使賢愚明白閤下能知此則四方之士聞之皆謂閤下不恡巳之不至而求其方直如此今亞之冒旌㦸之嚴敢言進於閤下亦希知言之士聞知亞之不苟曲於閤下而存其直如此戰戢無任亞之再拜
  hash: sha256:99b6b75599f9b79fbd43f8a162515d475187c6f85e080fc676b460e796a4b434
