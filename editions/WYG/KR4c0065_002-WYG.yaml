body:
  text: 沈下賢集卷二唐沈亞之撰雜著湘中怨解湘中怨者事本怪媚為學者未嘗有述然而淫溺之人往往不寤今欲概其所論以著誡而已從生韋敖善撰樂府故牽而廣之以應其詠垂拱年中駕在上陽宫太學進士鄭生晨𤼵銅駞里乗曉月渡洛橋聞橋下有哭甚哀生下馬循聲索之見有艶女翳然䝉袖曰我孤養于兄嫂惡常苦我今欲赴水故留哀須臾生曰能逐我歸之乎應曰婢御無悔遂載與居號曰汜人所誦楚人九歌招魂九辯之書亦常擬其調賦為怨句其詞麗絶世莫有屬者因撰光風詞曰隆佳秀兮昭盛時播薰緑兮淑華歸顧里英與處萼兮潛重房以飾姿見稚態之韶羞兮䝉長靄以為衣醉融光兮𣺌𣺌瀰瀰迷千里兮涵湮湄晨陶陶兮暮熙熙舞婀娜之穠條兮騁盈盈以披遲酡遊顔兮倡蔓卉縠流蒨電兮石髮髓旎生居貧汜人嘗解篋出輕繒一端與賣胡人酬之千金居數嵗生遊長安是夕謂生曰我湘中蛟宫之娣也謫而從君今嵗滿無以久留君所欲為訣耳即相持啼泣生留之不能竟去後十餘年生之兄為岳州刺史㑹上巳日與家徒登岳陽樓望鄂渚張宴樂酣生愁思吟之曰情無垠兮靄靄洋洋懐佳期兮屬三湘聲未終有畫艫浮漾而來中為綵樓髙百餘尺其上施緯帳欄籠畫飾帷搴有彈絃鼓吹者皆神仙娥眉被服烟霓裙袖皆廣長其中一人起舞含嚬凄怨形類汜人舞而歌曰泝青山兮江之隅拖湘波兮裊緑裾荷拳拳兮情未舒匪同歸兮將焉如舞畢斂袖翔然凝望樓中縱觀方怡須臾風濤崩怒遂迷所往元和十三年余聞之於朋中因悉補其詞題之曰湘中怨盖欲使南昭嗣烟中之志為偶倡也文祝延有引文祝延之指其本禱祠閩人歌其質也閩侯居政民蔭而安他日侯恙在體巷野之祈祠於神者皆以請侯益憂焉後得閒而詞乃舒其俗以為言俚不足自道或謂軍副者亞之能變風從律善闡物志因耆耋為請於是與文以通其意且以古之得人者皆祝延之今復用延命為篇目其詞二闋閩山之杭杭兮水堋吞荒抱大兮香叠層騰氣清渾兮朝昏神生其中兮宅幽凝居如山兮惠如水處端卓兮赴下而忘鄙集人之祈兮從人之所市攀清明兮叩髣髴我民請兮期吉日願聽誠兮陳所當侯臨我兮恩如光照導兮天覆惠流吾兮樂且康恭聞侯兮飲食失常民縈憂兮心苦創飽我之飢兮侯由有穀神有澤兮宜蔭沃脫侯之恙兮歸侯之多福羣卑勤之恭潔兮鑒貞盟乎山竹右一闋為祈兕載吹兮音咿咿銅鐃呶兮呼眂睢樟之盖兮麓下雲垂幄兮烟為帷合吾民兮將安維吾侯之康兮樂欣肴盤列兮答神神擺漁篁兮降拂窣窣右侍伎兮左夫人態修邃兮佻𦕈調丹含瓊兮瑳去聲佳笑馨炮羶燔兮溢桉豆爵盎無虚兮菓摭雜佑秋雲清醉兮流融光巫裙旋兮覡袖翔瞪虚凝兮覽迴揚語神歡兮酒云央望吾侯兮遵賞事朝馬駕兮搦寳轡千弭函絃兮森導騎吾何樂兮神軒維侯之康兮居遊自遂右一闋為酬為人撰乞巧文和史館陳學士作邯鄲人妓婦李容子七夕祝織女作穿針戲取笤篁芙蓉雜致席上以望巧所降其夫以為沈下賢攻文又能剏窈窕之思善感物態因請撰為情語以導所欲詞曰惟雲渚之晨秋兮天曠碧以凝暮懸韶桂於姹月泫明淚之清露即何房之將期儼龍輪以就馭恭聞司巧之多方妾修馨香以奉具竊獨溺於自私希靈娥之所付㻁碧凝其異質兮韻隆虹於霾霽假文羽於孔雀兮而使擅夫佳麗戴雲蟬之重緌兮塗蠻金於綺篲細綃縷於藕腸兮差蓮跗以様齒命纎爪之蟲絲兮裊簷機之夕綴是物之巧功善飾願賜妾於針紉也葩萼鬱於濃妍包多宜以善喜引纎吹於輕颷若將翔而復倚醉春光之流景播清香於萬里霓烟出乎無間縹窈緲以斐亹若披若曳兮撦平林兮横曉水襲霽旦之繁芳兮因隠映而增綺澹冉冉其􅀈容世無隠以偕此是物之巧容善態願委妾於態媚也短蒲狹涘兮曲溜溢鵁鶄鵷雛兮引乳娣戲音清諧兮蕩演曳牽游裾之低凝兮蔓春心於淇裔枯寒勁幹兮憶棄葉擺風叫夜兮留燥雪流韻凄澁兮泱􅑜咽吟夢語之漣漣感霜鐘之流越是物之巧音善感願付妾于管絃也祝樠木神文并序謫掾秋病偃於漢之陽怳而夢鬼其形甚穢長股短胷薄頂無尻秃眉鑏吻嗜痔而饕誦視􅠓􅠓嚵氣􅧍臊指人生寒栗肌㨗毛及寤怪歎以告筆吏扃曰斯癘鬼也亞之曰癘鬼何端而侵我乎扃曰癘之為情惡倘倘而狎睢同丘為仇同惡扶依依邪傳影倒步側趨託舌附語以調淫巫今掾之為人體曠神虚樂態惡惡内曠外疎翺翔自儀舉止無虞不機不扃為所啁也無乃異乎亞之曰何以去斯患也吏曰扃聞之樠木之神其司郢土之陰可以酬而訴也願召巫用酒肴以寄詞為祝使其有愧必榜且戮掾無鬱也于是乃與撰為祝言一闋以道所惡其詞曰傾江漢之長瀾兮淘晨雲於宿靄惟附巘之横峯兮寫甘灣之清泚聞樠木之留古神兮宅同麓之荒邸茹清明之靈英含端光而為體與午節及皎峭兮惡清明之闇靄粤客子之何羈兮啁我血於癘鬼癘鬼之狀草剏樸􅈪蹴折兮蜍背棚横兮蠆腹板聱語虬反兮薄頂而蛇顙颭掞兮赤臉而䑕目伺差池於隟情兮投怪言以禍福拒良藥於煩痰兮謗嘉肴而謂之毒衣去聲戾氣以為介兮避神丹之利鏃彼怪魅之杇險兮非神君兮孰能以族洗身而為詞兮望皇霛於樠木雜記沂水北一百里有峴曰將軍甚靈民置祠於路左享之不已將軍曾為五郡牧常姓名𤣥通因築城失主將意而斬之其屍數日不仆今有臺曰立屍臺西南有山為鞍山山北有闗謂之穆陵李師古不臣作鎮於此防遏不意元和初罷之西有沂山山有廟則東安公也沂州刺史每春自禱恩是山山有谷九十九所河分流曰沂曰汶東注泝南流入青道沂州山東南有山曰太平山頂平可八九十里頃嵗有冦曾居之山北十餘里有樹五檀也秦夢記太和初沈亞之將之邠出長安城客槖泉邸舍春時晝夢入秦主内史廖家廖舉亞之秦公召至殿膝前席曰寡人欲强國願知其方先生何以教寡人亞之以昆彭齊桓對公悅遂試補中涓秦官也使佐西乞術伐河西晉秦郊也亞之帥將卒前攻下五城還報公大悅起勞曰大夫良苦休矣居久之公幼女弄玉聓蕭史先死公謂亞之曰微大夫晉五城非寡人有甚徳大夫寡人有愛女而欲與大夫備灑掃可乎亞之少自立雅不欲遇幸臣蓄之固辭不得請拜左庶長尚公主賜金二百斤民間猶謂蕭家公主其日有黄衣中貴騎疾馬來迎亞之入宫闕甚嚴呼公主出鬒髮著偏細衣裝不多飾其芳姝明媚筆不可模様侍女祗承分立左右者數百人召見亞之便館居之亞之於宫題其門曰翠微宫宫人呼沈郎院雖備位下大夫繇公主故出入禁衛公主喜鳳簫每吹簫必下翠微宫髙樓上聲調逺逸能悲人聞者莫不自廢公主七月七日生亞之嘗無貺夀内史廖曾為秦以女樂遺西戎戎主與廖水犀兩合亞之從廖得以獻公主公主悅受嘗結裙帶之上穆公遇亞之禮兼同列恩賜相望於道復一年春秦公之始平公主忽無疾卒公追傷不巳將𦵏咸陽原公命亞之作挽歌應教而作曰泣𦵏一枝紅生同死不同金鈿墜芳草香繡滿春風舊日聞簫處髙樓當月中梨花寒食夜深閉翠微宫進公公讀詞善之時宫中有出聲若不忍者公隨泣下又使亞之作墓誌銘獨憶其銘曰白楊風哭兮石甃髯莎雜英滿地兮春色烟和珠愁粉瘦兮不生綺羅深深埋玉兮其恨如何亞之亦送𦵏咸陽原宫中十四人殉之亞之以悼悵過戚被病卧在翠微宫然處殿外特室不入宫中矣居月餘病良巳公謂亞之曰本以小女將託久要不謂不得周奉君子而先物故敝秦區區小國不足辱大夫然寡人每見子即不能不悲悼大夫盍適大國乎亞之對曰臣無狀肺腑公室待罪右庶長長不能從死公主君免罪戾使得歸骨父母國臣不忘君恩如今日將去公追酒髙㑹聲秦聲舞秦舞舞者擊髆拊髀嗚嗚而音有不快聲甚怨公執酒亞之前曰夀予顧此聲少善願沈郎賡揚歌以塞别公命趣進筆硯亞之受命去為歌詞曰擊休舞恨滿烟光無處所淚如雨欲擬著辭不成語金鳳銜紅舊繡衣幾度宫中同看舞人間春日正歡樂日暮東歸何處去歌卒授舞者雜其聲而道之四座皆泣既再拜辭去公復命至翠微宫與公主侍人别重入殿内時見珠翠遺碎青階下窓紗檀㸃依然宫人泣對亞之亞之感咽良久因題宫門詩曰君王多感放東歸從此秦宫不復期春景自傷秦喪主落花如雨淚燕脂竟别去公命車駕送出函谷闗巳送吏曰公命盡此且去亞之與别語未卒忽驚覺卧邸舍明日亞之與友人崔九萬具道九萬博陵人諳古謂舍曰皇覽云秦穆公𦵏雍槖泉祈年宫下非其神靈憑乎亞之更求得秦時地誌說如九萬云嗚呼弄玉既仙矣惡又死乎沈下賢集巻二
