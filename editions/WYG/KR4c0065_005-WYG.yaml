body:
  text: 沈下賢集巻五唐沈亞之撰記河中府㕘軍㕔記國朝設官無髙卑皆以職授任不職而居任者獨叅軍焉觀其意盖欲以清人賢冑之子弟將命試任使以雅地岀之耳不然何優然曠養之如此其差髙下則以五府六雅為之次第蒲河中界三京左雍三百里且以天子在雍故其地益雄調吏者必以其人授焉噫今之衆官多失職不失其本者亦獨叅軍焉長慶二年余客蒲河中城某叅軍某族世皆清胄又與始命之意不失矣乃相與請余記職官之本於其署歌者葉記昔者秦青之弟子韓娥從學久之以為能盡青之妙也即辭去青送之將訣且歌一歌而林籟振蕩再歌則行雲不流矣娥心乃裒然然韓娥亦能使逶迤之聲環梁而游凝塵奮飛微舞上下者三日不止能為人悲亦能為人喜其後漢武時協律李延年為新聲亦云能感動人至唐貞元元年洛陽金谷里有女子葉學歌於柳恭恭下之初與其曹十餘人居獨葉歌無等後為成都率家妓及率死復來長安中而轂下聲家聞其能咸與會唱次至葉當引弄及舉音則弦工吹師皆失執自廢既罷聲黨相謂約慎語無令人得聞知是時博陵大家子崔莒賢而自患其室饒乃曰吾緑組初秩寧宜厚蓄以自封耶遂大置賓客門下縱樂與遨遊極費無有所恡他日莒宴賓堂上樂屬因言曰有新聲葉者歌無倫請延之即乗小車詣莒莒且酣為一擲目作樂乃合韻奏緑腰俱矚葉曰幸給聲葉起與歌一解一坐盡眙是日歸莒莒沈浮長安數十年葉之價益露然以莒能善人而優曹亦歸之故卒得不貢聲禁中葉為人潔峭自處雖諧者百態争笑於前未嘗換色元和六年莒從事岐公在朔方時余往謁焉會與公賓舍於郵在莒隣夜聞其歌有一人坐泣甚悲良久復悅及卒聲而悲悅再三曰孰為之是欲吾不得自任耳明旦問其狀乃葉為也後莒復從岐公來彭城十年余過其居問葉安在曰近逝矣自趙璧李元馮世稱為知音之尤皆擅鼓弦及為余言葉之歌使其妙自備則音屬不知和矣嗚呼豈韓娥之嗣與惜其終莫有能繼其聲者故余著之欲其聞于後世云閩城開新池記閩城吻海而派江輔山以居先時無安沼平池為遊舟娛席之地而娉花媚竹散生擲華故酒笑酣視之晨而佳思莫極矣髙平公牧察之余乃經度隟空之所因卑汚塹而岸之浦嶼環迴之勢所造必勝羣山左右瀉影浮秀者輳空而入十一月辛卯新池成明日軍副者亞之疾閒公延䕶軍及從事絃工吹師裾袖之曹游池而酒既坐謂軍副亞之曰吾疎汙隟以就此而海波朝夕盈來之候逓輪足給以為我狀而石之以期乎不朽軍副亞之不敢讓遂執巵俯船祭酒於其流因祝且詞曰水能濁清首冠五行波流巳大有神為宰環塘縈縈為公藻鏡新池泱泱與地興禪嘉鯉鮐魴於水息昌嚵鮞嘘虺即水與死翡翠鵁鶄浴涘眠晴辛蒲剪剪扇荷擎擎時未云來勞思乃馨柘槿紺竹滲縮醖沃延榮接姿以水為禄輔佑堙隍吐孕百福惟我公之明之通之智之忠保夀考兮與池之無窮軍副者亞之詞既復再拜跪巵奉夀于公前公大喜還列就坐以酒以歌日入而起夀州團練副使㕔壁記戰國南北書更言故世諸豪争據於夀春或兵至百萬有不能得者豈地勢為要津乎自建中已來淮夷窟叛於蔡天子之詔或討或赦由是夀春備為東塞矣為之守者皆佩將軍印幕府符書之設擬於方鎮而有副使之官焉元和中韋公武以殿中侍御史為之九年秋蔡州叛夀春守令狐通引兵屯霍丘副使得孱卒百餘人留郡中冬蔡兵大入馬塘冦鄧家城殺其將卒五千餘人盡虜民男女焚壊邑室而去郡中驚駭民人多流其家而東副使因言夀春其地壍水四絡南有淠西遮淮潁東有淝下以北注激而迴為西流環乳而濬入于淮此天與險於是也假如愚民能棄其業西流即為蓬徙塵走耳安與國是為利耶乃出家奴與民户一丁但為水工決安豐已南陂池㑹其流于城傍野中浸注如澤以故居民流心稍稍復定時馬塘鄧家城既陷霍丘方畏冦乗其虚復飛語謡以惑其俗耶狐死首丘井閭多傳言之耆老曰果不能守是堡矣守聞之益恐遂棄其城亡歸是日霍丘焚行來及郡㑹日暮使吏馳告副使以歸狀令得夜開壁吏至壁卒捍闗不得入呼罵其卒副使立城上曰某得命於詔城晝受即晝復之今守獨入而卒露無為也如驅與俱來寧不知盜居其間得夜則禍成矣或幸止於郵平明闢闗介士陳兵夾道驗其號以入卒無敢越伍而趨居有頃守謫去詔以李將軍代將軍西出强兵臨萬勝城復以副使掌留事明年陟其能得加侍御史是嵗亞之東觀戰至夀春得副使之跡題之於署下以記行事之時云盩厔縣丞㕔記盩厔道巴漢三蜀南極山不盡三十里北沮渭短長之補與山而近其野半為澤故鼠倚穡而居雖善捕伐不能無傷于稼說者以為漢孝武帝嘗夜出射熊於是而田人輒留執帝從者由此觀之民情阻限古為艱理時猶逼畏指諫即稍罷然佞臣竟以帝恥不忘遂籍民人田為五柞長楊矣今又徙甌越卒留戍邑中神策亦屯兵角居俱稱䕶甸而三蜀移民遊於其間市閭雜業者多於縣人十九趨農桑業者十五又有太子家田及竹圃皆募其傭藝之由是募民豪農頗書名買横緩急以自藪匿民冒名欺偷浮詐相樛雖賢宰處之而丞與曹或不類莫能盡枉直之情也夫丞之職也贊宰之正以諸曹其有不便於民者丞能得不可今丞也余從祖居之既滿嵗民諍不作如此則宰之所宰丞之所贊可謂知方也已長慶初余思相如進諫之風南歴長楊至於射熊五柞訪其遺跡因退舍是邑遂悉論山川俗里之事題於丞之署云都梁山倉記汴水别河而東合於淮淮水東米帛之輸闗中者也由此漕入其所交販往來大賈豪商物多遊利鹽鐵之臣亦署致其間因擇官分曹以𣙜庶貨而部貢之吏盡令鹽鐵諸官校遣之疾徐用賞伐大梁彭城控西河皆屯兵居卒食出官田而畎畝頗夾河與之俱東抑澤河流水温而泥多肥比涇水四月農事作則争為之派決而就所事視其源緜緜不能通槁葉矣天子以為兩地兵食所急不甚阻其欲舟艫曝滯相望其間嵗以為常而木文多敗裂自四月至七月舟傭食盡不得前元和九年隴西李稼為鹽鐵官掌淮口院病其涸滯思欲以為救而乃與揚子留後議之曰自閩越以西百郡所貢輳輓皆出是以炎天累月之乆滯於咫尺之地篙公諸傭盡出所儲不能振十半之食只益姦偷耳幾或有終嵗而不得返其家者今誠得敖之倉列于所便以造出入計無憂也正月河冰始泮盡發所蓄而西六月之前虚廩以待東之至者矣如此則役者逸而弊何從生哉議定即以狀白得遂其便於是稼度泗上卑濕無堪地遂剏庾於淮南都梁山十二年詔以誅蔡之師食窘促令鹽鐵所輓皆趨偃城下是時下淮南倉發舂吏計舂其工人曰舂材必櫟若榆吏欲令公就山林剪市之稼曰天火方焚曰將燋萬方當頃刻之間雖得弊穢之器奮濁汚之波百夫汲而揚之立足滅患如曰不然我欲利其器待我柘桂之杓致滂沱之流操以救之彼言而後謀則然灰尚不可望而况全者今縣軍十萬旦暮不賑其為急也間不容釐今待汝訪山求材然後用何異乎柘杓滂流之語耶其倉材剪之餘大可以為臼小可以為杵長可以為杵之梁薄可以為䏶樞夾峙促命裁之即日而舂成百具其餘來與吏分辦之先以家奴就役次及郡吏各有差所舂凡二十八萬石不涉旬俱得浮淮而西矣十三年夏泗水大災淮溢壊城邑民人逃水西崗夜多相掠奪更驚恐號呼而鹽鐵貨帛十餘萬兩囊之於布緘用吏名載與渡貨帛無遺尺乃内倉中不能盈一敖其餘皆蔭仕家之急時余過泗上得其事故與悉論善濟之方而著之以明其績華州新葺設㕔記今天下邦郡之望莫與太華等然而公堂讌無别位顧几硯與餼樂之具日更廢置於其間寧地勢之要為守者無乆留於任而經慮莫及此乎隴西公為守未滿嵗郡中既治因窺其庶屋可攻者乃先問其吏曰政之為困何始也吏曰累更其守耳公曰吏知其病哉夫几硯者公事之重器也以宴而遷以宴而復則居不得常屢更其所政之為困不由此耶且吏入公門望其居則必莊是几硯之廬處宜其嚴也今朝徹而暮置事之者既勞固以慢矣而况酒行樂作婦女列坐優者與諸隆詼謾揺笑譏左右侍立或銜哂壊容不可罪也夫狎乆則不敬豈吾之獨患其吏亦醜之明日解冗宇一構于正寢西南隅壍其外數步土基之飾故材以輳用垢者磨其淄弱者承其輕決流於其所以便塗者補棟續楹不涉旬而功就沼沚之湄隨而比矣嗟乎轉􅂒為安不費而功吾知其由人長慶元年四月甲子吳興沈亞之仰公之跡因請張文其下紀其功焉隴州刺史㕔記昔制戎於安西瀚海之時而隴汧去塞萬三千里其處内居安如此朝之命守猶以為重地必拔其良能當時之務其難者不過理寵門大家之田園陂池而已觀昇平之基其須賢如此今自上邽清水已西六鎮五十郡既失地地為戎田城為戎固人為戎奴婢顧隴涇鹽靈皆列為極塞而隴益為國路凡戎使往來者必出此視其守由主人也而言語威儀豈容易而處近世者朝之命守殆未能注意耳今清河崔公承寵世仕安西軍司馬公生長於戎然而神性傑異行賢智之路頗通諸書又能博九州山川之理而國中之士知而仰者無幾人近嵗西戎累犯塞前年今上即位欲以姻交北虜以輔中國上書言兩蕃之事天子覽書以為必能同戎夷之情故命使之今年拜守隴州拜之日朝之卿咸謂隴之得賢為賀居郡而戎來者必憚愛而去嗚呼何向之命守未能注意而今之悟得其人賢何向之知者無而今之稱者盈朝豈一郡之事有時而理耶一郡之人有時而幸耶智者之道有時而用耶長慶初余西視戎至於隴下聞郡人之所美故列署而刻記焉沈下賢集巻五
