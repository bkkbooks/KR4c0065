  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0065_WYG_004-1a, image: WYG1079/WYG1079-0019c.png}
body:
  text: 沈下賢集巻四唐沈亞之撰雜著異夢錄元和十年亞之以記室從隴西公軍涇州而長安中賢士皆來客之五月十八日隴西公與客期宴于東池便館既坐隴西公曰余少從邢鳳遊得記其異請語之客曰願備聽隴西公曰鳳帥家子無他能後寓居長安平康里南以錢百萬質得故豪家洞門曲房之第即其寢而晝偃夢一美人自西楹來環步從容執巻且吟為古裝而髙鬟長眉衣方領繡帶紳被廣袖之襦鳳大悅曰麗者何自而臨我哉美人笑曰此妾家也而君客妾宇下焉有自耶鳳曰願示其書之目美人曰妾好詩而常綴此鳳曰麗人幸少留得賜觀覽於是美人授詩坐西床鳳發巻視其首篇題之曰春陽曲終四句其後他篇皆累數十句美人曰君必欲傳之無令過一篇鳳即起從東廡下几上取綵箋𫝊春陽曲其詞曰長安少女踏春陽何處春陽不斷腸舞袖弓彎渾忘却羅衣空換九秋霜鳳卒詩請曰何謂弓彎曰妾傅年父母使教妾為此舞美人乃起整衣張袖舞數拍為弓彎狀以視鳳既罷美人泫然良久即辭去鳳曰願復少賜須臾間竟去鳳亦覺昏然忘有記鳳更衣於襟袖得其詞驚眎復省所夢事在貞元中後鳳為余言如此是日監軍使與賓府郡佐及宴客隴西獨孤鉉范陽盧簡辭常山張又新武功蘇滌皆嘆息曰可記故亞之退而著錄明日客有後至者渤海髙允中京兆韋諒晉昌唐炎廣漢李瑀吳興邵合曰吾友王炎者元和初夕夢遊吳侍吳王久之聞宫中出輦鳴笳吹簫擊鼓言𦵏西施王悲悼不止立詔詞客作挽歌炎遂應教詩曰西望吳王國雲書鳳字牌連江起珠帳擇土𦵏金釵滿地紅心草三層碧玉階春風無處所悽恨不勝懐詞進王甚嘉之及寤能記其事炎本太原人也誼鳥錄貢籍中有鳥誼名著生商山始以誼聞商之貢來者云能搏擊雀鷃以為天子後宫遨戲貴幸宜進此以具樂後宫亦相尚竒飾之以綵絲合縷為足縈垂緌以絳繒衣尾加鳴金撼如珮又指習其㨗便指熟得如意後宫從上所遨幸者誇翫無厭春縱去秋輒復貢來誼鳥性與他禽不類色縹緑而文頸形大小類鶡而意氣狀貌復不類往往髙林大木間同巢者累數百其春乳當為食者還飼即先稚或疾無别已兒也秋羅人捕貢設羅有誤中者即羣衆相號呼若不忍去争投下集羅以如是故誼鳥無他名沈子曰余幼過商山熟誼鳥事於其宿老今余適藍田郵夫唱傳曰誼鳥貢余初喜其以誼䝉幸則生為梟獍者逺遁而愧死其餘賊暴侵凌之類期不得自性矣及聞其用材則不然使移其心從搏擊者伍備娛一旦之游而誼無所與何其失職也夫何其失職也夫李紳傳李紳者本趙人徙家吳中元和元年節度使宗臣錡在吳紳以進士及第還過謁錡錡舍之與宴遊晝夜錡能其才能留執書記明年錡以驕聞有詔召稱疾不欲行賓客莫敢言紳堅為言不入又不得去㑹留後使王澹專職為錡具行錡蓄怒始發於澹陰教士食之初士卒當勞賜者皆㑹府中受賜與中貴人臨視次至中軍士得賜者俱不散齊呼曰澹逆可食既盡即執中貴人脇曰爾寧遂衆欲寧飽衆腹曰請所欲曰為我衆書報天子幸得復錡位貴人懼偽諾之召書記以疏聞紳聞之亡入錡内匿衆索不得及中貴人至促錡行錡益怒急召紳授紙筆令操書上牘紳坐錡前佯惴怖戰管揺紙下扎皆不能字輒塗去累數十行又如是幾盡紙錡怒罵曰是何敢如此汝欲下從而先人耶對曰紳不敢惡生直以少養長儒家未嘗聞金革鳴今暴及此且不知精神在所誠得死在畏苦前幸耳錡復制以兵刄令易紙復然傍一人為錡言曰聞有許御史縱者尤能軍中書紳不足與等請召縱縱至錡銳意自舉授詞操書無不可錡意遂幽紳於潤之外獄兵散乃出縱竟逆死贊曰李錡之賊江東也其抗節者有李雲李紳雲則中山劉騰為書以大之而紳之迹未及稱且紳職錡肘腋下舉動顧盼有一不誠則支體立盡衆手而紳亦不顧而曉然自效如此可謂臨大節而不可奪者耶馮燕傳馮燕者魏豪人父祖無聞名燕少以意氣任專為擊毬鬭雞戲魏市有争財鬭者燕聞之往搏殺不平遂沈匿田間官捕急遂亡滑益與滑軍中少年雞毬相得相國賈公耽在滑能燕材留屬中軍他日出行里中見户傍婦人翳袖而望者色甚冶使人熟其意遂室之其夫滑將張嬰者也嬰聞其故累毆妻妻黨皆望嬰會嬰從其類飲燕伺得閒復偃寢中拒寢户嬰還妻開户納嬰以裾蔽燕燕卑脊步就蔽轉匿户扇後而巾墮枕下與佩刀近嬰醉且瞑燕指巾令其妻取妻取刀授燕燕熟視斷其妻頸遂巾明旦嬰起見妻毁死愕然欲出自白嬰鄰以為真嬰殺留縛之趨告妻黨皆來曰常嫉毆吾女迺誣以過失今復賊殺之矣安得他殺事即其他殺而安得獨存耶共持嬰且百餘笞遂不能言官家收繫殺人罪莫有辨者强伏其辜司法官小吏持扑者數十人將嬰就市看者圍面千餘人有一人排看者來呼曰且無令不辜死者吾竊其妻而又殺之當繫我吏執自言人乃燕也司法官與俱見賈公盡以狀對賈公以狀聞請歸其印以贖燕死上誼之下詔凡滑城死罪皆免贊曰余尚太史言而又好叙誼事其賓黨耳目之所聞見而為余道元和中外郎劉元鼎語余以馮燕事得傳焉嗚呼淫惑之心有甚水火可不畏哉然而燕殺不誼白不辜真古豪矣郭常傳郭常者饒人業醫居饒中以直徳信饒江其南導自閩頗通商外夷波斯安息之貨國人有轉估於饒者病且亟歴請他醫莫能治請常常為診曰病可去也估曰誠能生我我酬錢五十萬常因舍之先以針火雜治導其血開然後輔以竒藥誡曰第槖慮塊居月餘估稱愈欲歸常所許財常不聽估曰先生以為寡與常曰不也吾直吾之藥計吾之功不能損千錢而所受非任反禍耳卒不内人以常為詐而責常常曰夫販賈之人細度而狹見終日希售㩁買計量於毫銖之間所入不能補其望今暴奪之息財五十萬則必追恡欝惋寧能離其心且藥加於人病新去而六府方憊復有悒然之氣自内而伐即不可救奈何彼方有苦時知我能治而吿我我幸免之因利其財又使其死是獨不畏不仁而神可欺者吾何敢欺沈亞之曰仲尼盖言我未見好仁者惡不仁者而後學之徒未聞明好惡也豈其言之憤不足畏耶今世或為邦有土之臣専心聚斂殘割飢民之食以資所欲忍其死而不愧受刑辱而無恥是亦不仁甚矣終無有惡者郭常之賤而行之又焉得不稱于當時哉喜子傳喜子者飢年女子小字也且困時䝉活於估人劉承家女使喜子為人惠口而柔顔承載與往來襄閩楚越之間常之閩納貨與息客雜居閩市中有韋生者居比屋與承喜子旦夕交候言韋動悅喜子而承顧頗喜酒多亡故韋生得縱語靡曼喜子既拒韋益欲淫之會承欲北舟向利韋思得與偕及圖假載於承承曰諾且承因匿貨坐抵禁繫公室韋獨得與喜子在舟因賂傍者教以語云承得死罪事其財妾奴婢當輸入度終不能脫矣不如以財亡韋語達喜子喜子立謀自殺即夜就溺人相與岀之幾死及蘇復與言然知其妄乃巳自是各去其後不復相聞事在元和四年終衞人程生為之說贊曰吾聞程生云喜子之事至死不變亦可謂烈嗚呼狐死正丘首而喜子之仁也沈下賢集巻四
