body:
  text: 沈下賢集卷九唐沈亞之撰序送張從事侍中東征序去年淮夷誅凡諸侯執兵者皆統在侍中故侍中得坐制於大梁以長子常侍帥萬人臨事破豎北勁皆先諸侯軍故宣武論功得為上今年齊淄不順命天子復使討圜其境之諸侯咸㑹兵四塞於是侍中空大梁驅甲馬三萬騎與攻壓之具金鐵草木飛石騰梯之器載而引者亦三萬乘擇日出夷門門下之賓叅于幕者張生從焉生舉進士得第因東客於侍中門以協律銀綬而居侍中器之以為敏良可親起居必與俱及考釭有期故謂余敘其所以云送叔父歸覲序古之取士得明經為清選近世即為進士亞之叔父獨謂古道可恃乃曰我儒世家也當勤經策義取髙第耳業之三貢果得中遂理槖言歸亟思以賀為髙堂之夀嗟乎斯古孝㢘之職叔父盡之無愧耳及東出都命諸子亞之撰序詩以贊行云送田令二子歸寧序昔兩河之流未歸而中書公為魏將因其師喪故門下將卒咸以農事歸中書公天子從人之欲而拜之凡類之制無大小皆俟決於朝朝之命士卒有所不孰聞者往往孽齬一年而化其後四年天子討淮夷使其中子布與去聲兵五年命討常山悉師臨淮南宫成七年淮夷滅八年常山貢二郡赦之秋命討齊魯移兵東渡河急攻濟北九年拔之斬其魁以獻其秋入覲盡以昆弟諸子去魏從謁京師者十餘人十年常山帥卒常山人以其狀來告中書公由此得其事前白奏於是拜帥常山自以魏歸不十年天子之兵南滅淮夷東清兩河而曰中書公之勤也乃以兄為尚書留置洛以其弟執金吾以子肇為亞尹居岐以將軍右持節回中以犨為將軍居北軍又以羣為將軍居列午為少將作牟為殿中丞以支恭玉昆弟姪俱以中書公䝉寵居官然皆謹恭下士人多以為當任與儒者比長慶初少子牟牟弟早令覲中書公明日出都門來顧余以云轂下名人文士必以文寵别欲余有撰於是與述終始之跡以塞其勤送韓北渚赴江西序或曰近世有府之侯邀士拜賓不由巳之所尚而使羣居不類故有諛言順容積微之讒以基所毁四鄰之地更効遞笑飛流短長天下聞以矣而其侯尚且不寤夫言諛足以瞽明薄毁足以害忠若是雖欲明其撓直而明莫之遂也雖樂聞已之所闕而闕莫之聞也彼思勤畏過者一牽於諛讒即爾而况已之所尚又使羣居不類乎是以慎行者之所畏也昔者余嘗得諸吏部昌黎公凡遊門下十有餘年北渚公之諸孫也左右杖屨奉應對言忠情勞其餘則工為魏晉之詩盡造其度今年春進士得第冬則賓仕於江西府且有行日其友追詩以為别乃相與訊其將處者而誰與曰有引農生倞耳夫引農慎行其道不欺者也北渚之往吾無虞其類之患勉矣惟耳不衰於道而已送韓静略序或者以文為客語曰古人有言仍舊貫如之何何必改作乃客之所尚也恢漫乎竒態紬紐已思以自織剪違曩者之成轍豈君子因循之道歟客應曰草木之病煩也使秋以治之維孱萌於窮枿之餘搔風被露相望愁泫陽津下潛雖佳懿之彩猶且抑隠唯恐失類於慘禪菸黄之色耳安暇自任其所長耶即春以治之擢氣於其根昇津百體之上暢之風露而繡英作誇紅奮綺緗縹紺紫錯若裝畫揚花流香靄蕩乎天地之端各極其至使肆勇曜如是寧可以一狀拘之人有植木堂下欲其益茂伐他幹以加之枝上名之樹資過者雖愚猶知其欺也且裁經綴史補之如􅤞疣是文之病煩久矣聞之韓祭酒之言曰善藝樹者必壅以美壤以時沃灌其柯萌之鋒由自而銳也夫經史百家之學於心沃灌而已余以為構室於室下葺之故材其上下不能逾其覆拘於所限故也剏之隟空之地訪堅修之良然後工之於人何髙不可者祭酒導其涯於前而後流䝉波稍稍自澤静略於祭酒其宗也導道十年而功就頗秀出流類今既别而延蔓將遊乎河江豈欲益其自廣哉惟其勉無怠别前岐山令鄒君序十年秋作昔者亞之西游過岐山而令秩始謝余將就給食人曰故令雖貧然能卑人厚禮何不往舍也時方暑既見解帶座令衣弊繒短衣使兒孫姪捧案前賓食食巳有客越而請曰聞令家無女使賤走賓客食必夫人親治之誠厚士勤矣且賓之來者無賢不肖皆即混然齊飽是愚為冒矣而賢者安所愧乎今願擇之而厚給如何者令曰古者侯生亦有言人固未易知夫士以食而來我者留於門無繫帶之間尚巳為久矣焉能待辨而後進乎亦寧有給之一食而使其甚愧固如是雖賢愚何望哉客慙而退至今三年與令遇未嘗再㑹食客今令窮來京師人無假氣而延於進者嗟乎㑹予與令各有適故書前事以敘所憤云别權武序七年冬作秦隴之地其氣雄而能産出竒夫良士由是古稱賢士大夫多隴西秦川在隴右數百里而隴峻水夷川之源出其左余吳興人生於汧隴之陽長而西望秦原水土精神之氣昏旦異狀予又怪近世竒夫良士不繁出於此往者五年余自東來京師見中山劉定命言天水權武其人可教耳吾常語善於武武發言往往次道及出門行事多以言明日余過言之復其語則仁與不仁義與不義必汗流􅡌慄胷目如即事既罷定命又從容為余言志所未遑者則下涕頓首又曰吾有女弟欲以歸武願言成之事皆未及㑹余東拜親於江淮冬還都下不幸而定命死其親友赴喪者數十人武臨喪具事終日繼哀無絶聲予持其手曰桑隴之能産賢由賢之能産徳誠未窮矣既𦵏武當西去予贈之曰夫孝慈仁誼忠信㢘直總於已曰賢辨是而行之不惑曰明子有之矣慎終行之夫金之為物也鎔而為器無不能然則將求為大用必圖於善冶者當其未善必更之當其善無墮鎔序詩送李膠秀才歌詩之所以為發寤其㫖甚逺夫物情暢樂怨抑之感吁而散之大空還㑹於風雲降於水土包聲於陶埴之器髣髴之變盡揺於樂樂之所感微則占於音章則見於詞微於音者聖人察之章於詞者賢人畏之故勤人之君欲以聞其下忠主之佐使以達其上夫往代之詩樂皆能沿聲諧韻今徵其文以觀之而其代興衰可見也寧近世學者固不變風從律耶何為其詞不聞充陳於管絃乎今樂府既闕所奏如有忠言之意衆所仰哉余故友李賀善擇南北朝樂府故詞其所賦不多怨鬱悽艶之功誠以盖古排今使為詞者莫得偶矣惜乎其終亦不備聲絃唱賀名溢天下年二十七官卒奉常由是後學争踵賀相與綴裁其字句以媒取價嗚呼貢諷合韻之勤益逺矣膠亦諸王孫頗専七言詞始來長安人以為思轍賀今一不中第言歸故楚江陵下豈欲以廣其情於烟波顧有撰余乃敢悉敘詩歌之大端以為别贄送杜憓序初亞之提筆西入闗留舍鮑溶於揚州溶出詩吟至夕過百篇而窈窕之思雜發亞之嘆息曰後生亦有繼之哉鮑溶前在長安常出入冢官杜氏家羣孫皆喜溶是時憓方學何虞詩於其音往往能自振激後可得也及亞之與生昆弟遊其相樂之愛故與溶等而溶言果然十年春生長上知生之志謂生曰巴漢瀟湘之水皆淪流於東合而為大江猛注於江陵揚州兩地之間其名山圜連横秀之色屬江而起前文者自馬遷皆經遊之六代為詩之士而得聲名騰翔矣因命生去遊以廣其思三月生即路亞之喜鮑之知言又樂生受命之遊故終始以序送同年任畹歸蜀序十年新及第進士將去都乃大宴朝賢卿士與來㑹樂而都中樂工倡優女子皆坐優人前贊武者奮袖出席於是堂上下匏吹絃簧大奏即暮既罷生揖語亞之曰吾家世居蜀嘗以進士得第吾少能嗣其業幸子之文得稱甚光願為我序還家之榮亞之辭謝不敏曰願無讓曰始生與兄之來舉進士得絀及綴字為便口之句歴贄其文於公卿之門由是一嵗而名八年成都貢士生名在貢首九年生與其兄試貢京兆京兆籍貢名生名為亞首生之兄亦在列下十年禮部第士生名在甲乙如是而後歸亞之以為相如還蜀之榮而生未厚也送受降城使序清河張生少以善言語應對聞長又好六符神畧嘗從竒丈夫游至北邊歴塞經受降城以宗人䝉幸於上將軍受降城扼塞得與方鎮列方鎮諸侯時節更置其使通殷勤生以善言語故遂得居使者位今年夏生使於夏得其歡而還夫以節度尚書公専聲重義為天下望者重目故四方使其來者難如此不必言受降城之上將軍之善應對不辱於此而見其不辱也不必言尚書公専聲重義於此而見其専重也六月壬子尚書公餞使者於陽平樓命幕府賓佐相與追詩以為贈不以亞之為不知言者皆願以亞之言為首敘草書送山人王傳乂夫匠心於浩茫之間為其為者必由意氣所感然後能啟其象也此凡一舉志則爾而况六藝之倫乎余聞之學者曰昔張旭善草書出見公孫大娘舞劔器渾脫皷吹既作言能使孤蓬自振驚沙坐飛而旭歸為之書則非常矣斯意氣之感歟今山人王𫝊乂學為旭書居故吳公子光劍池山傍積十年而功就歴游天下慕其出已者師之欲增其功也及至長安舍余家為余題故平盧節士文因感之聳髮寒肌謂吾友生曰願欲余敘其書意者豈余之文以感王生之志於皷噪劔氣之志乎顧不敏誠以孤生之望也聊題百數十言以塞其志送洪遜師序自佛行中國已來國人為緇衣之學多幾與儒等然其師弟子之禮傳為嚴専到於今世益則儒道少衰不能與之等矣於其流亦有派别焉為之師者量其性之髙下而有授說故有瞑坐而短行毁刑而皷談之道岐於是也十一年春予東上㑹稽還造江有緇衣洪遜從余假渡自言能贊導佛語嘗與其曹羣居講誦恒為宿輩推信他日復來言當之闗中欲余以序之夫西都輻集之地居多豪緇得進於上前者車服之饒擬於卿士而遜得無欲乎在自勉而巳余不知佛故序無以備汝曹之事行勉贈尅躬先生士之冠髮就履莫不多善以自襲必泉好惡於其裏好惡形則利害隟而其明一悞所燭習識之惟與生相老矣而幼善亦違也惟尅躬慎惑為能多即之故曰尅躬敬事則道容以尅人則偷尅躬而擇行不諛者處濁則清居族則睦結友則義字俗則化折獄則不濫夫𤣥黄之滋不能混玉之素尅躬之志幹以潔故處濁而能清愉􅈔之私不能玩於禮尅躬之氣和而莊故居族而終睦稼穡之報不終負於勤尅躬之行誠輸而勞先故結友而能義河谷之湍不能返流而倒注尅躬之令重本而道常故字俗而能化䝉鑒之垢不固㸃於磨尅躬之辨窮思極明故折獄而無濫若是者非勤道孜孜則多易違也或問於力行之先生曰善可遷而可無悔乎對曰吾何敢誣尅躬自塞而已先生姓崔氏字夏封生於唐臣子五代居官則克慮以事事假牧於巴梁其民生祀之處則克力以倉居於河濟之沂其友交給而助之既跡既明賢者稱之矣他日生往邠侯之命余贈而勉之曰艅艎之舟腹萬斛而不盈浮波而馳終嵗而不息載之者穫於馳耳及厭風水之適安於所留曷與一敖之庾等雖坎坎循環之輪猶羞其止也顧潔狂之誠能思即哲居哲忘思則狂盖古者勉不息之勤言也先生其終勉諸沈下賢集巻九
