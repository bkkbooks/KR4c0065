  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0065_WYG_007-1a, image: WYG1079/WYG1079-0035a.png}
body:
  text: 沈下賢集卷七唐沈亞之撰書上冡官書亞之伏念傑木之生大長越倫足谷肩山而大谷不足以業其根長霓不足以帷其華天之所借其體若此豈不使皆獲其所安而輳乎用及其未偶也徒見摧雪枯霜䝉烟老雲而已夫尋常之材也幹不丈而枝不尺而葉縱其根不饒􅀈土之膚生不十年各獲斤斧之制以就用何者受乎庶氣故易長於極成為衆用故易售於工其在松栢扶榮意自得仰視傑木不見其末相與笑其凡枿而無用及一旦遭遇得升賢工之所思採而飾之跨於楚而百棟賴負若是脩枝巨幹未易自致也賢士良匠未易能容也今閤下抱多能之强徳動與智諧可謂遭時也負難載重横於所安可謂得任也如能察出類之材異日處之然後次衆材備於百當如此則賢工之名可以自有古者賢士之居位也沐垢不終湯充饑不竟飯中輟而起畏日不足是皆採訪於衆能思致其爵養良士之道也今則不然為公卿大臣者必嚴居深視以自重養其所進者唯柔氣緩言瞽視而巧諛然後謂之厚徳故以多識為誣博知為狂遷善為流斷節為詐是皆斥而莫得稱也及一日操尺墨樞物機茫乎不知其所從使左右庸胥因得侮而役之彼非不欲自勝也盖事業之所報固然今西戎邀嫁移兵冦邊仍嵗不巳山東盜卒殺辱首吏未聞其歸誠可嗟也即如主上求其往而為理者閤下度之公卿大臣而誰擇乎亞之誠不肖也七嵗再官不逾九品之列陶心研慮謨古臣知輔之所以為化至於樂能慕哲亡其私而不回此則得之於性矣酌巖賢旅聖之所以立賢至於書得失備理亂敘往紀來此則得之於文矣學名將霸師之所以整暴亂至於奮旅陣師㑹百變之狀離如驚鳥合如凝雲此則得之於師矣是三者皆業於根然後緒其末非無所望也亦思願為一從材戴宏傑之梁立巨礎之上顧世之持斧之士安足以摹哉亞之聞戎鏡包陽當日而矚之則能延燧興火處陰而視之何異一規之幽銅耶而誰寤者夫氣應則生亞之亦䝉矚於光下以發所抱書詞多鄙又不盡志忤觸清嚴罪無所逭謹再拜上李諫議書月日將仕郎守祕書省正字沈亞之再拜貢書諫議閤下亞之常有混類之悲不能自置其拙也甚矣故祥禽之類凡羽而凡羽混之非獨混之而巳亦且掩其芳而奪其美何則善寡而凡多故也况世俗之耳幾能於此而别白之者寒暑易轉是皆非金石安能自永於時哉一失其顧以為類混則終從風雨而老矣可不痛之輒假所喻願賜終說幸甚楚王之鼎食十有餘年而王體不肥左右者懼王曰膳者不能味吾之鼎也國人亦曰膳者不能味王之鼎也更逐膳者凡十輩益不味王恥乃令國中曰有能使吾鼎之味調和以安吾體者寡人爵之三公楚里之處士賢聞之應令而起耆老屬袖而送之曰往矣即鼎也然王曰仰味於君君何以塞之對曰王必以鼎授我我力甚優夫治鼎之職約水燥薪㸑火以觀文武之用而巳其輳味則有椒桂梅醯鹽醢之品在吾總衆力而調於心此其功也王之體不肥何待楚老曰斯固也夫真偽雜鬻循户而啼祈其售者偽得十九焉是椒桂之質類而馨辛不為也梅醯之質類而苦酸不為也鹽醢之質類而醴鹹不為也皆具而不為滋一旦集而㑹之鼎則必虚空矣君焉能總是之力以成於王耶前膳之所以得逐者由庶品之任非其任歟然則君之明足以察偽惑君之智足以區物情誠能儲其真蓄其當以給其用則從之辛馨之才醯醢之具必越海逾陸而趨君之㫖矣斯百代之凖也豈但肥楚王之體然今閤下既以游泳道徳蓄儲助味之具必有素也然紛紛之真偽而清悟能不勞乎小子誠不足奉應對不得謁見久矣幸因從左右者召稍延於前獲進所語幸甚伏惟降察不忽謹再拜與薛浙東書再拜後還坐賓舍中有小吏突如其來其語曰帛十匹吏置帛書於亞之前曰閤下所以貺客也其敬之誠則厚矣然有所未滿者敢為閤下道之夫虬能興水濟物故佐天如臣草木仰其澤苗方秀而望其誠有乏一日之雨而不及其實者則仰告斯臣以求得一日足矣若纔潤於枯槁則已且猶將困之今亞之往復道路三千餘里顒顒之誠於苗之旱甚矣而千鍾之祿於水之用又大焉亦何惜一日之澤而不給其涸哉亞之狂愚當其困涸不知所為而復枯苗仰澤之說再敢煩告且閤下寧能不憐之亞之再拜上夀州李大夫書十一年秋作昔者燕昭以千金市駿骨而百代稱之非直朽骨之可貴也意必在將來之良而已矣今亞之仰閤下之風而進於前恭聞閤下又不以朽鈍而顧之寧鄙人之宜顧也其名得無將來乎是鄙人之價冒千金也幸甚幸甚今有傍徨之誠敢露肝膽伏惟聽察之亞之前應貢在京師而長幼骨肉萍居於吳無咫尺地之居以自託其食給旦營其晝晝營其暮如是凡三黜禮部得黜輒歸自二月至十一月晨馳暮走使僕馬不以恙即且碌碌如有一日霜露得欺氣體失理則一室向門之心無望矣今忘辛勤之榮扶挈長幼丐食而西雖已及埇口然猶困其所儲不能自給但涕泣語空無有所仰又度天下王公希可以此言告者乃閤下耳伏惟分一日之澤以濡之無使亞之復為朽骨所笑謹再拜與福州使主徐中丞第一書九月十日都團練副使沈亞之謹再拜狀所願陳于閤下某伏念從古以來懐其所為抱其所用者非知已之進無能自揚也自咎繇之䝉舉顔回七十子之䝉范叔之䝉鮑叔之推至於今知已之功相嗣而不絶非有文字之紀其功雖如前數士而後代無聞也可不惜諸往者某始得以文謁閤下於吳之嘉興明日權幼公謂某閤下言吾見古史者亞之也其後涉於仕路困則遭恩其知如此且以閤下居為世之端表故衆影依之言為世之典謨故衆聽傾之其重如此使一遊其門則天付以幸也而况知而推之哉提而用之哉然亦懼不申於文字而後代莫覩是以前者敢以先人所業之書上干清鑒求其筆為之光以揚於幽故而為後代寵奉獻之日惕怳咽然不能周露誠以黷矣伏願憐其繼志之心使輝華裔裔著於百代雖大寵何以加於此焉伏惟俯賜終筆書辭再陳無任惕汗謹再拜第二書二月二十八日都團練副使沈亞之拜書復獻大使中丞閤下亞之昨與二三子同途晨問起居指教所謂薄疾未除將欲有請草奏具示始則卒然愕窒不知詞對及退舍伏念閤下之所苦者惟中年之士十九而有之未嘗聞以此而去告閤下惟不為出入宴遊耳其餘決教益理膳息無減况方在强茂之時徒以小恙暫留膚中乃欲為吿以自遂豈當宜也且今時仕俗守榮路者雖已朽老支扶昏怳矣然則固其所居惟恐有損如此者亦八九而閤下瞭然自悟所向若此得無獨清之累猜疾於彼人之胷中哉閤下骨肉交姻如有逺萬里者即聞是請寧知其退讓也必且疑驚隠慮莫能自浣設使憂能侵人閤下何以解也亞之見識孱淺無足以奉請事今極慮深陳於前誠願得於中庸使人無加口語也非敢憑縁取領厚祿而終斯說伏惟稍變髙明之鋭以周慮之冒陳端白何任恐懼伏惟憐之第三書二月十一日都團練副使沈亞之拜書遣獻中丞閤下昨日候吏自外來急吿以赦至亞之誡前後左右不得常步及下馬就次揖謁先聖獨張侍御不領祗言哮呼詬此捽拽導將移罵侵怒俚言攻凌不容須臾之間以黨畀證攘掉呀騰如欲見食自羣官衆將至於聚立者咸聞見其麄聲奮態圜來驚視誠以亞之樗鉛之材處不當任可逃遭此衆辱宜矣然誠恐積暴不除異日酒塲恃醉率肆所為又為侵作誣言飛入清聽以是寒心自悲不能無患亞之幸䝉過意提在賓堦雖無分銖之能以事萬一然誓將鞭勵孱謹以効終身伏願哀其端拙察以無辜稍借光明使各得分限免其侵迫過此之虞餘何敢請伏惟加察幸甚幸甚謹再拜與李給事薦士書十年春作日月新及第進士沈亞之謹拜稽首給事閤下亞之幼學見其往記說曾參閔子騫之孝至於跬步不忘雖騃幼亦能蹴然内慕自是常思其人有能跂曾參閔子騫之行者即往傳其名於親戚朋友卿大夫間使其聲不滅昔者五年亞之以進士入貢至京師與其等清河張宗顔比居嘗與往來言始愛其人無遊詞至春宗顔去還家久聞其親喪又明年亞之東歸至洛聞洛人稱宗顔之孝曰宗顔貧無以事喪乃與其兄東下至汴出操契書奴裝自賣聞者皆慟感流涕然盈月不得售汴帥聞之持百縑使弔勞歸之盡發其先故羇柩歸𦵏於所是嵗亞之至彭城日話其事彭城人曰此吾里之客子也八九嵗時喪私親貧不能奉飯唅迺繫木為車與其兄自輓而送吾里謡之曰拖車郎是今曾閔之行難而里閭盡熟亞之竊痛賢公卿未得稱其如此伏惟閤下於異行尤能鋭樂故亞之敢以宗顔之事為請伏惟訪察之幸不黙黙已也沈下賢集巻七欽定四庫全書沈下賢集卷八唐沈亞之撰書與潞鄜州書六年夏作日月沈亞之再拜稽首言大夫閤下亞之昨去長安時歴别於所知親門所知親友謂亞之曰安所適安所為亞之對曰適鄜將假貸於諸侯門所知親友賀亞之曰鄜有長賢大夫也喜文學仁義之道故其所為文學仁義之道忻忻焉走其門者日有之亞之納喜於心充充焉捶馬走僕忘其勞失其怠望閤下之境日近
