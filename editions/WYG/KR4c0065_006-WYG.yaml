front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0065_WYG_006-1a, image: WYG1079/WYG1079-0030a.png}
body:
  text: 沈下賢集巻六唐沈亞之撰記櫟陽縣丞小㕔記便署所以接賓也櫟陽岐諸陵走左輔蒲太原燕趙魏山東至於匈奴雜虜之道而諸侯使者及戎王聘遺之臣交馳出是無虚日而邑頗瘠於擾費然而遊宦客子出入往來者則公賓為寡也夕館而晝饌自宰丞尉簿或不能支於給饋而賓去嘗悒悒不快長慶初燕趙魏侯者失理卒亂辱殺之更自立新帥大臣皆進意請討圜其境之諸侯咸㑹兵襲戰飛蹄走轡之奏傳呼相追而又降嫁匈奴中故使者益至若是宜謂私賓不能加也然又遣使陳蔡許滑大梁彭城皆發卒戍河北督責米帛於兩江之間使百郡所輓無西入由是天子之使入潼闗者日數十輩大者乗馬至百小者不下十餘郵馬盡死於道凡往來乗馬畜者無問其誰皆奪之故遊宦客子俱凑道櫟陽中計其衆寡復與公賓之數相髙矣是時櫟陽城當公主降匈奴使迎者之部千人天子使後宫貴御行餞於道侍嫁大臣從官衞士亦數千人夕頓田氏遣承奉供具以不能擾民一縣之吏稱善辦及歸乃計曰夫遊賓四時之來獨夏其為稀耳我且與理一署使其密温禮以待之然後以為家之給與賓僕相等是寧有忿賓哉既以賓之來者視其館之窮罄雖勇寒猛餒必抱愧自饜於所饗嗟乎隆否之跡由夫履也其構在公堂之左正寢西南隅其形類廂二間覆厦於南陲其就在長慶元年八月甲子也解縣令㕔壁記國家誅叛以來於今十年征徭息繁不勝於籍租𣙜之法居間為民起横縣令不得専以子養之化理之蒲鹽田居解邑下嵗出利流給雍洛二都三十郡其所㑹貿皆天子豪商猾估而奸吏踵起則解之為縣益不能等於他縣矣鹽田主官用郎吏其佐賦下不出御史操法繩縻十九闗於縣令而不得専但奉府曹侯長之教而已鹽田細吏皆縣民其田園雖業籍於縣而令不得親但以縣民之衆馭之而已若是為令與尤悔日争焉苟非智良不能日脫於横今令者余之從祖也且滿嵗而尤不及豈其厚於智乎而又招亡民還業者數百至于公堂便館葺飾者凡十餘構工不勞民又何多方也長慶二年余客其地因受命而著記云著一作書櫟陽兵法尉㕔記尉之曹兵法居末兵法之任在天下郡首長之臣且難其理而况畿之在尉乎櫟陽其瘠沃相半豪户寒農之居三分以計而豪有二焉其父子昆弟皆卒名南北東西軍圜衞雜幸之恃或籍書從事星臺藥局織館雕坊禽兒膳者之附而又勝女拏據反為之盤絡是多類者非獨不得為縣民之衆馭之而已亦且馮縁蔓横以業吞漁獄之所操動繫於此而禁局强曹垂攀於前援者持符以解之固能移情以二法使終決不必理從髙綴下相承而邪而不能竟者尤還於尉其受役唯單産孱民月徵之一人輸徑宫門至於内廡逓漏嚴夜給事諸主家及園池大廏皆校尉遺之豈尉之無慮也永貞前諸畿自進士而得尉而昇班者十六七他入之尉而昇者百一二是尉皆摩心清視以事察决用以此自價朝之未以此市若是今雖統曹不能强尉於無當近世恩臣負幸惡其踵進自致即白上約下以為尉未足拜且塞譽排能使昇班之恩必有自令視尉之風益賤而今益輕矣由觀為尉者俛俛自度民之吞者肆其懲弱者甘其困姦者隟其欺邑是者畏其為尤屬而決之其兵法之源使無撓濁其易乎哉其易乎哉古者盤盂有書盍誡其當器受量不陷也鐘磬必銘朂其全聲有待也鑄鼎記刑子産之為也尉也兵法之曹類此不復矣敢不有記故附署而屬誡焉移佛記元和四年三月五日杭州報恩寺長老與其鄉閭父子將徙故佛像歸復於其寺佛至乃饗長老使白其由於亞之而求詳錄焉沈子曰西域之有神教流於東域中者其教像法其法者名曰佛自稱曰天人師又曰世尊出其言亦曰經驗其經之說佛去世而後模其形焉像其真與衆瞻仰之故法之言像由斯也其或範金鐵以為之合土木以為之堅之以脂膠飾之以丹漆五色然後形神儼然成其像舉其數體有為尊而坐者有為卑而拱立者有跪而如受教諭者有執樂而弦者吹者有具其形怪荷戈而勉强者有瞋目咤叱者摸鬼神焉此為像之外者也其性之㫖為戒慎正邪去惡為濟渡力道盲聾警沈溺使民無不善如我仁誼慈惠然此為像之内者也又說有已來之生來生之後為福則福應為禍則禍應因縁化而設其㫖或由是舉域大敬自天子達於庶人一信佛之來於今八百餘年矣其間亦時神怪焉先天中其寺之佛事具足如向之稱者無何水火災生民流沈溺於是邦其寺之佛事卑而拱立者跪如受教諭者執樂而弦者吹者衞而荷戈叱咤者皆毁也散其宇皆落唯尊而坐者獨巋焉而存由是納去又重其莊敬焉數嵗其鄉人後生敵惡者十誡其三四故此鄉之人思其功力復求而歸之與其敵惡誡而敬順之道明矣嗟乎忠信仁誼不舒信于人乆矣而皆以已生來生之後因縁禍福之說化行焉今余因長老請余記移佛之由遂得道教之所以意者欲使羣生隨其機以悟之其機髙者其性惠見其内像而内覺發其心而能至其正其機下者其性回見其外變而外覺反其心而後歸其正是故精麄其内外之像以陳之謫掾江齋記謫掾沈亞之廨居負江方葦為墻正於隄防之下堂序四闢巽隅道門雖心風奔怒鷗瀁鷺澡顧簷廡之間而拏緒不發方署即盡提枕簟假庥於弗域之中雖淄衣煩厭乃陽為不省也一日謀解其西廂將面水以敞之而筆吏王局前語之曰掾俸簞而食或不能給尚能及堂室之為乎且廨宇非乆託即更之得不為尤乎况葦茅之葺輕弱易腐人人動歴嵗時寧任再滿所用直使罄裝併食以為之無所顧則郢壊阜磔而澤遊木生多不能材漢流聳急束栰寡止縱有必修巨重價又不當是用曷若無易其故與亞之曰誠爾也然則吾以為肝者膽附庸其中為棲魂之館故能専視而佐意隨姿而起情今漢流右吾之居不過數步壅擁之患不得日覩由隣顔冉而不親其徳也吾何能薄其實而厚其浮哉遂召工人庸人茅塗之者與寄之磨淄洗故得充用者十五太守聞之與其薪十四其餘則搜剪補輔然後配材就構雖紅短不委各輻凑以任一棟七桎助枑楣二桶覆厦狹廡重左而單右若翅之將翔然蕉旗竹篲分植叢列為箒風篩月之餌方檻短折面江虚波炳嶂委霞影對綵紅碧幟拾奔給于所曯逺邇髙卑龍苦交黨為宵清曉爽之借暴隂色蒸雷扇蹈震神冶鼓焰如金縆騰樛趠䋴䎀干聿切為颭燭揮鋩之駭蓊然頽雲若然漏曜倐閃態狀若笑若怒相為端緒馮坐之中足以自廣時大和五年五月十九日也杭州塲壁記國家始以輸邊事塞不足於用遂以鹽鐵𣙜估為助使吏分曹計其入於郡縣近利之地得為院鹽塲之署以差髙下之等顧杭州雖一塲耳然則南派巨流走閩禺甌越之賓貨而鹽魚大估所來交㑹每嵗官入三十六萬千計近嵗淮河之間頗聞其費自是汲利之官益重矣前年京兆韋子諒官始縣主簿有能名及秩謝當歸是時尚書職方郎崔稜為揚子留後使聞其行遂邀署之既到滿嵗利𣙜大登吏無敢怠與其縣主簿加勤也或謂亞之學史詞無苟故用是記焉復戒業寺記皇都左輔其屬縣朝邑縣令王鄆言能改作便民當有緇衣遷寺戒業民不便鄆復之初蒲冦李懐光既虜其屬將收其散卒聚之長春宫城圜朝邑室廬皆殘燼寺守益毁其後緇衣以為居近郭苦遊賓乃聚黨與謀遷之西堈縈垣侵社地又治殿廡諸墓墳隴當其下者輒平去是時鄆為尉固止之緇衣之魁得他吏與交通為助故尉終不能制日縱其徒於民間為禍福語以動惑之民無老幼男女争相率以奉所欲顧畏已後耳及鄆為令乃元和七年也明年召緇衣宿老師弟子與語曰緇衣之道非能逾仁誼以無害故天子許留國中前者緇衣無狀徙其居西堈之上侵社地壊丘隴夫社國之尊祭也丘塚人之反本也今而曹自為其居侵壊之是寧無害耶某昔争之不得身常慄慄抱痛願得自劾以快意今能亟復之幸善不能亦且論繫矣民聞之皆大喜故以其年十一月悉還其故九年余東適邯鄲走蒲闗朝邑令為具既酣前奉酒於余因請以其事次于文東渭橋給納使新㕔記渭水東附河輸流委迤於帝垣之後倚垣而跨為梁者三名分中東西天廩居最東内淮江之粟而羣曹百衞於是仰給唯平輕重之准為難即主官不職其咎何如哉長慶中得儒臣杜生以行御史主之能謹法整吏絶輕重出入之尤明量信敘無先貴後賤之弊故官曹士衞之所仰給者如取之家食焉居再嵗加為外郎因指其署曰夫渭津傍控甸邑諸陵道左輔出入河東藩而公賓遊士過必臨我我儒世家也宜飾宇俟賢以誠其敬今公齋陋冗無足為禮於是盡去之募市其傑棟巨楹文梁勁桷既已具構顧其中可敘百榻而儒良至者必與講談其道隨其能否而梯級之得乆留其下者雖孱車弊衣則名日彰矣今觀渭津之剏開署宇為嚴虚廣敞意者得無欲天下之士見其胷中之曠大乎沈下賢集卷六
