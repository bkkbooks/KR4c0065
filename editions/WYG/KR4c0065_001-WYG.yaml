body:
  text: 夢遊仙賦余昔一夢寓遊一方樂態甚適覺而作賦題之夢遊仙其詞曰杳漠漠兮昇絶垠雲轡九天兮越崇門星凌曉以淡白瀾咽潾於錦礫石榴笑而織娥喜閽導余而就將止襲烈蕙之芳風送麗音於遼耳目恣邁而多適吾超超其樂此銀墉兮桂廂差瑶階兮上玉堂卷紅幕以𤼵繡户中有人兮結清處語嫣延兮情綽撦命余蔭于蘭之厦迴穠顔以一顧矕嬌眸而融冶烟津兮玉盤火桂兮炮鸞鼎娥司味和苦酸嬴吹既調戛湘絃合我飲食兮樂吾後園乃稱詩曰白日低兮春塘滿紅華芳兮草芽短菱結帶兮荇含絲設遨遊兮導佳期又詩曰穠光醉兮昏綿綿焉與久樂萬年春留連兮其未央吐芳意於荃言忽𤼵寤以無覩魂迷念兮情牽既諒人生之皆夢孰云夕非而晝是馳詠想之悠悠兮軸吾情於萬里柘枝舞賦并序往者某值宴於鄭衞之侯坐與客序樂作堂下行舞男女紛雜交貫率以百品而觀者盖􅝇然既罷昇鼓堂上筵吹大奏命為柘枝舞則皆排目矢座客曰今自有土之樂舞堂上者唯胡部與焉而柘枝益肆于態誠足以賦其容也因顧余緒之以洗客念賦曰昔神祖之克戎賓雜舞以混㑹柘枝信其多妍兮命佳人以繼態撼隆冠之繁珂兮披文纓于大帶跪閃舉以揮獝兮拖旋襟之䄡曳騖遊思於情杳兮注光波于穠睇顧巧度之無窮兮將多變而若雲揚厲唱於鼉鼓兮儼蘭露之芳津汨傍俯以裊影兮蕩風蕖於横茵愕兮若驚弛兮若嬾歘然逴姹翔然嫣偃婉振修袖以抛拂兮韜纎肱以糅綰差重錦之華衣俟終歌而薄袒既而抑倚昂􅀈蹈節振臂驅㨗蹀以捉碎盡戎儀於弱媚見孫律於武姓入西河之劔氣曲響未遒邊風襲吹聞代馬之清嘶𤼵言禽於詠類客曰若此之狀也以鄭衞而前陳吾固知其將墜古山水障賦和史館陳學士作挹清臣之嘉思兮信疎子以峭孤迴補籍之暇筆兮賦他山於遺圖擲琨瑶於呐口兮若含采以咀蘭惟古工之包化兮啓羣峯於無間勢蹙巘以特起牙騰排而上干翠參差以玉立俱疎疎以攢攢於是澒以長瀾森以怪木瑟汨慄飀凄煩蕩燠浸平繚於楚澤冶妖韶於陽谷低霾横瞑兮陳半腹夢雨神雲兮澹而不歸怨撦惹乎巖曲縹蘚青籬兮事幽澁細澗綿流兮洄噴噎山之人兮夕忘寐而坐忘興帷紺枝兮帶黄葛暖草被崖兮垂緑髮翺鸞翔翠相追征兮振錦舒繡錯以明兮啼羈酸雌裂眥吻兮風呺穴怒寥而辭兮山中之木何凋榮兮詩虎丘山真娘墓金釵淪劔壑兹地似花臺油壁何人值錢塘度曲哀翠餘長染柳香重欲薰梅但道行雲去應隨魂夢來春詞酬元微之黄鶯啼時春日髙紅芳𤼵盡井邊桃美人手暖裁衣易片片輕花落剪刀題候仙亭新剏仙亭覆石壇雕梁峻宇入雲端嶺北嘯猿髙枕聽湖南山色巻簾看答殷堯藩贈罷涇原記室勞君輟雅話聽說事疆場提筆從征虜飛書始伏羌河流辭馬嶺節卧聽龍驤孤負平生劔空憐射斗光五月六日𤼵石頭城步望前船示舍弟兼寄侯郎客子去淮陽逶迤别夢長水闗開夜鎖霧棹起雲凉烟月期同賞風波忽異行隠山曾撼櫓轉瀨指遥檣蒲葉剪刀綠筠筒楚粽香因書報司逺為我憶檀郎别龎子肅自為應仙才丹砂鍊幾迴山秋夢桂樹月曉憶瑶臺雨雪依巖避烟雲逐步開今朝龍仗去早晩鶴書來春色滿皇州何處春輝好偏宜在雍州花明夾城道柳暗曲江頭風軟遊絲重光融瑞氣浮鬭雞憐短草乳燕傍髙樓繡轂盈香陌新泉溢御溝迴看日欲暮還騎似川流宿白馬津寄冦立客思聽蛩嗟秋懐似亂砂劔頭懸日影蠅鼻落燈花天外歸鴻斷漳南别路賒聞君同旅舍幾得夢還家汴州船行賦岸傍所見古木曉蒼蒼秋林拂岸香露珠蟲網細金縷兎絲長秋浪時迴沬驚鱗乍觸航蓬烟拈緑線棘實綴紅囊亂穗揺鼯尾出根掛鳳腸􅂓持一濯足誰道比滄浪送文頴上人遊天台露花浮翠瓦鮮思起芳叢此際斷客夢况復别志公既歴天台去言過赤城東莫說人間事﨑嶇塵土中宿後自華陽行次昭應寄王直方重歸能幾日物意早如春暖色先驪岫寒聲别雁羣川光如戲劔帆態似翔雲為報東園蝶南枝日巳曛題海榴樹呈八叔大人曾在蓬壺伴衆仙文章枝葉五雲邊幾時奉宴瑶臺下何日移榮玉砌前染日裁霞假雨露凌寒送暖占風烟應笑强言河畔柳逢波隨浪逐張騫送龎子肅三年遊宦也迷津馬困長安九陌塵都作無成不歸去古來妻嫂笑蘇秦西藩請謁廟肅肅層城裏巍巍祖廟清聖恩覃布濩異域獻精誠冠盖分行列戎夷辨姓名禮終齊百拜心潔表忠貞瑞靄千重色簫韶九奏聲仗移迎日轉旌動逐風輕體運威儀正年推俎豆盈不才慙聖澤空此望華纓勤政樓下觀百官獻夀御氣黄花節臨軒紫陌頭早陽生彩仗霽色入仙樓獻夀皆鴛鷺瞻天在冕旒菊罇開九日鳳厯啓千秋樂闋祥烟起杯酣瑞影收年年歌舞夕此地慶皇休山出雲片雲朝出岫孤色迥難親盖小辭山早根輕觸石新飄揚經緑野明麗照青春拂樹疑舒葉臨江似結鱗從龍方有感捧日豈無因看助為霖去恩沾雨露均曲江亭望慈恩杏花𤼵曲臺晴望好近接梵王家十畆開金地千株𤼵杏花帶雲猶誤雪映日欲欺霞紫陌傳香逺紅泉落影斜園中春尚早亭上路非賒芳景偏堪賞其如積嵗華村居無樹巢宿鳥無酒共客醉月上蟬韻殘梧桐陰繞地獨出村舍門吟劇微風起蕭蕭蘆荻叢叫嘯如山鬼應縁我憔悴為我哭秋思沈下賢集巻一
