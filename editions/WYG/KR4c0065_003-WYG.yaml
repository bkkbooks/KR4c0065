body:
  text: 沈下賢集卷三唐沈亞之撰雜著夏平夏之為郡南走雍千五十里涉流沙以阻河地當朔方名其郡曰朔方其四時之辰夭暑而延冬其人毅其風烈其氣威而厲易憤而難平夫其難平之狀在陽為悖在陰為佷悖為不平者在上暴横而為也在下殘寃而為也佷為不平者在上蔽惑而為也在下憤激而為也元和初夏之節度韓將軍入覲其甥楊琳為之後以兵叛天子命將軍演代之既至盡殺其屬將曲直者無别罪併俘其家姊弟妻子乃以其善貌擇而入其餘均賞麾下騎士皆得肆辱汚明年拜右衞李將軍愿為尚書出代演為政至其城察民氣色不得平迺留意於察果得之即令曰天子愍不辜久而命四方為政執事觀察之夫楊琳叛脅其良人良人以骨肉妻子故不能得止又不能即死制巳在人今皆以是罪戮之矣其姊弟妻子當免者不宜復蓄汙且又皆良人子等類耳寧幸如是乎今盡籍出之無得隠吏更察敢有如是者斬於是尚書愿迺以畜馬為則詶得所虜者相當其直其人皆死志積寃憤既出即豁其所蓄道路呼聲四逸有感憤不勝於心者則仰而號俯而踊退而變為喜而舞謡其徳其聲雜調齊感如是連日改旬而後巳是則條理其政如此其氣復為悖邪夏之屬土廣長幾千里皆流沙屬民皆雜虜虜之多曰党項相聚為落於野曰部落其所業無農桑事事畜馬牛羊槖駝廣徳元中其部落先党項與其類意能氣不等因聚黨為兵相伐强者有其馬牛羊槖駝其後支屬更酬殺輾轉六七十年莫能禁道路殺掠以為常華迫貨馬牛羊槖駝者貨已輒以壯騎從㨗道伺險擊華民華民脫死者幾希矣尚書公既按察部落盡知其猾大者死小者盟又令曰今盟已敢有叛者滅之其後有人貨得一馬厚價善氣駭而逸亡其所就月餘奔歴數帳異逐之又至一帳帳之老乃相與執而詣公居請曰有馬逸來莫知其所由自後更嵗故亡馬者復得之是則整頓其弊如此其氣復能為佷耶夫政之不明則平不得施於氣笑色語法之不清則平不得信於市貨理化昔者周公之為政處於相則天下平處於東則一方平今夏北一方也得其平如此豈在位者而知周公之道耶乃籍所以于篇以明善理云爾旌故平盧軍節士郭昈郭航本不同俗家皆家平盧軍昈父珍岑舉進士與權皋著作同上第天寳末燕人叛雖以戮自是而齊趙之間頗聞其强矣昈既壯能習先人所業復舉進士時權相國為吏部尚書其所立欲擢之及聞家居非地即罷選歸而亦為師古所辟昈與故勃海人髙鉥為等伍師古死師道代之復用鉥昈為從事有頃常山帥卒其卒請嗣帥未得命師道亦遣甲卒萬人北渡河屯太原以為顧望鉥昈相與議語謂燕蔡之侯初封欲令師道先之為朝省以樹大功乃說曰傭有操鋤為人治稼者能勤榖滅稂嵗得均穡至於傭子既専地自入其伍益相辦助或謂之語曰田人百畆成而餉之直幾半足以飽三冬之腹至於所取非任賴主人土廣且寛之則曰可苟設一旦篤其不奉亦奪矣是屬固不殍矣此借言于家人尚爾况傭於天子乎今河北之傭方責其専田君侯寧可以假非於不理者誠能此時因經圖以盡入其地親謁闕下則君侯之功莫可與等保餉世世雖孱孫亦終不奪豈不偉哉夫舉食於人當飢渴之望也一飯千金未足者不能十金及飫而進於前雖海陸備鼎顧與糠籺齒尚何所酬願君侯省之無為人後事將行左右者更沮之曰猛虎所以使物畏而不敢犯者以能威自居也故盤林横谷奮睛以拏怒掉尾以倚嘯厭食於熊豕麏麚之肉及棄其所長而欲弭耳委首以待餒是知命縣于執者之手雖塵兒得以狎而搏雖欲申步於咫尺安得自遂也今公捨自食而就待餒其後亦能無恨乎孰為公計其事於是師道果大悔遂殺髙鉥而昈以能善人左右開之故得無殺幽於蔡之鄙縣使人守其門親屬通往來輒籍署更十餘嵗當元和九年蔡帥少陽死其子元濟欲以有父之地請於天子天子怒發兵圍之既急師道亦悖乃陰為之助明年秋師道兵萬餘東冦彭城入蕭豐沛且敗而還因艱四境出入者月餘昈乃為練繒書緘之絮帑如顆遣航持詣彭城請其帥願得上奏將行執航手曰努力慎勿洩書不吾名盖假齊人劉諒耳非見帥無得言吾書者航至彭城宗人運為武寧虞候都使始航欲舍之㑹運將兵出定豐未還航直詣賓府見郭行餘因曰航母之姊子劉諒有帛書奏記陳叛兵者山川曲折之狀願見將軍行餘得之喜悅起告其帥航見帥獨謂帥曰書郭昈為之畏洩故假劉諒劉諒者師道所信之吏也遂發書書詞云願以兵三千人出滄州用戈船浮海萊淄之上此時海不備所處皆罪人謫吏無所與豎遂與上奏於是天子遣吿彭城帥知之帥以為非昈書疑師道為之以相詿誤故航歸不得書報獨告以信語航不敢復故道道迴逺凡數千里乃及昈所處未見昈且為師道所召既行與昈兄子會於道因竊謂曰今者航無狀受召豈前事之露耶且露航獨死終無所敗無憂也昈聞之幾自引死航令萊人嘗以氣敢聞於平盧軍及師道欲叛盡縻絡敢士故航在召中初航不知其召之所以也意謂知前謀竟憂死明年元濟誅又明年師道反詔遣大梁楚彭城蔡許滑魏之師合而四入於是彭城軍下魚臺入金鄉楚軍圍海取其二縣大梁軍攻考城得之滑蔡許共拔斗門至臨濮魏軍渡楊流占東阿再戰涉商屯鄆西六十里近最近賊賊益敗故師道遣右將軍劉晤將握前後兵三十萬人出當魏魏兵日急晤晤亦為師道所篤乃歸斬師道盡以鄆城降得拜為滑帥在十四年二月乙亥也髙鉥以前著跡追為尚書盖言寵之昈得以外郎為滑從事詔令行餘為記室行餘與昈會於河闗之間昈謂行餘曰昈前者使航馳帛奏至彭城聞其還不聞其問今已死矣君知其請乎行餘曰請者云何昈猶能盡語章中之詞矣行餘曰果然嗚呼航竟死矣莫有聞者嗟乎十四年余與李褒劉濛宿白馬津俱聞之於郭記室明日復皆如濟北濟北之人盡能言昈之節故悉以論著將請于史氏云萬勝岡新城錄元和九年蔡之帥死其子元濟以其土叛逸掠陳汝之間冬縱兵臨夀春屠馬塘走其守令狐通焚霍丘淮南郡邑大駭民人卷席而居上聞之怒謫其守明年春詔執金吾李將軍馳𫝊出守之既至收其壊卒聚夀春城使人勞井閭而市貨耕桑之業始復民人莫知復為戰矣八月乙巳夜引兵南出霍丘百四十里又折而西四十里營於萬勝岡築新城初將度曰吾士卒萍合之衆也易散而難役吾以築壘令之必苦難使寇聞之必襲吾思欲其自用乃召諸將謂曰吾旦夕望氣其狀有寇謹備之令諸軍分營連居環迴之間十有餘里各視營之所向宜為數堵之垣以禦暴矢耳諸將數竒將軍言歸而亟曉其卒故所命立就將軍與監軍使出周視之還至武寧大稱築者之能勞以酒帛語寵其將因曰既已幸周繚之善也他將恥其功之不類乃復興即日而垣周將軍監軍使出牛酒而勞因士卒之樂又令曰山澤之地其土瘠漓今時方秋浸潦用事謂衆之功難為也顧為垣今日而周明日而壊吾為諸君惜之誠能致其厚則土藏去聲氣色脉力相輔雖霖潦不為患矣築者皆悅復争為厚及竟將軍監軍使出視之復勞曰嗟乎諸君之能衆士之力也既周且厚始謂其垣今則城矣因自吟曰城乎城乎使其增數仭而飾之寇雖蚩尤寧敢犯吾乎遂歸諸將相謂曰乃者將軍之詞得無意其髙耶吾黨亦魁醜其卑矣復增其築於是新城遂具明日寇果來望見皆愕然因至新城傍俱張喉髙言指城上曰為我曹敬謝將軍訖辭而去諸將盡伏寇亦以王賢董重質營其側拒之十一月戊辰將軍將卒萬餘西渡澗渠上史簇岡與賊陣自平明至日中進退相延不得合及日側將軍乃謀曰彼必乘暮伺吾還兵擊我必矣於是引兵急攻宼宼延退數里乃以精兵分伏其兩隅復自延退間拔其羸老先復令軍中曰皆坐賊之後見官幟有引渡者以為兵怠俱還遂大呼疾馳東下於是伏兵皆奮斷其後賊大潰殺傷千餘生得數十人官卒死者亦數百人是時李存亮為先鋒將使百騎遊擊左右獨五人環馳如轂至賊麾下斬其將王賢繼轡轉鬭而歸十一年夏髙霞寓敗於隋唐既謫盡發其卒屬陳秋捕得宼兵盡罷南境之備俱東備矣九月使偏將軍李曜領步卒數百人從險道夜銜枚入寇境西過九女原百餘里屠其堡聚三十餘壘又使義營諸將西北傍安陽山破其土附屯戍之衆數十百人招其降民男女萬户得其將二人用之久之朝之卿士以為將軍怠於戰或發其語而客亦有來語於將軍曰始天下髙將軍之義以將軍兵臨三州之寇謂一舉而取何為久不稱其獲與將軍曰子之望我非也夫鋤深稂者必利其鍤乃吾之部多吳楚畊販之人長習於沮澤之上彼魚鳥之性其生矣恇恇如偷兒其遊翔之羣非不多也及撫掌而駭之即争為潰矣而寇亦素難吾名常以精卒待我今驅是於谿谷之間與寇決鬭譬由畜彘之禦窮狼寧有所抗盖居之嚴城以固其意令旦暮從壁上望見寇騎號呼奔突之狀以熟其目然吾又常喻以風雲勝敗之語語之以壯所恃如目熟而恃壯及其可用吾伺其利而擊之期於必勝此吾所効也十一年冬詔書促戰十月乙未上遣中貴人來臨視將軍於是圖其陣於帳中令諸將各職其序旦暮擊鼓教士卒為分合圓方之勢備盡所用將軍出客有難之曰自建中於今淮夷三叛其間矣雖䝉赦令然未嘗斯須忘戰故介兵人𫝊其兵父訓之子兄教其弟非戰事不語是宼以將軍名聞天下固不敢犯自將軍西出疆屯兵於萬勝城以控其要濠水而東連次淮江之間郡邑之人畊桑自力輸轉相屬曾不為冦虞此將軍之功也以强計毅誠招其轉禍之人繼來如繩此將軍之用也今將軍不以此為百全之基驅貊越之人身自䝉堅而與必死之寇決命頃刻即萬一有不如將軍之指東土之固將安仰哉對曰此吾已熟於計久矣然吾昔嘗仕於河塞十有餘年公若僂之亡伸也前行始入覲不意䝉寵於過悞使率師振旅吾之力唯其所指以死効夫馬隨羈而引者也羈之使馳則為之馳緩則步安有擇塗陸而避僵蹶哉如有縱之不前銜之不止徒見撻賤之棄焉得延頸踠足以待御且聖上旦暮待績於吾中貴繼至亦吾䝉羈之日也何敢自引於便而巳矣遂以十一月庚辰夜漏過四十刻引兵西渡上史蔟牧之下矚賊壘分銖皆察及日中天風西猛起折幹迴幟將軍謂中貴人曰今日之候非不利邪願屯兵堡史蔟以伺之中貴人曰某受命視公戰不視公守將軍不得已乃陣中軍為前武寧軍次之左右輔皆親兵戰凡十合㑹盧宣之軍居間聞戰聲自驚潰失次且遯是賊軍方苦中軍武寧之殺傷幾欲引去聞盧宣之軍驚潰即分精兵數百勁突所潰以擊亡而將軍復與中軍武寧深逐賊西行數十里因與盧宣之軍相棄盧宣之軍先遁去卒無所傷至暮中軍力鬭遂死其將曹推直張忠信楊渾等及卒死者數百人寧武死者亦數百人還軍新城雖無功者亦勞之以故士卒無戰苦畏叛之患時某客夀春得詳其語而書之以備史聽魏滑分河錄九年冬為節帥薛公作元和八年秋水大至滑河南瓠子堤溢將及城居民震駭帥恐出視水迎流西南行思欲以救其患亦頗聞故有分河之事言其水嘗導出黎陽傍帥以其功尚可跡於是遣其賓裴引泰請於魏曰河經地而東滑最大自洛以西百流皆集於滑而春秋堤防不為固此將軍所明知也竊以黎陽西南其洄壖拒流以生衝激之力誠願決一派於斯幸分其威耳今秋雨連久不間洛滑以西雄川峻谷暴發之水争怒以走㑹即河勢日夜以壯恐一旦城郭無賴謹聽命於將軍魏帥許之其將卒吏民更請曰患難近也况滑得水禍於天久矣魏何戚乃許移於己哉帥曰民前聽所語是黎陽與滑居帝土否耶設人有不幸於水火而望及於四海道路之人凡見其苦即為舉手寜皆有戚者夫全大以棄細順理也且滑壁數萬人民不安業未知其賴吾安敢以河鄙咫尺之地為專惜乎顧桑麻五榖之出不能振百户假如水能盡敗黎陽尚不足愛况其無有民何患無土以食因召吏趨籍民地所當奪者盡以他地與之籍奏天子天子嘉其意而可明年春滑鑿河北黎陽西南役卒萬人間流二十里復㑹於河其壖田凡七百頃皆歸屬河南夏六月魏使楊茂卿授地滑帥令陳酒樂與浮河新渠是日亞之以客得與故悉其事於兩帥之賓學解嘲對客有以今廩食之不通充漕輓不勝於弊是勞逺而逸近以為問者余於是發憤數日故縷言而對之昔漢徙山東豪富兼併之家以奉園邑凡百二十四萬户又有南北東西軍及匈奴雜虜以國衆來歸者仰給於漢未聞嘗俟輓於吳越而復給也今以三十千人食勞輸江淮嵗貢三十萬斛迎流越險覆舷敗軏不得十半自漕以東督稽之官凡四十七署署吏不下百數嵗費錢十千萬為大數而部吏舟傭相踰為姦鞭榜流血酸苦之聲相聞禁錮連嵗不解嵗千餘人雖赦宥而獄死者不可勝多矣甚非仁聖之所以牧人也乃者燕人叛𤣥宗南巡巴蜀肅宗勞兵於靈武及二駕神遊代宗臨陜闗中流離羸牛一韁當市錢二百千故有轉輸之法雖救一時然終轉入人於禍誠可以痛今雖未可暴去且宜以三輔粟為貢重資於農則耕稼自勤耕稼自勤甸服無曠土遊人矣如此九年之蓄可以儲又何勞輸輓於逺哉客曰敬聞其㫖沈下賢集巻三
